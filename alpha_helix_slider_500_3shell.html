<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<div id="controls" style="position:fixed;top:10px;left:10px;z-index:100;background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:6px">
  <label>Coil: <input id="coilSlider" type="range" min="0" max="100" style="width:200px;vertical-align:middle">
  <span id="coilVal"></span></label>
  <button id="goBtn" style="margin-left:8px">Go</button>
</div>
<pre id="log" style="margin-top:50px">Building helix...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

var params = new URLSearchParams(window.location.search);
var coilFrac = parseFloat(params.get('coil'));
if (isNaN(coilFrac)) coilFrac = 1.0;
coilFrac = Math.max(0, Math.min(1, coilFrac));

var slider = document.getElementById('coilSlider');
var coilVal = document.getElementById('coilVal');
slider.value = Math.round(coilFrac * 100);
coilVal.textContent = Math.round(coilFrac * 100) + '%';
slider.oninput = function() { coilVal.textContent = this.value + '%'; };

document.getElementById('goBtn').onclick = function() {
  var f = slider.value / 100;
  window.location.search = '?coil=' + f.toFixed(2);
};

(function() {
  var t = coilFrac; // 0=extended, 1=full helix
  var A = 1.8897;
  var nRes = 12;

  // Bond lengths
  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;

  // Alpha helix target geometry
  var riseFull = 1.5 * A;       // rise per residue (helix)
  var riseExt = 3.8 * A;        // rise per residue (extended)
  var radiusFull = 2.3 * A;     // backbone radius (helix)
  var turnAngleFull = 2 * Math.PI / 3.6;  // 100 deg per residue

  // Interpolate between extended and helix
  var risePerRes = riseExt + t * (riseFull - riseExt);
  var radiusNow = t * radiusFull;
  var turnAngleNow = t * turnAngleFull;

  var positions = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    positions.push({x: x, y: y, z: z});
    elList.push(el);
    zList.push(Z);
  }

  // Center along z-axis
  var zOff = -(nRes - 1) * risePerRes / 2;

  for (var r = 0; r < nRes; r++) {
    var phi = r * turnAngleNow;
    var zBase = zOff + r * risePerRes;

    // N position
    var nx = radiusNow * Math.cos(phi);
    var ny = radiusNow * Math.sin(phi);
    var nz = zBase;

    // Ca position
    var phiCa = phi + turnAngleNow * 0.35;
    var zCa = zBase + risePerRes * 0.35;
    var cax = radiusNow * Math.cos(phiCa);
    var cay = radiusNow * Math.sin(phiCa);
    var caz = zCa;

    // C position
    var phiC = phi + turnAngleNow * 0.7;
    var zC = zBase + risePerRes * 0.7;
    var cx = radiusNow * Math.cos(phiC);
    var cy = radiusNow * Math.sin(phiC);
    var cz = zC;

    // Direction vectors for sidegroup placement
    // Radial outward from helix axis
    var radX, radY;
    var cRad = Math.sqrt(cax * cax + cay * cay);
    if (cRad > 0.01) {
      radX = cax / cRad;
      radY = cay / cRad;
    } else {
      // Extended chain: alternate sides
      radX = (r % 2 === 0) ? 1 : -1;
      radY = 0;
    }

    // Tangential
    var tangX = -Math.sin(phiCa);
    var tangY = Math.cos(phiCa);
    // For extended (t~0), tangential is perpendicular to z-axis
    if (t < 0.01) { tangX = 0; tangY = 1; }

    // N atom
    pushAtom(nx, ny, nz, 'N', 3);

    // H on N — radially outward
    var nRad = Math.sqrt(nx * nx + ny * ny);
    if (nRad > 0.01) {
      pushAtom(nx + nx / nRad * bNH, ny + ny / nRad * bNH, nz, 'H', 1);
    } else {
      var nhSide = (r % 2 === 0) ? 1 : -1;
      pushAtom(nx + nhSide * bNH, ny, nz, 'H', 1);
    }

    // Extra H on N-terminus
    if (r === 0) {
      pushAtom(nx, ny, nz - bNH, 'H', 1);
    }

    // Ca
    pushAtom(cax, cay, caz, 'C', 4);

    // 2 H on Ca (glycine CH2)
    // Interpolate: extended uses y/z directions, helix uses tangential
    var haX1 = tangX * bCH * t + (1 - t) * 0;
    var haY1 = tangY * bCH * t + (1 - t) * bCH;
    var haZ1 = 0;
    pushAtom(cax + haX1, cay + haY1, caz + haZ1, 'H', 1);
    pushAtom(cax - haX1, cay - haY1, caz - haZ1, 'H', 1);

    // Carbonyl C
    pushAtom(cx, cy, cz, 'C', 4);

    // Carbonyl O — radially outward
    var coRad = Math.sqrt(cx * cx + cy * cy);
    if (coRad > 0.01) {
      pushAtom(cx + cx / coRad * bCO, cy + cy / coRad * bCO, cz, 'O', 2);
    } else {
      var oSide = (r % 2 === 0) ? -1 : 1;
      pushAtom(cx + oSide * bCO, cy, cz, 'O', 2);
    }
  }

  // C-terminal OH
  var lastPhi = (nRes - 1) * turnAngleNow + turnAngleNow * 0.7;
  var lastZ = zOff + (nRes - 1) * risePerRes + risePerRes * 0.7;
  var lastCx = radiusNow * Math.cos(lastPhi);
  var lastCy = radiusNow * Math.sin(lastPhi);
  pushAtom(lastCx, lastCy, lastZ + 1.34 * A, 'O', 2);
  pushAtom(lastCx, lastCy, lastZ + 1.34 * A + bOH, 'H', 1);

  var nProtein = positions.length;

  // --- Solvation shell ---
  var ohBond = 0.96 * A;
  var halfAng = 52.25 * Math.PI / 180;
  var waterSpacing = 3.5 * A;  // 3 solvation shells
  var minWaterDist = 2.5 * A;
  var maxWaterDist = 12.5 * A;  // 3 shells

  // Compute extent in all 3 dimensions
  var minX = Infinity, maxX = -Infinity;
  var minY = Infinity, maxY = -Infinity;
  var minZ = Infinity, maxZ = -Infinity;
  for (var i = 0; i < nProtein; i++) {
    if (positions[i].x < minX) minX = positions[i].x;
    if (positions[i].x > maxX) maxX = positions[i].x;
    if (positions[i].y < minY) minY = positions[i].y;
    if (positions[i].y > maxY) maxY = positions[i].y;
    if (positions[i].z < minZ) minZ = positions[i].z;
    if (positions[i].z > maxZ) maxZ = positions[i].z;
  }
  var pcx = (minX + maxX) / 2, pcy = (minY + maxY) / 2, pcz = (minZ + maxZ) / 2;

  var extents = [maxX - minX, maxY - minY, maxZ - minZ];
  var maxExtent = Math.max(extents[0], extents[1], extents[2]);
  var scr = maxExtent + 30 * A;  // margin for 3 shells + boundary
  scr = Math.max(80, Math.min(120, scr));
  var maxR = scr / 2 - 2 * A;

  // 3D solvation: place waters throughout the volume
  var nWater = 0;
  for (var wx = pcx - maxR; wx <= pcx + maxR; wx += waterSpacing) {
    for (var wy = pcy - maxR; wy <= pcy + maxR; wy += waterSpacing) {
      for (var wz = pcz - maxR; wz <= pcz + maxR; wz += waterSpacing) {
        if (Math.abs(wx - pcx) > maxR || Math.abs(wy - pcy) > maxR || Math.abs(wz - pcz) > maxR) continue;

        // Check 3D distance from all protein atoms
        var tooClose = false;
        var nearProtein = false;
        for (var pi = 0; pi < nProtein; pi++) {
          var ddx = wx - positions[pi].x, ddy = wy - positions[pi].y, ddz = wz - positions[pi].z;
          var d2 = ddx * ddx + ddy * ddy + ddz * ddz;
          if (d2 < minWaterDist * minWaterDist) {
            tooClose = true;
            break;
          }
          if (d2 < maxWaterDist * maxWaterDist) {
            nearProtein = true;
          }
        }
        if (tooClose || !nearProtein) continue;

        // Deterministic orientation from 3D position
        var wAngle = (wx * 7.3 + wy * 11.1 + wz * 3.7) % (2 * Math.PI);
        pushAtom(wx, wy, wz, 'O', 2);
        pushAtom(wx + ohBond * Math.cos(wAngle + halfAng),
                 wy + ohBond * Math.sin(wAngle + halfAng), wz, 'H', 1);
        pushAtom(wx + ohBond * Math.cos(wAngle - halfAng),
                 wy + ohBond * Math.sin(wAngle - halfAng), wz, 'H', 1);
        nWater++;
      }
    }
  }

  var gridN = 500;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var atoms = [];

  for (var i = 0; i < positions.length; i++) {
    var p = positions[i];
    var gi = Math.round(N2 + (p.x - pcx) / h);
    var gj = Math.round(N2 + (p.y - pcy) / h);
    var gk = Math.round(N2 + (p.z - pcz) / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: zList[i], el: elList[i] });
  }

  log.textContent = 'Alpha helix (coil=' + Math.round(t * 100) + '%): ' + nProtein + ' protein + ' + nWater + ' waters = ' + atoms.length + ' atoms';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr.toFixed(1) + ' au';

  window.USER_CANVAS = 1100;
  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { log.textContent += '\nFailed to load molecule.js!'; };
s.onload = function() {
  log.textContent += '\nmolecule.js loaded, loading p5...';
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.crossOrigin = 'anonymous';
  p5s.onerror = function() { log.textContent += '\nFailed to load p5.js!'; };
  p5s.onload = function() { log.textContent += '\np5.js loaded'; };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
