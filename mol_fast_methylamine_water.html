<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Methylamine + Water — mol_fast (S66 #3)</title>
  <style>body { margin: 0; background: #000; color: #fff; font-family: monospace; }</style>
</head><body>
<div id="info" style="position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.8);padding:10px;border:1px solid #333;border-radius:6px;max-width:440px;font-size:12px;z-index:100">
  <div style="color:#ffa;font-weight:bold">Methylamine + Water — mol_fast / S66 #3</div>
  CH<sub>3</sub>NH<sub>2</sub> &middot; H<sub>2</sub>O: water donates O-H to amine N (lone pair).
  CCSD(T) ref: E<sub>int</sub> &asymp; -7.0 kcal/mol; N&middot;&middot;&middot;O &asymp; 2.93 &Aring;.
  9 nuclei, 9 orbitals (16 valence e<sup>-</sup>).
  URL <b>?sep=N</b> = N&middot;&middot;&middot;O distance in &Aring; (default 2.95).
</div>
<div id="loadStatus" style="color:#ff0;font-family:monospace;padding:20px;font-size:14px">Loading…</div>
<script>
  window.onerror = function(msg, url, line, col, err) {
    var pre = document.createElement('pre');
    pre.style.cssText = 'color:#f66;background:#200;padding:12px;font-size:13px;white-space:pre-wrap';
    pre.textContent = 'ERROR: ' + msg + '\n  at ' + url + ':' + line + ':' + col +
      (err && err.stack ? '\n\n' + err.stack : '');
    document.body.insertBefore(pre, document.body.firstChild);
  };
  (function() {
    var urlN = parseInt(new URLSearchParams(location.search).get('N'));
    var N = isFinite(urlN) ? urlN : 150;
    var urlScr = parseFloat(new URLSearchParams(location.search).get('scr'));
    var scr = isFinite(urlScr) ? urlScr : 18;
    var h = scr / N;
    var N2 = Math.round(N / 2);
    var A = 1.8897;

    var urlSep = parseFloat(new URLSearchParams(location.search).get('sep'));
    var sep = isFinite(urlSep) ? urlSep : 2.95;  // N···O in Å (donor O to acceptor N)
    var nax =  sep / 2;   // N (acceptor, methylamine)
    var oax = -sep / 2;   // O (donor, water)

    function place(xA, yA, zA) {
      return {
        i: Math.round(N2 + (xA * A) / h),
        j: Math.round(N2 + (yA * A) / h),
        k: Math.round(N2 + (zA * A) / h)
      };
    }

    // Methylamine (acceptor, right): N at +x, methyl on +x, lone pair toward -x (toward water).
    // N at (nax, 0, 0); C at (nax+1.474, 0, 0)
    var Nn   = place(nax,             0.000,  0.000);
    var Cn   = place(nax + 1.474,     0.000,  0.000);
    var Hn1  = place(nax + 1.874,     1.04,   0.000);
    var Hn2  = place(nax + 1.874,    -0.52,   0.90);
    var Hn3  = place(nax + 1.874,    -0.52,  -0.90);
    var Hna  = place(nax + 0.20,      0.78,   0.55);
    var Hnb  = place(nax + 0.20,     -0.78,   0.55);

    // Water (donor, left): O at -x, one O-H pointing +x toward acceptor N.
    // O at (oax, 0, 0); donor H toward +x; other H tilted away.
    // bond OH = 0.96 Å, angle HOH = 104.5° → each H at 52.25° from bisector
    var Ow   = place(oax,             0.000,   0.000);
    // Donor H: along +x from O (toward methylamine N)
    var Hwd  = place(oax + 0.96,      0.000,   0.000);
    // Other H: angled at 104.5° from donor H, in -x/+y direction
    var bH = 0.96;
    var ang = 104.5 * Math.PI / 180;
    // donor along +x, the other H rotated by 104.5° in xy plane
    var hxOther = bH * Math.cos(ang);   // negative
    var hyOther = bH * Math.sin(ang);   // positive
    var Hw2  = place(oax + hxOther,   hyOther, 0.000);

    window.USER_NN = N;
    window.USER_SCREEN = scr;
    window.USER_STEPS = 200000;
    window.USER_NUCLEI = [
      // Methylamine (acceptor)
      { i: Cn.i,  j: Cn.j,  k: Cn.k,  Z: 4, rc: 0.5 },                  // 0: C
      { i: Nn.i,  j: Nn.j,  k: Nn.k,  Z: 3, rc: 0.5, fixed: true },     // 1: N (acceptor — locked at ref)
      { i: Hn1.i, j: Hn1.j, k: Hn1.k, Z: 1, rc: 0.0 },   // 2: H_C1
      { i: Hn2.i, j: Hn2.j, k: Hn2.k, Z: 1, rc: 0.0 },   // 3: H_C2
      { i: Hn3.i, j: Hn3.j, k: Hn3.k, Z: 1, rc: 0.0 },   // 4: H_C3
      { i: Hna.i, j: Hna.j, k: Hna.k, Z: 1, rc: 0.0 },   // 5: H_N1 (away from water)
      { i: Hnb.i, j: Hnb.j, k: Hnb.k, Z: 1, rc: 0.0 },   // 6: H_N2
      // Water (donor)
      { i: Ow.i,  j: Ow.j,  k: Ow.k,  Z: 3, rc: 0.6, fixed: true },     // 7: O (Z=3, rc=0.6 — larger than N's 0.5 to reflect more absorbed electrons)
      { i: Hwd.i, j: Hwd.j, k: Hwd.k, Z: 1, rc: 0.0 },   // 8: H_donor (toward N)
      { i: Hw2.i, j: Hw2.j, k: Hw2.k, Z: 1, rc: 0.0 },   // 9: H_other
    ];
    // 10 nuclei, 10 orbitals: C(4) + N(3) + 5×H(1) + O(3) + 2×H(1) = 17 valence e-
    // (gallery-consistent: O at Z=3 matching mol_fast_h2o.html validated convention)
    window.USER_NORM_TARGETS = [4, 3, 1, 1, 1, 1, 1,   3, 1, 1];
    window.USER_ALPHA_TF = 0;
    // Force-test mode: ?frozen=1 holds nuclei at reference geometry and reports residual forces.
    // Default: dynamics on.
    // N (acceptor) and O (donor) are locked in code at reference geometry.
    // ?frozen=1 also locks all other atoms (full force diagnostic).
    // Default: heavy-atom backbone fixed, H atoms + methyl free to relax.
    var frozen = (new URLSearchParams(location.search).get('frozen') === '1');
    window.USER_DYNAMICS = !frozen;
    window.USER_DT_NUC = 2;
    window.USER_NUC_DAMPING = 0.9;

    console.log('MeNH2 + H2O (mol_fast): 10 nuclei, sep=' + sep + ' Å');

    // Live geometry monitor: H_donor (8) - O (7) - N_acceptor (1)
    var monDiv = document.createElement('div');
    monDiv.style.cssText = 'position:fixed;top:160px;right:10px;background:rgba(0,0,0,0.85);padding:10px;border:1px solid #ffa;border-radius:6px;max-width:440px;font-size:12px;z-index:100;color:#ffa';
    monDiv.textContent = 'Geometry: waiting…';
    document.body.appendChild(monDiv);
    var hv = scr / N;
    var lastE = null, lastEtime = Date.now();
    var hPosHistory = [];
    setInterval(function() {
      if (!window.nuclei || window.nuclei.length < 10) return;
      var nu = window.nuclei;
      function dist(a, b) {
        var dx = (nu[a].i - nu[b].i) * hv;
        var dy = (nu[a].j - nu[b].j) * hv;
        var dz = (nu[a].k - nu[b].k) * hv;
        return Math.sqrt(dx*dx + dy*dy + dz*dz);
      }
      function angle(a, b, c) {
        var v1 = [(nu[a].i - nu[b].i) * hv, (nu[a].j - nu[b].j) * hv, (nu[a].k - nu[b].k) * hv];
        var v2 = [(nu[c].i - nu[b].i) * hv, (nu[c].j - nu[b].j) * hv, (nu[c].k - nu[b].k) * hv];
        var dot = v1[0]*v2[0] + v1[1]*v2[1] + v1[2]*v2[2];
        var l1 = Math.sqrt(v1[0]*v1[0]+v1[1]*v1[1]+v1[2]*v1[2]);
        var l2 = Math.sqrt(v2[0]*v2[0]+v2[1]*v2[1]+v2[2]*v2[2]);
        return Math.acos(Math.max(-1, Math.min(1, dot/(l1*l2)))) * 180/Math.PI;
      }
      // 7=O, 8=donor H, 1=acceptor N
      var dOH = dist(7, 8);   // donor O-H
      var dHN = dist(8, 1);   // H ⋯ N
      var dON = dist(7, 1);   // O ⋯ N
      var ang = angle(7, 8, 1);  // O-H⋯N angle (at H)
      var forceText = '';
      if (window.nucForce && window.nuclei) {
        var maxF = 0, rmsF2 = 0, n = 0;
        var lockedF = 0, nLocked = 0;
        for (var k = 0; k < window.nucForce.length; k++) {
          var fa = window.nucForce[k];
          var fm = Math.sqrt(fa[0]*fa[0] + fa[1]*fa[1] + fa[2]*fa[2]);
          if (window.nuclei[k] && window.nuclei[k].fixed) {
            lockedF += fm; nLocked++;   // locked atoms — exclude from RMS
          } else {
            if (fm > maxF) maxF = fm;
            rmsF2 += fm*fm; n++;
          }
        }
        var rmsF = Math.sqrt(rmsF2 / Math.max(n, 1));
        var conv = rmsF < 0.001 ? '#66bb6a' : (rmsF < 0.01 ? '#ffd54f' : '#ff7043');
        forceText = '<br><span style="color:' + conv + '">|F|<sub>RMS</sub>(' + n + ' free) = ' + rmsF.toFixed(4) +
                    ' &nbsp; |F|<sub>max</sub> = ' + maxF.toFixed(4) + ' Ha/au</span>' +
                    '<br><span style="color:#888;font-size:11px">(QC convergence: RMS &lt; 1e-3) | ' + nLocked + ' locked atoms suppressed</span>';
      }
      // Energy convergence — at fixed geometry, ΔE should drop toward zero
      if (window._E !== undefined) {
        var nowT = Date.now();
        var dEtext = '';
        if (lastE !== null) {
          var dE = window._E - lastE;
          var dEdt = (nowT - lastEtime) / 1000;
          var econv = Math.abs(dE) < 1e-5 ? '#66bb6a' : (Math.abs(dE) < 1e-3 ? '#ffd54f' : '#ff7043');
          dEtext = '<br><span style="color:' + econv + '">E = ' + window._E.toFixed(5) + ' Ha &nbsp; ΔE/Δt = ' + (dE/Math.max(dEdt,0.001)).toExponential(2) + ' Ha/s</span>';
        } else {
          dEtext = '<br>E = ' + window._E.toFixed(5) + ' Ha (gathering ΔE…)';
        }
        lastE = window._E;
        lastEtime = nowT;
        forceText += dEtext;
      }
      // Track donor H (atom 8) position over time — has it moved?
      if (window.nuclei && window.nuclei[8]) {
        var hp = window.nuclei[8];
        hPosHistory.push([hp.i, hp.j, hp.k]);
        if (hPosHistory.length > 30) hPosHistory.shift();
        if (hPosHistory.length >= 2) {
          var first = hPosHistory[0], last = hPosHistory[hPosHistory.length - 1];
          var dx = (last[0] - first[0]) * hv, dy = (last[1] - first[1]) * hv, dz = (last[2] - first[2]) * hv;
          var totalMove = Math.sqrt(dx*dx + dy*dy + dz*dz);
          var moveColor = totalMove > 0.05 ? '#66bb6a' : (totalMove > 0.005 ? '#ffd54f' : '#ff7043');
          var dynState = window.dynamicsEnabled ? '<span style="color:#66bb6a">dyn=ON</span>' : '<span style="color:#ff7043">dyn=OFF (press D)</span>';
          var fH = window.nucForce[8];
          var fHmag = Math.sqrt(fH[0]*fH[0] + fH[1]*fH[1] + fH[2]*fH[2]);
          // For H-bond formation, F_x on H_donor should be POSITIVE (toward N at +x)
          var dirInfo = fH[0] > 0 ? '<span style="color:#66bb6a">→toward N ✓</span>' : '<span style="color:#ff7043">←away from N ✗</span>';
          forceText += '<br><span style="color:' + moveColor + '">H_donor moved ' + totalMove.toFixed(4) + ' au</span> | ' + dynState +
                       '<br>F<sub>H_donor</sub> = (' + fH[0].toFixed(3) + ', ' + fH[1].toFixed(3) + ', ' + fH[2].toFixed(3) + ') |F|=' + fHmag.toFixed(3) +
                       '<br>x-direction: ' + dirInfo + ' (N is at +x)';
        }
      }
      monDiv.innerHTML =
        '<b>Geometry monitor</b><br>' +
        'O&minus;H_donor: ' + (dOH/A).toFixed(2) + ' &Aring; <span style="color:#888">(ref 0.97)</span><br>' +
        'H&middot;&middot;&middot;N: ' + (dHN/A).toFixed(2) + ' &Aring; <span style="color:#888">(ref 1.95)</span><br>' +
        'O&middot;&middot;&middot;N: ' + (dON/A).toFixed(2) + ' &Aring; <span style="color:#888">(ref 2.93)</span><br>' +
        'O&minus;H&middot;&middot;&middot;N: ' + ang.toFixed(0) + '&deg; <span style="color:#888">(ref ~170)</span>' +
        forceText;
    }, 500);
  })();

  var loadEl = document.getElementById('loadStatus');
  var s = document.createElement('script');
  s.src = 'mol_fast.js?t=' + Date.now();
  s.onload = function() {
    loadEl.textContent += '\nmol_fast.js loaded';
    var p = document.createElement('script');
    p.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
    p.onload = function() { if (loadEl && loadEl.parentNode) loadEl.parentNode.removeChild(loadEl); };
    document.body.appendChild(p);
  };
  s.onerror = function() { loadEl.textContent += '\nFAILED to load mol_fast.js'; loadEl.style.color = '#f44'; };
  document.body.appendChild(s);
</script>
</body></html>
