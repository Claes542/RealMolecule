<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building DNA double helix...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// DNA double helix: 6 base pairs, B-DNA geometry
// Sequence: GATTAC (strand 1) : GTAATC (strand 2, antiparallel)
// B-DNA: 3.4 Å rise, 36° twist per step, ~10 Å diameter
// Watson-Crick H-bonds: G:C (3 H-bonds), A:T (2 H-bonds)
(function() {
  var gridN = 200, scr = 40;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;

  var atoms = [];
  var elList = [];
  var zList = [];

  function addAtom(x, y, z, Z, el) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
    return atoms.length - 1;
  }

  // B-DNA parameters
  var rise = 3.4 * A;       // 3.4 Å per base pair
  var twist = 36 * Math.PI / 180;  // 36° per step
  var radius = 4.5 * A;     // distance from helix axis to base center
  var bpSep = 2.8 * A;      // heavy atom separation across H-bond

  // Sequence and complement (antiparallel)
  var seq1 = ['G','A','T','T','A','C'];
  var seq2 = ['C','T','A','A','T','G'];  // complement, same direction for pairing
  var nBP = 6;

  // H-bond atom indices for monitoring
  var hbondPairs = [];
  var hbondLabels = [];

  // Build each base pair along the helix axis (z)
  // Center the helix at z=0
  var zOff = -(nBP - 1) * rise / 2;

  for (var bp = 0; bp < nBP; bp++) {
    var z = zOff + bp * rise;
    var angle = bp * twist;

    // Direction vectors for this base pair
    var cx = Math.cos(angle);
    var cy = Math.sin(angle);
    // Perpendicular in-plane
    var px = -Math.sin(angle);
    var py = Math.cos(angle);

    var b1 = seq1[bp];
    var b2 = seq2[bp];

    // Strand 1 base center (along +radius direction)
    var s1x = radius * cx;
    var s1y = radius * cy;
    // Strand 2 base center (along -radius direction)
    var s2x = -radius * cx;
    var s2y = -radius * cy;

    // Simplified backbone: one P (phosphorus as N, Z=3) per nucleotide per strand
    // Backbone spirals around helix axis
    var bbR = 6.0 * A;  // backbone radius
    var bbAng1 = angle + 0.6;  // offset from base direction
    var bbAng2 = angle + Math.PI - 0.6;  // opposite strand
    addAtom(bbR * Math.cos(bbAng1), bbR * Math.sin(bbAng1), z, 3, 'N');  // P as N(Z=3)
    addAtom(bbR * Math.cos(bbAng2), bbR * Math.sin(bbAng2), z, 3, 'N');  // P as N(Z=3)

    // Build base pair H-bonding atoms
    // G:C pair: 3 H-bonds
    // A:T pair: 2 H-bonds
    // Place H-bond donors/acceptors along the cx,cy axis

    if ((b1 === 'G' && b2 === 'C') || (b1 === 'C' && b2 === 'G')) {
      // G:C — 3 H-bonds
      var isGC = (b1 === 'G');  // G on strand 1
      var gSide = isGC ? 1 : -1;

      // G side: O6 (acceptor), N1-H (donor), N2-H (donor)
      // C side: N4-H (donor), N3 (acceptor), O2 (acceptor)
      // H-bond 1: G(O6)···H-N4(C) — top
      var o6 = addAtom(
        (gSide * (bpSep/2 + 0.5*A)) * cx + 1.5*A * px,
        (gSide * (bpSep/2 + 0.5*A)) * cy + 1.5*A * py,
        z, 2, 'O');
      var hn4 = addAtom(
        (-gSide * (bpSep/2 - 0.2*A)) * cx + 1.5*A * px,
        (-gSide * (bpSep/2 - 0.2*A)) * cy + 1.5*A * py,
        z, 1, 'H');
      var n4 = addAtom(
        (-gSide * (bpSep/2 + 0.5*A)) * cx + 1.5*A * px,
        (-gSide * (bpSep/2 + 0.5*A)) * cy + 1.5*A * py,
        z, 3, 'N');
      hbondPairs.push([o6, hn4]);
      hbondLabels.push("bp" + (bp+1) + " G(O6)···H-N4(C):");

      // H-bond 2: G(N1-H)···N3(C) — middle
      var hn1 = addAtom(
        (gSide * (bpSep/2 - 0.2*A)) * cx,
        (gSide * (bpSep/2 - 0.2*A)) * cy,
        z, 1, 'H');
      var n1 = addAtom(
        (gSide * (bpSep/2 + 0.5*A)) * cx,
        (gSide * (bpSep/2 + 0.5*A)) * cy,
        z, 3, 'N');
      var n3 = addAtom(
        (-gSide * (bpSep/2 + 0.5*A)) * cx,
        (-gSide * (bpSep/2 + 0.5*A)) * cy,
        z, 3, 'N');
      hbondPairs.push([hn1, n3]);
      hbondLabels.push("bp" + (bp+1) + " G(N1-H)···N3(C):");

      // H-bond 3: G(N2-H)···O2(C) — bottom
      var hn2 = addAtom(
        (gSide * (bpSep/2 - 0.2*A)) * cx - 1.5*A * px,
        (gSide * (bpSep/2 - 0.2*A)) * cy - 1.5*A * py,
        z, 1, 'H');
      var n2g = addAtom(
        (gSide * (bpSep/2 + 0.5*A)) * cx - 1.5*A * px,
        (gSide * (bpSep/2 + 0.5*A)) * cy - 1.5*A * py,
        z, 3, 'N');
      var o2c = addAtom(
        (-gSide * (bpSep/2 + 0.5*A)) * cx - 1.5*A * px,
        (-gSide * (bpSep/2 + 0.5*A)) * cy - 1.5*A * py,
        z, 2, 'O');
      hbondPairs.push([hn2, o2c]);
      hbondLabels.push("bp" + (bp+1) + " G(N2-H)···O2(C):");

      // Fill ring carbons (simplified purine + pyrimidine)
      for (var rc = 0; rc < 3; rc++) {
        var rAng = rc * 2.094;
        addAtom(gSide * 2.0*A * cx + 1.2*A*(Math.cos(rAng)*px + Math.sin(rAng)*cx),
                gSide * 2.0*A * cy + 1.2*A*(Math.cos(rAng)*py + Math.sin(rAng)*cy),
                z, 4, 'C');
        addAtom(-gSide * 2.0*A * cx + 0.9*A*(Math.cos(rAng)*px + Math.sin(rAng)*cx),
                -gSide * 2.0*A * cy + 0.9*A*(Math.cos(rAng)*py + Math.sin(rAng)*cy),
                z, 4, 'C');
      }

    } else {
      // A:T — 2 H-bonds
      var isAT = (b1 === 'A');
      var aSide = isAT ? 1 : -1;

      // H-bond 1: A(N6-H)···O4(T) — top
      var hn6 = addAtom(
        (aSide * (bpSep/2 - 0.2*A)) * cx + 1.2*A * px,
        (aSide * (bpSep/2 - 0.2*A)) * cy + 1.2*A * py,
        z, 1, 'H');
      var n6 = addAtom(
        (aSide * (bpSep/2 + 0.5*A)) * cx + 1.2*A * px,
        (aSide * (bpSep/2 + 0.5*A)) * cy + 1.2*A * py,
        z, 3, 'N');
      var o4t = addAtom(
        (-aSide * (bpSep/2 + 0.5*A)) * cx + 1.2*A * px,
        (-aSide * (bpSep/2 + 0.5*A)) * cy + 1.2*A * py,
        z, 2, 'O');
      hbondPairs.push([hn6, o4t]);
      hbondLabels.push("bp" + (bp+1) + " A(N6-H)···O4(T):");

      // H-bond 2: T(N3-H)···N1(A) — bottom
      var hn3t = addAtom(
        (-aSide * (bpSep/2 - 0.2*A)) * cx - 1.2*A * px,
        (-aSide * (bpSep/2 - 0.2*A)) * cy - 1.2*A * py,
        z, 1, 'H');
      var n3t = addAtom(
        (-aSide * (bpSep/2 + 0.5*A)) * cx - 1.2*A * px,
        (-aSide * (bpSep/2 + 0.5*A)) * cy - 1.2*A * py,
        z, 3, 'N');
      var n1a = addAtom(
        (aSide * (bpSep/2 + 0.5*A)) * cx - 1.2*A * px,
        (aSide * (bpSep/2 + 0.5*A)) * cy - 1.2*A * py,
        z, 3, 'N');
      hbondPairs.push([hn3t, n1a]);
      hbondLabels.push("bp" + (bp+1) + " T(N3-H)···N1(A):");

      // Fill ring carbons
      for (var rc = 0; rc < 3; rc++) {
        var rAng = rc * 2.094;
        addAtom(aSide * 2.0*A * cx + 1.2*A*(Math.cos(rAng)*px + Math.sin(rAng)*cx),
                aSide * 2.0*A * cy + 1.2*A*(Math.cos(rAng)*py + Math.sin(rAng)*cy),
                z, 4, 'C');
        addAtom(-aSide * 2.0*A * cx + 0.9*A*(Math.cos(rAng)*px + Math.sin(rAng)*cx),
                -aSide * 2.0*A * cy + 0.9*A*(Math.cos(rAng)*py + Math.sin(rAng)*cy),
                z, 4, 'C');
      }

      // T methyl group
      addAtom(-aSide * 3.0*A * cx + 1.5*A * px,
              -aSide * 3.0*A * cy + 1.5*A * py,
              z, 4, 'C');
      addAtom(-aSide * 3.5*A * cx + 2.0*A * px,
              -aSide * 3.5*A * cy + 2.0*A * py,
              z + 0.5*A, 1, 'H');
      addAtom(-aSide * 3.5*A * cx + 2.0*A * px,
              -aSide * 3.5*A * cy + 2.0*A * py,
              z - 0.5*A, 1, 'H');
    }
  }

  log.textContent = 'DNA double helix: ' + atoms.length + ' atoms, ' + nBP + ' base pairs';
  log.textContent += '\nSequence: GATTAC:GTAATC (B-DNA geometry)';
  log.textContent += '\nG:C = 3 H-bonds, A:T = 2 H-bonds, total = 14 H-bonds';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr + ' au';

  // Monitor all H-bonds
  var bondPairs = [];
  for (var i = 0; i < hbondPairs.length; i++) {
    bondPairs.push([hbondPairs[i][0], hbondPairs[i][1], hbondLabels[i]]);
  }
  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "G:C H-bond": "~1.9 Å",
      "A:T H-bond": "~1.9 Å"
    },
    energy: "DNA double helix — 6 bp, B-DNA geometry",
    binding: "Do all 14 Watson-Crick H-bonds hold at correct distances?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_GRADP_FORCE = true;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    setTimeout(function() { window._view3D = true; }, 3000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
