<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building insulin A+B docking...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Insulin: A-chain (21 res) + B-chain (30 res) blind docking
// A-chain: helices A1-8, A13-20
// B-chain: helix B9-19, extended N/C termini
// Intra-chain helix biases only, NO inter-chain biases
// Water between chains mediates docking
(function() {
  var gridN = 300, scr = 80;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;

  // Sequences
  var seqA = ['G','I','V','E','Q','C','C','T','S','I','C','S','L','Y','Q','L','E','N','Y','C','N'];  // 21
  var seqB = ['F','V','N','Q','H','L','C','G','S','H','L','V','E','A','L','Y','L','V','C','G',
              'E','R','G','F','F','Y','T','P','K','T'];  // 30 (FVNQHLCGSHLVEALYLVCGERGFFYTPKT)
  var nResA = seqA.length;  // 21
  var nResB = seqB.length;  // 30
  var nRes = nResA + nResB;  // 51
  var seq = seqA.concat(seqB);

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;
  var resAdv = 3.8 * A;

  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function normalize(v) { var l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])+1e-10; return [v[0]/l,v[1]/l,v[2]/l]; }

  // Build two chains as helical spirals, separated in x
  var helixRise = 1.5 * A;
  var helixRadius = 2.3 * A;
  var helixAngle = 2 * Math.PI / 3.6;
  var chainSep = 12.0 * A;  // start 12 Å apart

  var bb = [];
  var chainIdx = [];  // 0 = A-chain, 1 = B-chain

  // A-chain: centered at (-sep/2, 0, 0)
  var zA0 = -(nResA - 1) * helixRise / 2;
  for (var r = 0; r < nResA; r++) {
    var angle = r * helixAngle;
    var cx = -chainSep/2 + helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = zA0 + r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty = helixRadius * Math.cos(angle) * helixAngle;
    var tz = helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
    chainIdx.push(0);
  }

  // B-chain: centered at (+sep/2, 0, 0), facing A-chain
  var zB0 = -(nResB - 1) * helixRise / 2;
  for (var r = 0; r < nResB; r++) {
    var angle = r * helixAngle + Math.PI;  // face A-chain
    var cx = chainSep/2 + helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = zB0 + r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty = helixRadius * Math.cos(angle) * helixAngle;
    var tz = helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
    chainIdx.push(1);
  }

  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca = [Cap[0]-Np[0], Cap[1]-Np[1], Cap[2]-Np[2]];
    var nca_n = normalize(nca);
    var cac = [Cp[0]-Cap[0], Cp[1]-Cap[1], Cp[2]-Cap[2]];
    var cac_n = normalize(cac);
    var perp = normalize(cross(nca_n, cac_n));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,0,1]));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,1,0]));
    var perp2 = normalize(cross(nca_n, perp));

    pushAtom(Np[0], Np[1], Np[2], 'N', 3);

    if (!isPro) {
      amideHIdx.push(atoms.length);
      pushAtom(Np[0] + perp[0]*bNH, Np[1] + perp[1]*bNH, Np[2] + perp[2]*bNH, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    // Extra H on chain N-termini
    if (r === 0 || r === nResA) {
      pushAtom(Np[0] - perp[0]*bNH, Np[1] - perp[1]*bNH, Np[2] - perp[2]*bNH, 'H', 1);
    }

    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], Cap[2], 'C', 4);

    if (isGly) {
      pushAtom(Cap[0] + perp[0]*bCH, Cap[1] + perp[1]*bCH, Cap[2] + perp[2]*bCH, 'H', 1);
      pushAtom(Cap[0] - perp[0]*bCH, Cap[1] - perp[1]*bCH, Cap[2] - perp[2]*bCH, 'H', 1);
    } else {
      pushAtom(Cap[0] + perp[0]*bCH*0.7 + perp2[0]*bCH*0.7,
               Cap[1] + perp[1]*bCH*0.7 + perp2[1]*bCH*0.7,
               Cap[2] + perp[2]*bCH*0.7 + perp2[2]*bCH*0.7, 'H', 1);
      var cbX = Cap[0] - perp[0]*bCaCb*0.8;
      var cbY = Cap[1] - perp[1]*bCaCb*0.8;
      var cbZ = Cap[2] - perp[2]*bCaCb*0.8;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        var hx2 = perp[0]*Math.cos(phi) + perp2[0]*Math.sin(phi);
        var hy2 = perp[1]*Math.cos(phi) + perp2[1]*Math.sin(phi);
        var hz2 = perp[2]*Math.cos(phi) + perp2[2]*Math.sin(phi);
        pushAtom(cbX + hx2*bCH*0.8, cbY + hy2*bCH*0.8, cbZ + hz2*bCH*0.8, 'H', 1);
      }
    }

    pushAtom(Cp[0], Cp[1], Cp[2], 'C', 4);
    carbonylOIdx.push(atoms.length);
    pushAtom(Cp[0] + perp[0]*bCO, Cp[1] + perp[1]*bCO, Cp[2] + perp[2]*bCO, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH for each chain
  for (var ch = 0; ch < 2; ch++) {
    var lastR = (ch === 0) ? nResA - 1 : nRes - 1;
    var lastC = bb[lastR].C, lastCa = bb[lastR].Ca;
    var lc = normalize([lastC[0]-lastCa[0], lastC[1]-lastCa[1], lastC[2]-lastCa[2]]);
    pushAtom(lastC[0] + lc[0]*1.34*A, lastC[1] + lc[1]*1.34*A, lastC[2] + lc[2]*1.34*A, 'O', 2);
    pushAtom(lastC[0] + lc[0]*(1.34*A+bOH), lastC[1] + lc[1]*(1.34*A+bOH), lastC[2] + lc[2]*(1.34*A+bOH), 'H', 1);
  }

  var nProtein = atoms.length;

  // Add water between chains
  var bOHw = 0.96 * A;
  var angW = 104.5 * Math.PI / 180;
  var nWater = 0;
  var waterSpacing = 3.0 * A;
  var zMin = Math.min(zA0, zB0) - 2 * A;
  var zMax = Math.max(zA0 + (nResA-1)*helixRise, zB0 + (nResB-1)*helixRise) + 2 * A;

  for (var wz = zMin; wz <= zMax; wz += waterSpacing) {
    for (var wy = -waterSpacing; wy <= waterSpacing; wy += waterSpacing) {
      var ox = 0;  // midpoint between chains
      var oy = wy;
      var oz = wz;

      var tooClose = false;
      for (var a = 0; a < nProtein; a++) {
        var dx = (atoms[a].i - N2) * h - ox;
        var dy = (atoms[a].j - N2) * h - oy;
        var dz = (atoms[a].k - N2) * h - oz;
        if (dx*dx + dy*dy + dz*dz < (2.5*A)*(2.5*A)) { tooClose = true; break; }
      }
      if (tooClose) continue;

      pushAtom(ox, oy, oz, 'O', 2);
      pushAtom(ox + bOHw*Math.sin(angW/2), oy + bOHw*Math.cos(angW/2), oz, 'H', 1);
      pushAtom(ox - bOHw*Math.sin(angW/2), oy + bOHw*Math.cos(angW/2), oz, 'H', 1);
      nWater++;
    }
  }

  log.textContent = 'Insulin docking: A-chain(' + nResA + ') + B-chain(' + nResB + ') = ' + nRes + ' residues';
  log.textContent += '\nProtein: ' + nProtein + ' atoms, Water: ' + nWater + ' molecules';
  log.textContent += '\nTotal: ' + atoms.length + ' atoms on ' + gridN + '^3 grid';
  log.textContent += '\nChain separation: ' + (chainSep / A).toFixed(1) + ' Å';
  log.textContent += '\nIntra-chain helix biases only, NO inter-chain biases';

  window.USER_FOLD_ATOMS = [caIndices[0], caIndices[nResA], caIndices[nRes-1]];

  // Residue groups
  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  resGroups.push([nProtein - 4, nProtein - 3]);
  resGroups.push([nProtein - 2, nProtein - 1]);

  // Bond pairs: inter-chain contacts to monitor
  var bondPairs = [];
  // Disulfide positions: A6-B6 (indices 5 and 21+6=26), A19-B18 (indices 19 and 21+18=39)
  var bA = 0, bB = nResA;  // chain offsets
  bondPairs.push([caIndices[bA+6], caIndices[bB+6], "A7-B7(SS):"]);     // disulfide site
  bondPairs.push([caIndices[bA+19], caIndices[bB+18], "A20-B19(SS):"]);  // disulfide site
  bondPairs.push([caIndices[bA+15], caIndices[bB+16], "A16-B17(hphob):"]);  // Leu-Leu hydrophobic
  bondPairs.push([caIndices[bA+12], caIndices[bB+12], "A13-B13(hphob):"]);  // Leu-Glu contact
  bondPairs.push([caIndices[bA+3], caIndices[bB+28], "A4-B29(salt):"]);     // Glu-Lys salt bridge
  // Intra-chain helix H-bonds
  if (amideHIdx[4] >= 0) bondPairs.push([carbonylOIdx[0], amideHIdx[4], "A:O1···H5:"]);
  if (amideHIdx[bB+13] >= 0) bondPairs.push([carbonylOIdx[bB+9], amideHIdx[bB+13], "B:O10···H14:"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "A7-B7": "~5 Å (disulfide)",
      "A20-B19": "~5 Å (disulfide)",
      "A16-B17": "~7 Å (hydrophobic)",
      "O···H(intra)": "2.0 Å (α-helix)"
    },
    energy: "Insulin: A+B chain blind docking via water",
    binding: "Do chains approach at disulfide sites and hydrophobic core?"
  };

  // Intra-chain helix biases ONLY
  // A-chain: helix A1-8 (res 0-7) and A13-20 (res 12-19)
  // B-chain: helix B9-19 (res bB+8 to bB+18)
  var hbonds = [];
  // A-chain helix 1: res 0-7
  for (var i = 0; i + 4 <= 7; i++) {
    if (amideHIdx[i+4] >= 0) hbonds.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "A-h1:O"+i+"···H"+(i+4) });
  }
  // A-chain helix 2: res 12-19
  for (var i = 12; i + 4 <= 19; i++) {
    if (amideHIdx[i+4] >= 0) hbonds.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "A-h2:O"+i+"···H"+(i+4) });
  }
  // B-chain helix: res bB+8 to bB+18
  for (var i = bB + 8; i + 4 <= bB + 18; i++) {
    if (amideHIdx[i+4] >= 0) hbonds.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "B-hx:O"+(i-bB)+"···H"+(i+4-bB) });
  }

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A,
    contactBias: {
      hbonds: hbonds,
      contacts: [],  // NO inter-chain contacts — blind docking
      hbondStrength: 0.8,
      contactStrength: 1.5
    }
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_GRADP_FORCE = true;
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 15;
  window.USER_DAMPING = 0.9;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    setTimeout(function() { window._view3D = true; }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
