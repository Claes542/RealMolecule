<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<div id="controls" style="position:fixed;top:10px;left:10px;z-index:100;background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:6px">
  <button id="addBtn" style="font-size:14px;padding:4px 12px">Add next atom</button>
  <button id="autoBtn" style="font-size:14px;padding:4px 12px;margin-left:6px">Auto-grow</button>
  <button id="add5Btn" style="font-size:14px;padding:4px 12px;margin-left:6px">+5</button>
  <button id="addAllBtn" style="font-size:14px;padding:4px 12px;margin-left:6px">All</button>
  <span id="status" style="margin-left:10px"></span>
</div>
<pre id="log" style="margin-top:50px">Building chignolin...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

(function() {
  var A = 1.8897;
  var nRes = 10;
  var t = 0.5;  // partially folded — more interesting visually

  var seq = ['G','Y','D','P','E','T','G','T','W','G'];

  var bNH  = 1.01 * A;
  var bCH  = 1.09 * A;
  var bCO  = 1.24 * A;
  var bOH  = 0.97 * A;
  var bCaCb = 1.52 * A;

  var resAdv = 3.8 * A;
  var zig = 0.5 * A;
  var totalLen = (nRes - 1) * resAdv;
  var x0 = -totalLen / 2;

  var bbExt = [];
  for (var r = 0; r < nRes; r++) {
    var xr = x0 + r * resAdv;
    var zigSign = (r % 2 === 0) ? 1 : -1;
    var yBase = zigSign * zig;
    bbExt.push({
      N:  [xr - 0.35 * resAdv, yBase * 0.6],
      Ca: [xr,                 -yBase * 0.4],
      C:  [xr + 0.35 * resAdv, yBase * 0.3]
    });
  }

  var hingeX = (bbExt[3].C[0] + bbExt[4].N[0]) / 2;
  var hingeY = (bbExt[3].C[1] + bbExt[4].N[1]) / 2;
  var bendAngle = t * Math.PI;

  function rotFrac(r) {
    if (r <= 3) return 0;
    if (r === 4) return 0.33;
    if (r === 5) return 0.67;
    return 1.0;
  }

  function rotatePoint(px, py, theta) {
    var dx = px - hingeX, dy = py - hingeY;
    var c = Math.cos(theta), s = Math.sin(theta);
    return [hingeX + dx * c - dy * s, hingeY + dx * s + dy * c];
  }

  var bb = [];
  for (var r = 0; r < nRes; r++) {
    var theta = rotFrac(r) * bendAngle;
    var N  = rotatePoint(bbExt[r].N[0],  bbExt[r].N[1],  theta);
    var Ca = rotatePoint(bbExt[r].Ca[0], bbExt[r].Ca[1], theta);
    var C  = rotatePoint(bbExt[r].C[0],  bbExt[r].C[1],  theta);
    bb.push({ N: N, Ca: Ca, C: C, rotAngle: theta });
  }

  // Collect atoms in two passes: heavy atoms first, then hydrogens
  var heavyAtoms = [];  // {x, y, z, el, Z, name}
  var hAtoms = [];

  function addHeavy(x, y, z, el, Z, name) { heavyAtoms.push({x:x, y:y, z:z, el:el, Z:Z, name:name}); }
  function addH(x, y, z, name) { hAtoms.push({x:x, y:y, z:z, el:'H', Z:1, name:name}); }

  for (var r = 0; r < nRes; r++) {
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');
    var rName = aa + (r+1);

    var nca_x = Cap[0] - Np[0], nca_y = Cap[1] - Np[1];
    var nca_l = Math.sqrt(nca_x * nca_x + nca_y * nca_y);
    var nca_px = -nca_y / nca_l, nca_py = nca_x / nca_l;

    var cac_x = Cp[0] - Cap[0], cac_y = Cp[1] - Cap[1];
    var cac_l = Math.sqrt(cac_x * cac_x + cac_y * cac_y);
    var cac_px = -cac_y / cac_l, cac_py = cac_x / cac_l;

    // N (heavy)
    addHeavy(Np[0], Np[1], 0, 'N', 3, rName + ' N');

    // H on N
    if (!isPro) {
      var nhSide = (rotFrac(r) < 0.5) ? -1 : 1;
      addH(Np[0] + nhSide * nca_px * bNH, Np[1] + nhSide * nca_py * bNH, 0, rName + ' NH');
    }
    if (r === 0) {
      addH(Np[0] + nca_px * bNH, Np[1] + nca_py * bNH, 0, rName + ' NH2');
    }

    // Ca (heavy)
    addHeavy(Cap[0], Cap[1], 0, 'C', 4, rName + ' Ca');

    // Ha
    if (isGly) {
      var haPerp_x = cac_px * bCH * t;
      var haPerp_y = cac_py * bCH * t;
      var haPerp_z = bCH * (1 - t);
      addH(Cap[0] + haPerp_x, Cap[1] + haPerp_y,  haPerp_z, rName + ' Ha1');
      addH(Cap[0] - haPerp_x, Cap[1] - haPerp_y, -haPerp_z, rName + ' Ha2');
    } else {
      var toCenter_x = -cac_px, toCenter_y = -cac_py;
      addH(Cap[0] + toCenter_x * bCH * 0.7, Cap[1] + toCenter_y * bCH * 0.7, bCH * 0.7, rName + ' Ha');

      // Cb (heavy sidechain)
      var cbX = Cap[0] + cac_px * bCaCb * 0.8;
      var cbY = Cap[1] + cac_py * bCaCb * 0.8;
      var cbZ = -bCaCb * 0.6 * (1 - t);
      addHeavy(cbX, cbY, cbZ, 'C', 4, rName + ' Cb');

      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        addH(cbX + bCH * 0.8 * Math.cos(phi),
             cbY + bCH * 0.8 * Math.sin(phi),
             cbZ + bCH * 0.6 * (hh === 0 ? 1 : -0.5), rName + ' Hb' + (hh+1));
      }
    }

    // Carbonyl C (heavy)
    addHeavy(Cp[0], Cp[1], 0, 'C', 4, rName + ' C');

    // Carbonyl O (heavy)
    var oSide;
    if (rotFrac(r) < 0.5) { oSide = (r % 2 === 0) ? -1 : 1; }
    else { oSide = (r % 2 === 0) ? 1 : -1; }
    addHeavy(Cp[0] + oSide * cac_px * bCO, Cp[1] + oSide * cac_py * bCO, 0, 'O', 2, rName + ' O');
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc_x = lastC[0] - lastCa[0], lc_y = lastC[1] - lastCa[1];
  var lc_l = Math.sqrt(lc_x * lc_x + lc_y * lc_y);
  var oh_x = lastC[0] + lc_x / lc_l * 1.34 * A;
  var oh_y = lastC[1] + lc_y / lc_l * 1.34 * A;
  addHeavy(oh_x, oh_y, 0, 'O', 2, 'C-term OH');
  addH(oh_x + lc_x / lc_l * bOH, oh_y + lc_y / lc_l * bOH, 0, 'C-term H');

  // Water near turn
  var waterDist = 3 * A;
  var wPerp_x = -Math.sin(bendAngle / 2), wPerp_y = Math.cos(bendAngle / 2);
  var wx = hingeX + wPerp_x * waterDist;
  var wy = hingeY + wPerp_y * waterDist;
  addHeavy(wx, wy, 0, 'O', 2, 'Water O');
  addH(wx - 0.76 * A, wy - 0.59 * A, 0, 'Water H1');
  addH(wx + 0.76 * A, wy - 0.59 * A, 0, 'Water H2');

  // Combine: heavy atoms first, then hydrogens
  var allAtoms = heavyAtoms.concat(hAtoms);

  // Compute extent and screen size
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (var i = 0; i < allAtoms.length; i++) {
    var a = allAtoms[i];
    if (a.x < minX) minX = a.x; if (a.x > maxX) maxX = a.x;
    if (a.y < minY) minY = a.y; if (a.y > maxY) maxY = a.y;
    if (a.z < minZ) minZ = a.z; if (a.z > maxZ) maxZ = a.z;
  }
  var cx = (minX + maxX) / 2, cy = (minY + maxY) / 2, cz = (minZ + maxZ) / 2;
  var extent = Math.max(maxX - minX, maxY - minY, maxZ - minZ);
  var scr = extent + 15 * A;
  scr = Math.max(35, Math.min(90, scr));

  var gridN = 300;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var atoms = [];
  var atomNames = [];

  for (var i = 0; i < allAtoms.length; i++) {
    var a = allAtoms[i];
    var gi = Math.round(N2 + (a.x - cx) / h);
    var gj = Math.round(N2 + (a.y - cy) / h);
    var gk = Math.round(N2 + (a.z - cz) / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: a.Z, el: a.el });
    atomNames.push(i + ': ' + a.el + ' (' + a.name + ')');
  }

  var nHeavy = heavyAtoms.length;
  log.textContent = 'Chignolin GYDPETGTWG (50% folded): ' + atoms.length + ' atoms';
  log.textContent += '\n' + nHeavy + ' heavy atoms (N,C,O) + ' + hAtoms.length + ' hydrogens + water';
  log.textContent += '\nHeavy skeleton grows first, then hydrogens';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr.toFixed(1) + ' au';

  window._atomNames = atomNames;
  window._nHeavy = nHeavy;

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });
})();

var activeCount = 1;
var autoGrowing = false;
var autoTimer = null;
var statusEl = document.getElementById('status');
var totalAtoms = window.USER_Z.filter(function(z) { return z > 0; }).length;

function updateStatus() {
  var phase = (activeCount <= window._nHeavy) ? 'skeleton' : 'hydrogens';
  statusEl.textContent = activeCount + '/' + totalAtoms + ' (' + phase + ')';
  if (activeCount < totalAtoms) {
    statusEl.textContent += ' \u2014 next: ' + window._atomNames[activeCount];
  } else {
    statusEl.textContent += ' \u2014 complete!';
  }
}

function addAtoms(n) {
  if (activeCount >= totalAtoms) return;
  activeCount = Math.min(activeCount + n, totalAtoms);
  updateStatus();
  if (window.activateAtoms) window.activateAtoms(activeCount);
}

document.getElementById('addBtn').onclick = function() { addAtoms(1); };
document.getElementById('add5Btn').onclick = function() { addAtoms(5); };
document.getElementById('addAllBtn').onclick = function() { addAtoms(totalAtoms); };

document.getElementById('autoBtn').onclick = function() {
  if (autoGrowing) {
    autoGrowing = false;
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
    document.getElementById('autoBtn').textContent = 'Auto-grow';
    return;
  }
  autoGrowing = true;
  document.getElementById('autoBtn').textContent = 'Stop';
  autoTimer = setInterval(function() {
    if (activeCount >= totalAtoms) {
      autoGrowing = false;
      clearInterval(autoTimer);
      autoTimer = null;
      document.getElementById('autoBtn').textContent = 'Auto-grow';
      return;
    }
    activeCount++;
    updateStatus();
    if (window.activateAtoms) window.activateAtoms(activeCount);
  }, 2000);
};

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { log.textContent += '\nFailed to load molecule.js!'; };
s.onload = function() {
  log.textContent += '\nmolecule.js loaded, loading p5...';
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.crossOrigin = 'anonymous';
  p5s.onerror = function() { log.textContent += '\nFailed to load p5.js!'; };
  p5s.onload = function() {
    log.textContent += '\np5.js loaded';
    var waitInit = setInterval(function() {
      if (window.isGpuReady && window.isGpuReady()) {
        clearInterval(waitInit);
        setTimeout(function() {
          window.activateAtoms(1);
          updateStatus();
        }, 1500);
      }
    }, 300);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
