<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<div id="controls" style="position:fixed;bottom:10px;left:10px;z-index:100;background:rgba(0,0,0,0.8);padding:12px 16px;border-radius:8px;border:1px solid #333">
  <div style="font-size:14px;color:#26c6da;margin-bottom:8px">Ice Melting — Temperature</div>
  <input type="range" id="tempSlider" min="0" max="2000" step="50" value="0" style="width:250px">
  <span id="tempLabel" style="margin-left:10px;font-size:16px;color:#4fc3f7">0 K</span>
  <div id="status" style="font-size:11px;color:#888;margin-top:4px"></div>
  <div style="font-size:13px;color:#00e5ff;margin-top:10px">Shear rate</div>
  <input type="range" id="shearSlider" min="0" max="100" step="1" value="0" style="width:250px">
  <span id="shearLabel" style="margin-left:10px;font-size:14px;color:#00e5ff">0</span>
  <div style="font-size:13px;color:#ffb3ff;margin-top:10px">Thermostat:
    <label style="margin-left:8px;cursor:pointer"><input type="radio" name="thermo" value="andersen" checked> Andersen</label>
    <label style="margin-left:8px;cursor:pointer"><input type="radio" name="thermo" value="brownian"> Brownian</label>
    <span id="thermoStatus" style="margin-left:10px;color:#aaa;font-size:11px">(γ=1.0)</span>
  </div>
</div>
<script>
(function() {
  var _sheRdy = setInterval(function() {
    var sh = document.getElementById('shearSlider');
    if (!sh) return;
    clearInterval(_sheRdy);
    var lbl = document.getElementById('shearLabel');
    // Map slider 0..100 → shear rate 0..1e-4 (log-linear-ish)
    function sliderToRate(v) { return v === 0 ? 0 : Math.pow(10, (v - 100) / 25) * 1e-4; }
    sh.addEventListener('input', function() {
      var v = parseInt(this.value);
      var r = sliderToRate(v);
      window.USER_SHEAR_RATE = r;
      lbl.textContent = r === 0 ? '0' : r.toExponential(2);
    });
  }, 100);
  // Thermostat radio: live-toggle Andersen ↔ Brownian
  var _thReady = setInterval(function() {
    var radios = document.querySelectorAll('input[name="thermo"]');
    if (radios.length === 0) return;
    clearInterval(_thReady);
    var stat = document.getElementById('thermoStatus');
    radios.forEach(function(r) {
      r.addEventListener('change', function() {
        if (this.value === 'brownian') {
          window.USER_BROWNIAN = true;
          window.USER_BROWNIAN_GAMMA = window.USER_BROWNIAN_GAMMA || 1.0;
          stat.textContent = '(BD γ=' + window.USER_BROWNIAN_GAMMA + ')';
          stat.style.color = '#ffb3ff';
        } else {
          window.USER_BROWNIAN = false;
          stat.textContent = '(Andersen)';
          stat.style.color = '#aaa';
        }
        console.log('Thermostat → ' + this.value);
      });
    });
  }, 100);
})();
</script>
<script>
// Temperature slider — updates langevinKT at runtime
var _sliderReady = setInterval(function() {
  var slider = document.getElementById('tempSlider');
  if (!slider) return;
  clearInterval(_sliderReady);
  var label = document.getElementById('tempLabel');
  var statusEl = document.getElementById('status');
  slider.addEventListener('input', function() {
    var T = parseInt(this.value);
    label.textContent = T + ' K';
    window.USER_TEMPERATURE_K = T;
    if (typeof window.langevinKT !== 'undefined') {
      window.langevinKT = T / 315775.0;
    }
    // Scale position kicks with temperature — needed to break H-bonds
    window.USER_THERMAL_KICK = T > 100 ? 0.3 * T / 1000 : 0;
    if (T < 200) label.style.color = '#4fc3f7';
    else if (T < 273) label.style.color = '#26c6da';
    else if (T < 500) label.style.color = '#ff0';
    else label.style.color = '#ff8800';
    var note = '';
    if (T > 273) note = ' (above melting 273 K)';
    if (T > 373) note = ' (above boiling 373 K)';
    statusEl.textContent = 'T=' + T + ' K' + note;
  });
  setInterval(function() {
    if (typeof nucVel === 'undefined' || typeof Z === 'undefined') return;
    var ke = 0, nActive = 0;
    var frozen = window.USER_FROZEN_ATOMS || [];
    for (var a = 0; a < nucVel.length; a++) {
      if (typeof Z[a] === 'undefined' || Z[a] === 0) continue;
      if (frozen.indexOf(a) >= 0) continue;
      var mass = (Z[a] === 2 ? 16 : 1) * 1836;
      var v2 = nucVel[a][0]*nucVel[a][0] + nucVel[a][1]*nucVel[a][1] + nucVel[a][2]*nucVel[a][2];
      ke += 0.5 * mass * v2;
      nActive++;
    }
    if (nActive === 0) return;
    var T_meas = (2 * ke / (3 * nActive)) * 315775.0;
    statusEl.textContent = 'T_target=' + slider.value + ' K, T_measured=' + T_meas.toFixed(0) + ' K, ' + nActive + ' free';
  }, 2000);
}, 100);
</script>
<script>
// Ice melting simulation
// Start from Ice Ic diamond cubic, add thermal energy → watch crystal disorder
// Smaller system (2×2×2) with thermal kick on all atoms
(function() {
  var gridN = 150, scr = 50, N2 = 75;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  // Ice Ic: diamond cubic, a = 6.36 Å, O-O = 2.75 Å
  var aCube = 6.36 * A;
  var dOO = aCube * Math.sqrt(3) / 4;
  var bOH = 0.96 * A;

  var basis = [
    [0, 0, 0], [0, 0.5, 0.5], [0.5, 0, 0.5], [0.5, 0.5, 0],
    [0.25, 0.25, 0.25], [0.25, 0.75, 0.75], [0.75, 0.25, 0.75], [0.75, 0.75, 0.25]
  ];

  var oPositions = [];
  var nc = 3;  // 3×3×3 = 216 O atoms

  var x0 = -(nc * aCube) / 2;
  var y0 = -(nc * aCube) / 2;
  var z0 = -(nc * aCube) / 2;

  for (var iz = 0; iz < nc; iz++) {
    for (var iy = 0; iy < nc; iy++) {
      for (var ix = 0; ix < nc; ix++) {
        for (var b = 0; b < basis.length; b++) {
          oPositions.push([
            x0 + (ix + basis[b][0]) * aCube,
            y0 + (iy + basis[b][1]) * aCube,
            z0 + (iz + basis[b][2]) * aCube
          ]);
        }
      }
    }
  }

  // Center
  var cx = 0, cy = 0, cz = 0;
  for (var i = 0; i < oPositions.length; i++) {
    cx += oPositions[i][0]; cy += oPositions[i][1]; cz += oPositions[i][2];
  }
  cx /= oPositions.length; cy /= oPositions.length; cz /= oPositions.length;
  for (var i = 0; i < oPositions.length; i++) {
    oPositions[i][0] -= cx; oPositions[i][1] -= cy; oPositions[i][2] -= cz;
  }

  // Remove O atoms outside box
  var halfScr = scr / 2 - 3 * h;
  var validO = oPositions.filter(function(p) {
    return Math.abs(p[0]) < halfScr && Math.abs(p[1]) < halfScr && Math.abs(p[2]) < halfScr;
  });

  // Place O atoms
  var oIndices = [];
  for (var i = 0; i < validO.length; i++) {
    oIndices.push(atoms.length);
    addAtom(validO[i][0], validO[i][1], validO[i][2], 2, 'O');
  }

  // Track which H's belong to which O (for H-O-H triplet identification)
  var hIndicesPerO = validO.map(function() { return []; });
  // Place H toward 2 nearest O neighbors (ice rules)
  for (var i = 0; i < validO.length; i++) {
    var dists = [];
    for (var j = 0; j < validO.length; j++) {
      if (j === i) continue;
      var dx = validO[j][0] - validO[i][0];
      var dy = validO[j][1] - validO[i][1];
      var dz = validO[j][2] - validO[i][2];
      var d = Math.sqrt(dx*dx + dy*dy + dz*dz);
      dists.push({ j: j, d: d, dx: dx, dy: dy, dz: dz });
    }
    dists.sort(function(a, b) { return a.d - b.d; });

    var nH = 0;
    for (var k = 0; k < dists.length && nH < 2; k++) {
      if (dists[k].d > dOO * 1.2) break;
      if (dists[k].j > i) {
        var scale = bOH / dists[k].d;
        hIndicesPerO[i].push(atoms.length);
        addAtom(validO[i][0] + dists[k].dx * scale,
                validO[i][1] + dists[k].dy * scale,
                validO[i][2] + dists[k].dz * scale, 1, 'H');
        nH++;
      }
    }
    for (var k = 0; k < dists.length && nH < 2; k++) {
      if (dists[k].d > dOO * 1.2) break;
      if (dists[k].j <= i) {
        var scale = bOH / dists[k].d;
        hIndicesPerO[i].push(atoms.length);
        addAtom(validO[i][0] + dists[k].dx * scale,
                validO[i][1] + dists[k].dy * scale,
                validO[i][2] + dists[k].dz * scale, 1, 'H');
        nH++;
      }
    }
  }

  var nWater = validO.length;
  console.log('Ice melt: ' + nWater + ' water molecules, ' + atoms.length + ' atoms');

  // Count neighbors for each O
  var nNeighbors = [];
  for (var i = 0; i < validO.length; i++) {
    var nn = 0;
    for (var j = 0; j < validO.length; j++) {
      if (j === i) continue;
      var dx = validO[j][0]-validO[i][0], dy = validO[j][1]-validO[i][1], dz = validO[j][2]-validO[i][2];
      if (Math.sqrt(dx*dx+dy*dy+dz*dz) < dOO * 1.2) nn++;
    }
    nNeighbors.push(nn);
  }

  // Only freeze corner atoms (1 or 2 neighbors) to contain the system
  // Let surface atoms (3 neighbors) be free — they melt first
  var frozen = [];
  for (var i = 0; i < validO.length; i++) {
    if (nNeighbors[i] <= 2) {
      frozen.push(oIndices[i]);
      for (var a = oIndices[i]+1; a < (oIndices[i+1] || atoms.length); a++) {
        if (atoms[a].Z === 1) frozen.push(a);
      }
    }
  }
  window.USER_FROZEN_ATOMS = frozen;

  var nFree = atoms.length - frozen.length;
  console.log('Frozen: ' + frozen.length + ' corner atoms, ' + nFree + ' free (will melt)');

  // No initial kick — Langevin thermostat will equilibrate to target T

  // Monitor several O-O distances across the crystal
  var bondPairs = [];
  // Find inner O-O pairs (both with 4 neighbors)
  var innerO = [];
  for (var i = 0; i < validO.length; i++) {
    if (nNeighbors[i] >= 4) innerO.push(i);
  }
  // Sample up to 4 inner O-O pairs
  var nPairs = 0;
  for (var i = 0; i < innerO.length && nPairs < 4; i++) {
    for (var j = i + 1; j < innerO.length && nPairs < 4; j++) {
      var dx = validO[innerO[j]][0]-validO[innerO[i]][0];
      var dy = validO[innerO[j]][1]-validO[innerO[i]][1];
      var dz = validO[innerO[j]][2]-validO[innerO[i]][2];
      var d = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (d < dOO * 1.2) {
        bondPairs.push([oIndices[innerO[i]], oIndices[innerO[j]], "O-O(" + nPairs + "):"]);
        nPairs++;
      }
    }
  }
  // Also some surface O-O pairs
  var surfO = [];
  for (var i = 0; i < validO.length; i++) {
    if (nNeighbors[i] === 3) surfO.push(i);
  }
  var nSurf = 0;
  for (var i = 0; i < surfO.length && nSurf < 2; i++) {
    for (var j = i + 1; j < surfO.length && nSurf < 2; j++) {
      var dx = validO[surfO[j]][0]-validO[surfO[i]][0];
      var dy = validO[surfO[j]][1]-validO[surfO[i]][1];
      var dz = validO[surfO[j]][2]-validO[surfO[i]][2];
      var d = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (d < dOO * 1.2) {
        bondPairs.push([oIndices[surfO[i]], oIndices[surfO[j]], "surf-OO(" + nSurf + "):"]);
        nSurf++;
      }
    }
  }

  window.USER_BOND_PAIRS = bondPairs;
  window.USER_REFERENCE = {
    bonds: { "O-O": "2.76 (ice)", "O-O(liquid)": "2.8-3.5 (disordered)" },
    energy: "Ice melting: crystal → liquid",
    binding: "Do O-O distances increase and disorder as thermal energy breaks H-bonds?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;   // start with dynamics ON
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 20.0;
  window.USER_TEMPERATURE_K = 0;  // start cold, sweep up with slider
  window.USER_LANGEVIN_GAMMA = 0.2;  // Andersen collision rate
  window.USER_NUC_SUBSTEPS = 10;
  window.USER_N_MOVE = 30;
  // Gentle disorder: small kicks for many steps, then relax
  window.USER_THERMAL_KICK = 0.3;
  var _kickPhase = setInterval(function() {
    if (typeof nucStepCount !== 'undefined' && nucStepCount > 50 && window.USER_THERMAL_KICK > 0) {
      window.USER_THERMAL_KICK = 0;
      console.log("=== KICKS OFF at step " + nucStepCount + " — E=" + E + " — relaxing ===");
      clearInterval(_kickPhase);
    }
  }, 500);
  // Build water triplets for H-O-H angle tracking using the per-O H index list recorded during placement.
  var waterTriplets = [];
  for (var wi = 0; wi < oIndices.length; wi++) {
    if (hIndicesPerO[wi].length === 2) {
      waterTriplets.push([oIndices[wi], hIndicesPerO[wi][0], hIndicesPerO[wi][1]]);
    }
  }
  console.log('Water triplets: ' + waterTriplets.length);
  window.USER_WATER_TRIPLETS = waterTriplets;
  // Start a monitor that reports H-O-H angle stats every 2s.
  setInterval(function() {
    if (typeof nucPos === 'undefined') return;
    var angles = [];
    for (var t = 0; t < waterTriplets.length; t++) {
      var o = waterTriplets[t][0], h1 = waterTriplets[t][1], h2 = waterTriplets[t][2];
      if (!nucPos[o] || !nucPos[h1] || !nucPos[h2]) continue;
      var a1x = nucPos[h1][0] - nucPos[o][0], a1y = nucPos[h1][1] - nucPos[o][1], a1z = nucPos[h1][2] - nucPos[o][2];
      var a2x = nucPos[h2][0] - nucPos[o][0], a2y = nucPos[h2][1] - nucPos[o][1], a2z = nucPos[h2][2] - nucPos[o][2];
      var dot = a1x*a2x + a1y*a2y + a1z*a2z;
      var m1 = Math.sqrt(a1x*a1x + a1y*a1y + a1z*a1z);
      var m2 = Math.sqrt(a2x*a2x + a2y*a2y + a2z*a2z);
      if (m1 > 0 && m2 > 0) angles.push(Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * 180 / Math.PI);
    }
    if (angles.length === 0) return;
    angles.sort(function(a,b) { return a-b; });
    var mean = angles.reduce(function(s,a) {return s+a;}, 0) / angles.length;
    var med = angles[Math.floor(angles.length/2)];
    window._hohStats = 'H-O-H: min=' + angles[0].toFixed(1) + '° med=' + med.toFixed(1) + '° mean=' + mean.toFixed(1) + '° max=' + angles[angles.length-1].toFixed(1) + '° (n=' + angles.length + ')';
    console.log(window._hohStats);
  }, 2000);

  // H-bond counter: average # H-bonded neighbors per water + flux (breaks/forms per second)
  var prevBonded = new Set();
  var lastCheckTime = Date.now();
  setInterval(function() {
    if (typeof nucPos === 'undefined') return;
    var oIdxs = waterTriplets.map(function(t) { return t[0]; });
    var nW = oIdxs.length;
    if (nW < 2) return;
    var hbCutoffAu = 3.5 * 1.8897;  // 3.5 Å in au
    var c2 = hbCutoffAu * hbCutoffAu;
    var currentBonded = new Set();
    var totalHB = 0;
    for (var i = 0; i < nW; i++) {
      var o1 = oIdxs[i];
      if (!nucPos[o1]) continue;
      for (var j = i + 1; j < nW; j++) {
        var o2 = oIdxs[j];
        if (!nucPos[o2]) continue;
        var dx = (nucPos[o1][0] - nucPos[o2][0]) * h;
        var dy = (nucPos[o1][1] - nucPos[o2][1]) * h;
        var dz = (nucPos[o1][2] - nucPos[o2][2]) * h;
        if (dx*dx + dy*dy + dz*dz < c2) {
          currentBonded.add(i + ',' + j);
          totalHB += 2;
        }
      }
    }
    var nHB = totalHB / nW;
    var breaks = 0, forms = 0;
    prevBonded.forEach(function(p) { if (!currentBonded.has(p)) breaks++; });
    currentBonded.forEach(function(p) { if (!prevBonded.has(p)) forms++; });
    var dt = (Date.now() - lastCheckTime) / 1000;
    var brkRate = breaks / dt, fmRate = forms / dt;
    prevBonded = currentBonded;
    lastCheckTime = Date.now();
    window._hbStats = 'n_HB = ' + nHB.toFixed(2) + ' (ice 4.0 / liq ~3.4) | breaks/s = ' + brkRate.toFixed(1) + '  forms/s = ' + fmRate.toFixed(1);
  }, 1000);
  window._hbStats = 'n_HB = ... (computing)';

  // Shear body force: F_x = m · shearRate · (y - y_center), applied by molecule.js each step.
  // URL ?shear=0.001 (units: 1/au-time²). Default 0 = no shear.
  var urlShear = parseFloat(new URLSearchParams(location.search).get('shear'));
  window.USER_SHEAR_RATE = isFinite(urlShear) ? urlShear : 0;
  if (window.USER_SHEAR_RATE !== 0) console.log('Shear body force: rate=' + window.USER_SHEAR_RATE);
  window.USER_ROT_SPEED = 0.005;
  window.USER_GRADP_FORCE = true;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'O') return 0.8;
    return 0;
  });
  window.INIT_ZEFF = 2;
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
