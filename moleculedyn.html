<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Molecule Builder — Quantum Dynamics</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; flex-direction: column; }
    canvas { border: none; }
    #config { color: #fff; font-family: monospace; font-size: 14px; text-align: center; }
    .atom-btn { padding: 8px 16px; margin: 4px; font-size: 16px; cursor: pointer; border: 2px solid #555; background: #222; color: #fff; border-radius: 4px; }
    .atom-btn.selected { border-color: #0f0; background: #040; }
    .atom-btn:hover { background: #333; }
    #placement { border: 1px solid #555; cursor: crosshair; display: block; margin: 8px auto; }
    #info { color: #aaa; margin: 4px; }
    #atomList { color: #ff0; min-height: 20px; }
    .action-btn { background: #060; color: #fff; border: none; padding: 8px 24px; font-size: 16px; cursor: pointer; margin: 4px; border-radius: 4px; }
    .action-btn:hover { background: #080; }
    .action-btn:disabled { background: #333; color: #666; cursor: default; }
    .cfg-input { width: 50px; background: #222; color: #fff; border: 1px solid #555; padding: 4px; font-size: 14px; }
    #stepsInput { width: 60px; }
    select.cfg-input { width: auto; }
  </style>
</head>
<body>
  <div id="config">
    <p id="header">Select atom type, then click to place:</p>
    <div>
      <button class="atom-btn" data-z="1" data-el="H">H (Z=1)</button>
      <button class="atom-btn" data-z="4" data-el="C">C (Z=4)</button>
      <button class="atom-btn" data-z="3" data-el="N">N (Z=3)</button>
      <button class="atom-btn" data-z="2" data-el="O">O (Z=2)</button>
    </div>
    <canvas id="placement" width="400" height="400"></canvas>
    <div id="atomList">No atoms placed</div>
    <div id="info">Right-click to remove last atom | Press D to toggle dynamics after launch</div>
    <div>
      Grid:
      <select id="gridSelect" class="cfg-input">
        <option value="200" data-max="10" data-screen="10">200^3 (10 atoms, hi-res)</option>
        <option value="300" data-max="10" data-screen="10">300^3 (10 atoms, ultra)</option>
        <option value="100" data-max="50" data-screen="14">100^3 (50 atoms)</option>
        <option value="50" data-max="30" data-screen="14">50^3 (30 atoms, fast)</option>
      </select>
      Screen: <input id="screenInput" class="cfg-input" type="number" value="10" min="2" max="40" step="1"> au
      Steps: <input id="stepsInput" class="cfg-input" type="number" value="100000" min="1000" max="1000000" step="1000">
    </div>
    <div style="margin-top:8px">
      <button class="action-btn" id="clearBtn">Clear</button>
      <button class="action-btn" id="launch" disabled>Launch</button>
    </div>
  </div>
  <script>
    window.onerror = function(msg, url, line) {
      document.body.style.color = 'red';
      document.body.innerHTML = '<pre>ERROR: ' + msg + '\nLine: ' + line + '\nFile: ' + url + '</pre>';
    };

    var selectedEl = null;
    var placedAtoms = [];
    var GRID_N = 200;
    var MAX_PLACE = 10;
    var cvs = document.getElementById('placement');
    var ctx = cvs.getContext('2d');
    var zColors = {1: '#fff', 2: '#f44', 3: '#48f', 4: '#4f4'};

    function rcForZ(z) {
      return 0;
    }

    function updateHeader() {
      document.getElementById('header').textContent =
        GRID_N + '^3 grid — place up to ' + MAX_PLACE + ' atoms:';
    }

    // Grid selector changes max atoms and default screen
    document.getElementById('gridSelect').addEventListener('change', function() {
      var opt = this.options[this.selectedIndex];
      GRID_N = parseInt(this.value);
      MAX_PLACE = parseInt(opt.dataset.max);
      document.getElementById('screenInput').value = opt.dataset.screen;
      // Trim atoms if over new limit
      while (placedAtoms.length > MAX_PLACE) placedAtoms.pop();
      updateHeader();
      drawPlacement();
      updateList();
    });

    function drawPlacement() {
      var screenAu = parseFloat(document.getElementById('screenInput').value) || 10;
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, 400, 400);
      ctx.strokeStyle = '#222';
      var pxPerAu = 400 / screenAu;
      for (var a = 0; a <= screenAu; a++) {
        var p = Math.round(a * pxPerAu);
        ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, 400); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(400, p); ctx.stroke();
      }
      ctx.strokeStyle = '#555';
      ctx.strokeRect(0, 0, 400, 400);
      for (var i = 0; i < placedAtoms.length; i++) {
        var at = placedAtoms[i];
        ctx.fillStyle = zColors[at.Z] || '#888';
        ctx.beginPath();
        ctx.arc(at.px, at.py, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(at.el, at.px, at.py - 14);
        ctx.fillText('Z=' + at.Z, at.px, at.py + 24);
      }
      if (placedAtoms.length >= 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        for (var a = 0; a < placedAtoms.length; a++) {
          for (var b = a + 1; b < placedAtoms.length; b++) {
            ctx.beginPath();
            ctx.moveTo(placedAtoms[a].px, placedAtoms[a].py);
            ctx.lineTo(placedAtoms[b].px, placedAtoms[b].py);
            ctx.stroke();
          }
        }
      }
    }

    function updateList() {
      if (placedAtoms.length === 0) {
        document.getElementById('atomList').textContent = 'No atoms placed';
      } else {
        var parts = placedAtoms.map(function(a) {
          var screenAu = parseFloat(document.getElementById('screenInput').value) || 10;
          var au_x = (a.px * screenAu / 400).toFixed(1);
          var au_y = (a.py * screenAu / 400).toFixed(1);
          return a.el + '(Z=' + a.Z + ') at (' + au_x + ',' + au_y + ')';
        });
        document.getElementById('atomList').textContent = placedAtoms.length + '/' + MAX_PLACE + ': ' + parts.join(' | ');
      }
      document.getElementById('launch').disabled = placedAtoms.length < 1;
    }

    document.querySelectorAll('.atom-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.atom-btn').forEach(function(b) { b.classList.remove('selected'); });
        this.classList.add('selected');
        selectedEl = { Z: parseInt(this.dataset.z), el: this.dataset.el };
      });
    });

    cvs.addEventListener('click', function(e) {
      if (!selectedEl || placedAtoms.length >= MAX_PLACE) return;
      var rect = cvs.getBoundingClientRect();
      placedAtoms.push({ px: e.clientX - rect.left, py: e.clientY - rect.top, Z: selectedEl.Z, el: selectedEl.el });
      drawPlacement();
      updateList();
    });

    cvs.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      if (placedAtoms.length > 0) { placedAtoms.pop(); drawPlacement(); updateList(); }
    });

    document.getElementById('screenInput').addEventListener('change', function() { drawPlacement(); updateList(); });
    document.getElementById('clearBtn').addEventListener('click', function() { placedAtoms = []; drawPlacement(); updateList(); });

    document.getElementById('launch').addEventListener('click', function() {
      var screenAu = parseFloat(document.getElementById('screenInput').value) || 10;
      var steps = parseInt(document.getElementById('stepsInput').value) || 20000;
      var atoms = placedAtoms.map(function(a) {
        return { i: Math.round(a.px * GRID_N / 400), j: Math.round(a.py * GRID_N / 400), Z: a.Z, el: a.el };
      });
      while (atoms.length < MAX_PLACE) {
        atoms.push({ i: Math.round(GRID_N / 2), j: Math.round(GRID_N / 2), Z: 0, el: '' });
      }
      window.USER_NN = GRID_N;
      window.USER_ATOMS = atoms;
      window.USER_SCREEN = screenAu;
      window.USER_STEPS = steps;
      window.USER_Z = atoms.map(function(a) { return a.Z; });
      window.USER_RC = atoms.map(function(a) { return rcForZ(a.Z); });

      document.getElementById('config').style.display = 'none';
      var s = document.createElement('script');
      s.src = 'moleculedyn.js?t=' + Date.now();
      s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load moleculedyn.js</pre>'; };
      s.onload = function() {
        var p5s = document.createElement('script');
        p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
        document.body.appendChild(p5s);
      };
      document.body.appendChild(s);
    });

    updateHeader();
    drawPlacement();
  </script>
</body>
</html>
