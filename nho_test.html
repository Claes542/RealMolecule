<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Minimal N-H···O test: just 3 atoms
// N-H bonded, O separated — does H find the right distance to O?
(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  // N-H bond at 1.01 Å, O at 3.0 Å from H (approaching distance)
  var bNH = 1.01 * A;
  var sep = 2.0 * A;  // initial H···O gap (closer)

  // O electrons at kernel position, tiny offset (1 grid cell) just to seed domain split
  // r_c exclusion sphere centered at kernel for both electrons
  addAtom(-bNH, 0, 0, 3, 'N');       // 0: N (Z=3)
  addAtom(0,    0, 0, 1, 'H');       // 1: H (Z=1) at origin
  addAtom(sep,  0, 0, 0, 'O');       // 2: O nucleus (Z=0, Z_nuc=2)
  addAtom(sep,  h, 0, 1, 'O');       // 3: O electron above (1 grid cell offset)
  addAtom(sep, -h, 0, 1, 'O');       // 4: O electron below (1 grid cell offset)

  console.log('N-H···O test: 3 atoms');
  console.log('N at -1.01A, H at 0, O at 3.0A');

  window.USER_BOND_PAIRS = [
    [1, 0, "H-N:"],      // covalent bond (should stay ~1.0 Å)
    [1, 2, "H···O:"],    // H to O nucleus (should reach ~1.9 Å)
    [0, 2, "N···O:"],    // donor-acceptor (should be ~3.0 Å)
    [1, 3, "H···Oa:"],   // H to lone pair a
    [1, 4, "H···Ob:"],   // H to lone pair b
  ];

  window.USER_REFERENCE = {
    bonds: {
      "H-N": "1.01 (covalent)",
      "H···O": "1.9 (H-bond target)",
      "N···O": "2.9 (donor-acceptor)"
    },
    energy: "Pure N-H···O hydrogen bond test",
    binding: "H should sit at ~1.9 Å from O, ~1.0 Å from N"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;  // let electrons converge first, press D to enable
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_N_MOVE = 20;
  window.USER_DAMPING = 0.8;  // strong damping to settle H oscillation
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_Z_NUC = atoms.map(function(a) {
    if (a.Z === 0 && a.el === 'O') return 2;  // bare O nucleus (+2)
    if (a.Z === 1 && a.el === 'O') return 0;  // O electron-only
    return a.Z;
  });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O' && a.Z === 0) return 0.5;  // r_c only on kernel
    if (a.el === 'O') return 0;                  // no r_c on electrons
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    setTimeout(function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      var chunks = [], stream = canvas.captureStream(0);
      var track = stream.getVideoTracks()[0];
      var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9') ? 'video/webm; codecs=vp9' : 'video/webm';
      var recorder = new MediaRecorder(stream, { mimeType: mimeType });
      recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
      recorder.onstop = function() {
        var blob = new Blob(chunks, { type: mimeType });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = 'nho_test.webm'; a.click();
      };
      recorder.start(1000);
      var origDraw = window.draw;
      window.draw = function() { if (origDraw) origDraw(); try { track.requestFrame(); } catch(e) {} };
      var dot = document.createElement('div');
      dot.id = 'rec-indicator';
      dot.style.cssText = 'position:fixed;top:10px;left:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;animation:blink 1s infinite;';
      dot.textContent = '\u25CF REC';
      var style = document.createElement('style');
      style.textContent = '@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}';
      document.head.appendChild(style);
      document.body.appendChild(dot);
      setTimeout(function() { recorder.stop(); dot.remove(); }, 30 * 60 * 1000);
    }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
