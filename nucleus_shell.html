<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// RealNucleus: pure shell model — NO point charges
// Inner: 2 electron domains (charge -1) = kernel
// Outer: 4 proton domains (charge +1) = shell
// Happy marriage: electrons confine protons, protons confine electrons

(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var atoms = [];

  var Rin = 0.25;
  atoms.push({ i: Math.round(N2 - Rin/h), j: N2, k: N2, Z: 1, el: 'e' });  // 0
  atoms.push({ i: Math.round(N2 + Rin/h), j: N2, k: N2, Z: 1, el: 'e' });  // 1

  var Rout = 1.5;
  var s = Rout / Math.sqrt(3);
  atoms.push({ i: Math.round(N2 + s/h), j: Math.round(N2 + s/h), k: Math.round(N2 + s/h), Z: 1, el: 'P' });  // 2
  atoms.push({ i: Math.round(N2 + s/h), j: Math.round(N2 - s/h), k: Math.round(N2 - s/h), Z: 1, el: 'P' });  // 3
  atoms.push({ i: Math.round(N2 - s/h), j: Math.round(N2 + s/h), k: Math.round(N2 - s/h), Z: 1, el: 'P' });  // 4
  atoms.push({ i: Math.round(N2 - s/h), j: Math.round(N2 - s/h), k: Math.round(N2 + s/h), Z: 1, el: 'P' });  // 5

  console.log('RealNucleus 4He: 2e(-1) inner + 4p(+1) outer');

  window.USER_BOND_PAIRS = [
    [0, 1, "e1-e2:"],
    [0, 2, "e1-P1:"],
    [2, 3, "P1-P2:"],
    [2, 4, "P1-P3:"],
  ];

  window.USER_REFERENCE = {
    bonds: { "e-e": "kernel", "e-P": "binding", "P-P": "shell" },
    energy: "RealNucleus: 4He — 2e kernel + 4p shell",
    binding: "Electrons confine protons, protons confine electrons"
  };

  window.USER_NUCLEUS_MODE = true;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [1, 1, 1, 1, 1, 1];
  window.USER_Z_NUC = [0, 0, 0, 0, 0, 0];
  window.USER_RC = [0, 0, 0, 0, 0, 0];
  window.USER_MASS = [1, 1, 1, 1, 1, 1];
  window.USER_CHARGE = [-1, -1, 1, 1, 1, 1];
  window.USER_SHELL_RADIUS = 0.8;
  window.USER_SHELL_INNER = [0, 1];
  window.USER_SHELL_OUTER = [2, 3, 4, 5];
  window.USER_CURV_REG = 0.5;
  window.USER_DIRICHLET_EP = 'electron';
  window.USER_LOCKED_GROUPS = [[0, 2, 3, 4, 5], [1, 2, 3, 4, 5]];
  window.USER_NEUMANN_SCREEN = true;
  window.INIT_ZEFF = 2;
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
