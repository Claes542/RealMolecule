<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building coiled-coil dimer...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Coiled-coil: two α-helices interacting
// Each helix: 15 residues with leucine zipper hydrophobic pattern
// Intra-helix: i→i+4 H-bond biases to maintain helical fold
// Inter-helix: NO biases — quantum forces drive docking
(function() {
  var gridN = 300, scr = 80;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;
  var nResPerHelix = 15;
  var nRes = nResPerHelix * 2;  // 30 total

  // Leucine zipper heptad repeat: abcdefg
  // a,d = hydrophobic (L,V,I) — face the interface
  // e,g = charged (E,K) — salt bridges
  // b,c,f = polar/other
  var seq1 = ['L','K','A','L','E','A','L','K','A','L','E','A','L','K','A'];  // helix 1
  var seq2 = ['L','E','A','L','K','A','L','E','A','L','K','A','L','E','A'];  // helix 2
  var seq = seq1.concat(seq2);

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;
  var resAdv = 3.8 * A;

  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function normalize(v) { var l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])+1e-10; return [v[0]/l,v[1]/l,v[2]/l]; }

  // Build two ideal α-helices side by side
  // Helix geometry: 3.6 res/turn, rise 1.5 Å/res, radius 2.3 Å
  var helixRise = 1.5 * A;     // rise per residue along helix axis
  var helixRadius = 2.3 * A;   // backbone radius
  var helixAngle = 2 * Math.PI / 3.6;  // 100° per residue

  // Separation between helix axes: ~10 Å (coiled-coil interface distance)
  var helixSep = 12.0 * A;  // start at 12 Å — slightly wider than native (~10 Å)

  // Helix 1: centered at (-sep/2, 0, 0), axis along z
  // Helix 2: centered at (+sep/2, 0, 0), axis along z
  var bb = [];
  var helixIdx = [];  // which helix each residue belongs to

  for (var hx = 0; hx < 2; hx++) {
    var xOff = (hx === 0) ? -helixSep/2 : helixSep/2;
    var phaseOff = (hx === 0) ? 0 : Math.PI;  // helices face each other
    var z0 = -(nResPerHelix - 1) * helixRise / 2;

    for (var r = 0; r < nResPerHelix; r++) {
      var angle = r * helixAngle + phaseOff;
      var cx = xOff + helixRadius * Math.cos(angle);
      var cy = helixRadius * Math.sin(angle);
      var cz = z0 + r * helixRise;

      // Tangent along helix axis (mostly z)
      var tx = -helixRadius * Math.sin(angle) * helixAngle;
      var ty = helixRadius * Math.cos(angle) * helixAngle;
      var tz = helixRise;
      var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
      tx /= tl; ty /= tl; tz /= tl;

      var spread = resAdv * 0.35;
      bb.push({
        N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
        Ca: [cx, cy, cz],
        C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
      });
      helixIdx.push(hx);
    }
  }

  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca = [Cap[0]-Np[0], Cap[1]-Np[1], Cap[2]-Np[2]];
    var nca_n = normalize(nca);
    var cac = [Cp[0]-Cap[0], Cp[1]-Cap[1], Cp[2]-Cap[2]];
    var cac_n = normalize(cac);
    var perp = normalize(cross(nca_n, cac_n));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,0,1]));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,1,0]));
    var perp2 = normalize(cross(nca_n, perp));

    // N
    pushAtom(Np[0], Np[1], Np[2], 'N', 3);

    // H on N
    if (!isPro) {
      amideHIdx.push(atoms.length);
      pushAtom(Np[0] + perp[0]*bNH, Np[1] + perp[1]*bNH, Np[2] + perp[2]*bNH, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    // Extra H on each helix N-terminus
    if (r === 0 || r === nResPerHelix) {
      pushAtom(Np[0] - perp[0]*bNH, Np[1] - perp[1]*bNH, Np[2] - perp[2]*bNH, 'H', 1);
    }

    // Ca
    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], Cap[2], 'C', 4);

    // Ha + sidechain
    if (isGly) {
      pushAtom(Cap[0] + perp[0]*bCH, Cap[1] + perp[1]*bCH, Cap[2] + perp[2]*bCH, 'H', 1);
      pushAtom(Cap[0] - perp[0]*bCH, Cap[1] - perp[1]*bCH, Cap[2] - perp[2]*bCH, 'H', 1);
    } else {
      pushAtom(Cap[0] + perp[0]*bCH*0.7 + perp2[0]*bCH*0.7,
               Cap[1] + perp[1]*bCH*0.7 + perp2[1]*bCH*0.7,
               Cap[2] + perp[2]*bCH*0.7 + perp2[2]*bCH*0.7, 'H', 1);
      var cbX = Cap[0] - perp[0]*bCaCb*0.8;
      var cbY = Cap[1] - perp[1]*bCaCb*0.8;
      var cbZ = Cap[2] - perp[2]*bCaCb*0.8;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        var hx2 = perp[0]*Math.cos(phi) + perp2[0]*Math.sin(phi);
        var hy2 = perp[1]*Math.cos(phi) + perp2[1]*Math.sin(phi);
        var hz2 = perp[2]*Math.cos(phi) + perp2[2]*Math.sin(phi);
        pushAtom(cbX + hx2*bCH*0.8, cbY + hy2*bCH*0.8, cbZ + hz2*bCH*0.8, 'H', 1);
      }
    }

    // Carbonyl C
    pushAtom(Cp[0], Cp[1], Cp[2], 'C', 4);

    // Carbonyl O
    carbonylOIdx.push(atoms.length);
    pushAtom(Cp[0] + perp[0]*bCO, Cp[1] + perp[1]*bCO, Cp[2] + perp[2]*bCO, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH for each helix
  for (var hx = 0; hx < 2; hx++) {
    var lastR = (hx === 0) ? nResPerHelix - 1 : nRes - 1;
    var lastC = bb[lastR].C, lastCa = bb[lastR].Ca;
    var lc = normalize([lastC[0]-lastCa[0], lastC[1]-lastCa[1], lastC[2]-lastCa[2]]);
    pushAtom(lastC[0] + lc[0]*1.34*A, lastC[1] + lc[1]*1.34*A, lastC[2] + lc[2]*1.34*A, 'O', 2);
    pushAtom(lastC[0] + lc[0]*(1.34*A+bOH), lastC[1] + lc[1]*(1.34*A+bOH), lastC[2] + lc[2]*(1.34*A+bOH), 'H', 1);
  }

  var nProtein = atoms.length;

  // Add water molecules between the helices to mediate interaction
  var bOHw = 0.96 * A;
  var angW = 104.5 * Math.PI / 180;
  var nWater = 0;
  var waterSpacing = 3.0 * A;
  var zMin = -(nResPerHelix - 1) * helixRise / 2;
  var zMax = (nResPerHelix - 1) * helixRise / 2;

  // Place waters in the gap between helices (x ≈ 0, along z axis)
  for (var wz = zMin; wz <= zMax; wz += waterSpacing) {
    for (var wy = -waterSpacing; wy <= waterSpacing; wy += waterSpacing) {
      var ox = 0;  // midpoint between helices
      var oy = wy;
      var oz = wz;

      // Check not too close to any protein atom
      var tooClose = false;
      for (var a = 0; a < nProtein; a++) {
        var dx = (atoms[a].i - N2) * h - ox;
        var dy = (atoms[a].j - N2) * h - oy;
        var dz = (atoms[a].k - N2) * h - oz;
        if (dx*dx + dy*dy + dz*dz < (2.5*A)*(2.5*A)) { tooClose = true; break; }
      }
      if (tooClose) continue;

      pushAtom(ox, oy, oz, 'O', 2);
      pushAtom(ox + bOHw*Math.sin(angW/2), oy + bOHw*Math.cos(angW/2), oz, 'H', 1);
      pushAtom(ox - bOHw*Math.sin(angW/2), oy + bOHw*Math.cos(angW/2), oz, 'H', 1);
      nWater++;
    }
  }

  var nTotal = atoms.length;

  log.textContent = 'Coiled-coil dimer: 2 × ' + nResPerHelix + ' residues = ' + nRes + ' residues, ' + nProtein + ' protein atoms';
  log.textContent += '\nWater: ' + nWater + ' molecules between helices';
  log.textContent += '\nTotal: ' + nTotal + ' atoms';
  log.textContent += '\nHelix separation: ' + (helixSep / A).toFixed(1) + ' Å (' + helixSep.toFixed(1) + ' au)';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr + ' au';
  log.textContent += '\nIntra-helix: i→i+4 H-bond biases';
  log.textContent += '\nInter-helix: NO biases — quantum forces only';

  // Fold angle: helix1-start, midpoint, helix2-end
  window.USER_FOLD_ATOMS = [caIndices[0], caIndices[nResPerHelix], caIndices[nRes-1]];

  // Residue groups
  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  // C-terminal OH groups
  resGroups.push([nProtein - 4, nProtein - 3]);  // helix 1 C-term OH
  resGroups.push([nProtein - 2, nProtein - 1]);  // helix 2 C-term OH

  // Bond pairs to display
  var bondPairs = [];
  // Sample intra-helix H-bonds (one from each helix)
  if (amideHIdx[4] >= 0) bondPairs.push([carbonylOIdx[0], amideHIdx[4], "H1:O0···H4:"]);
  if (amideHIdx[6] >= 0) bondPairs.push([carbonylOIdx[2], amideHIdx[6], "H1:O2···H6:"]);
  var r2 = nResPerHelix;
  if (amideHIdx[r2+4] >= 0) bondPairs.push([carbonylOIdx[r2], amideHIdx[r2+4], "H2:O"+r2+"···H"+(r2+4)+":"]);

  // Inter-helix distances (the key measurement)
  // Hydrophobic core: Leu at a,d positions (res 0,3,7,10 in each helix)
  bondPairs.push([caIndices[0], caIndices[nResPerHelix], "L1-L16(inter):"]);
  bondPairs.push([caIndices[3], caIndices[nResPerHelix+3], "L4-L19(inter):"]);
  bondPairs.push([caIndices[7], caIndices[nResPerHelix+7], "L8-L23(inter):"]);
  // Closest approach
  bondPairs.push([caIndices[7], caIndices[nResPerHelix+6], "Ca8-Ca21(close):"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "L-L(inter)": "~10 Å (coiled-coil)",
      "O···H(intra)": "2.0 Å (α-helix)"
    },
    energy: "Coiled-coil: two α-helices docking via hydrophobic interface",
    binding: "Do the two helices approach and form inter-helix contacts?"
  };

  // Contact biases: ONLY intra-helix H-bonds (i→i+4)
  // NO inter-helix biases — that interaction is quantum
  var hbonds = [];
  for (var hx = 0; hx < 2; hx++) {
    var base = hx * nResPerHelix;
    for (var i = base; i + 4 < base + nResPerHelix; i++) {
      if (amideHIdx[i+4] >= 0) {
        hbonds.push({
          a: carbonylOIdx[i],
          b: amideHIdx[i+4],
          target: 2.0 * A,
          label: "Hx" + (hx+1) + ":O" + i + "···H" + (i+4)
        });
      }
    }
  }

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A,
    contactBias: {
      hbonds: hbonds,
      contacts: [],  // NO inter-helix contacts — blind docking
      hbondStrength: 0.8,
      contactStrength: 1.5
    }
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_VIEW_YROT = 0;      // look straight at xz plane — see gap between helices
  window.USER_VIEW_TILT = 0.3;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_GRADP_FORCE = true;
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 15;
  window.USER_DAMPING = 0.9;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    var recorder = null, chunks = [], recording = false;
    window._toggleRecording = function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      if (!recording) {
        chunks = [];
        var stream = canvas.captureStream(0);  // manual frame capture every 10th draw
        var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9')
          ? 'video/webm; codecs=vp9' : 'video/webm';
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = function() {
          var blob = new Blob(chunks, { type: mimeType });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'coiled_coil.webm'; a.click();
          URL.revokeObjectURL(url);
        };
        var track = stream.getVideoTracks()[0];
        window._recStreamTrack = track;
        recorder.start();
        recording = true;
        var recFrameCount = 0;
        var origDraw = window.draw;
        window._recOrigDraw = origDraw;
        window.draw = function() { if (origDraw) origDraw(); recFrameCount++; if (recFrameCount % 10 === 0) { try { track.requestFrame(); } catch(e) {} } };
        var dot = document.createElement('div');
        dot.id = 'rec-indicator';
        dot.style.cssText = 'position:fixed;top:10px;right:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;';
        dot.textContent = '\u25CF REC';
        document.body.appendChild(dot);
      } else {
        if (window._recOrigDraw) { window.draw = window._recOrigDraw; window._recOrigDraw = null; }
        recorder.stop(); recording = false;
        window._recStreamTrack = null;
        var ind = document.getElementById('rec-indicator');
        if (ind) ind.remove();
      }
    };
    // Auto-start 3D fixed + recording
    window._view3D = true;
    window._view3D_fixed = true;
    setTimeout(function() { window._toggleRecording(); }, 2000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
