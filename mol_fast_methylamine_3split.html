<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Methylamine — mol_fast (3-split N, monomer)</title>
  <style>body { margin: 0; background: #000; }</style>
</head><body>
<div id="info" style="position:fixed;bottom:200px;right:10px;background:rgba(0,0,0,0.8);padding:10px;border:1px solid #333;border-radius:6px;max-width:440px;font-size:12px;z-index:100;color:#ffa">
  <div style="font-weight:bold">Methylamine monomer — N 3-split</div>
  CH<sub>3</sub>NH<sub>2</sub> with N treated as +3 pseudo kernel + 3 unit electrons split into
  120&deg; sectors around the lone-pair axis.
  Tests whether explicit lone-pair sub-orbital changes dipole and forces.
  Reference: dipole 1.31 D (exp).
</div>
<div id="loadStatus" style="color:#ff0;font-family:monospace;padding:20px;font-size:14px">Loading…</div>
<script>
  window.onerror = function(msg, url, line, col, err) {
    var pre = document.createElement('pre');
    pre.style.cssText = 'color:#f66;background:#200;padding:12px;font-size:13px;white-space:pre-wrap';
    pre.textContent = 'ERROR: ' + msg + '\n  at ' + url + ':' + line + ':' + col;
    document.body.insertBefore(pre, document.body.firstChild);
  };
  (function() {
    var N = 200;
    var urlScr = parseFloat(new URLSearchParams(location.search).get('scr'));
    var scr = isFinite(urlScr) ? urlScr : 14;
    var h = scr / N;
    var N2 = Math.round(N / 2);
    var A = 1.8897;

    function place(xA, yA, zA) {
      return {
        i: Math.round(N2 + (xA * A) / h),
        j: Math.round(N2 + (yA * A) / h),
        k: Math.round(N2 + (zA * A) / h)
      };
    }

    // Methylamine sp3 (Å) — proper tetrahedral N with split_axis along C-N bond:
    //   N at origin
    //   C-N axis along +z (this is split_axis)
    //   2 N-H bonds and lone pair direction at 109.5° from +z, 120° apart in xy plane
    //   → each 3-split sector captures: H_N1 / H_N2 / lone pair lobe
    var bCN = 1.474, bNH = 1.01, bCH = 1.10;
    var sinT = 0.9428;  // sin(109.47°)
    var cosT = -0.3333; // cos(109.47°)
    function offDir(angXY) { return [sinT * Math.cos(angXY), sinT * Math.sin(angXY), cosT]; }
    var Nn  = place(0.000,  0.000,  0.000);
    var Cn  = place(0.0, 0.0, bCN);                  // C along +z
    var dH1 = offDir(0);                             // H_N1 at xy angle 0°
    var dH2 = offDir(2 * Math.PI / 3);               // H_N2 at xy angle 120°
    // The third tetrahedral direction (xy angle 240°) is the LONE PAIR — empty, no atom there.
    var Hn1 = place(bNH * dH1[0], bNH * dH1[1], bNH * dH1[2]);
    var Hn2 = place(bNH * dH2[0], bNH * dH2[1], bNH * dH2[2]);
    var dC = [0, 0, 1];  // for methyl construction (C-to-N direction is -z)
    // Methyl H's: tetrahedral around C with one C-H direction reflecting C-N bond inversion.
    // Local frame at C: axis_1 = -dC (toward N), build tetrahedron.
    var axisToN = [-dC[0], -dC[1], -dC[2]];
    // Perpendicular vector (Gram-Schmidt from a probe)
    var probe = [0, 1, 0];
    var dotPN = axisToN[0]*probe[0] + axisToN[1]*probe[1] + axisToN[2]*probe[2];
    var p2 = [probe[0] - dotPN*axisToN[0], probe[1] - dotPN*axisToN[1], probe[2] - dotPN*axisToN[2]];
    var p2len = Math.sqrt(p2[0]*p2[0] + p2[1]*p2[1] + p2[2]*p2[2]);
    p2 = [p2[0]/p2len, p2[1]/p2len, p2[2]/p2len];
    var p3 = [
      axisToN[1]*p2[2] - axisToN[2]*p2[1],
      axisToN[2]*p2[0] - axisToN[0]*p2[2],
      axisToN[0]*p2[1] - axisToN[1]*p2[0]
    ];
    function methylDir(k) {
      var ang = (2 * Math.PI / 3) * k;  // 0, 120°, 240°
      var c = Math.cos(ang), s = Math.sin(ang);
      // Direction = -1/3·axisToN + sqrt(8)/3·(cos·p2 + sin·p3) -- tetrahedral other-3 directions
      var a = -1/3, b = Math.sqrt(8)/3;
      return [
        a*axisToN[0] + b*(c*p2[0] + s*p3[0]),
        a*axisToN[1] + b*(c*p2[1] + s*p3[1]),
        a*axisToN[2] + b*(c*p2[2] + s*p3[2])
      ];
    }
    var dHc1 = methylDir(0), dHc2 = methylDir(1), dHc3 = methylDir(2);
    var Cx = 0, Cy = 0, Cz = bCN;
    var Hc1 = place(Cx + bCH*dHc1[0], Cy + bCH*dHc1[1], Cz + bCH*dHc1[2]);
    var Hc2 = place(Cx + bCH*dHc2[0], Cy + bCH*dHc2[1], Cz + bCH*dHc2[2]);
    var Hc3 = place(Cx + bCH*dHc3[0], Cy + bCH*dHc3[1], Cz + bCH*dHc3[2]);

    // 3-split axis for N: along +z (C-N bond direction). Sectors around z, in xy plane,
    // align with: H_N1 (0°) / H_N2 (120°) / lone pair (240° — empty, gets pure lobe).
    var splitAxis = [0, 0, 1];

    window.USER_NN = N;
    window.USER_SCREEN = scr;
    window.USER_STEPS = 100000;
    window.USER_SHELL_MODE = true;
    window.USER_NUCLEI = [
      // C: single 4-electron orbital
      { i: Cn.i,  j: Cn.j,  k: Cn.k,  Z: 4, rc: 0.5 },                           // 0: C
      // N: 3 sub-orbitals at same position, 3-split
      { i: Nn.i, j: Nn.j, k: Nn.k, Z: 3, rc: 0.0, z_init: 3.0, split: 'third', split_idx: 0, split_axis: splitAxis }, // 1: N sector 0
      { i: Nn.i, j: Nn.j, k: Nn.k, Z: 0, rc: 0.0, z_init: 3.0, split: 'third', split_idx: 1, split_axis: splitAxis }, // 2: N sector 1
      { i: Nn.i, j: Nn.j, k: Nn.k, Z: 0, rc: 0.0, z_init: 3.0, split: 'third', split_idx: 2, split_axis: splitAxis }, // 3: N sector 2 (lone-pair side)
      // 5 H atoms
      { i: Hn1.i, j: Hn1.j, k: Hn1.k, Z: 1, rc: 0.0 },                           // 4: H_N1
      { i: Hn2.i, j: Hn2.j, k: Hn2.k, Z: 1, rc: 0.0 },                           // 5: H_N2
      { i: Hc1.i, j: Hc1.j, k: Hc1.k, Z: 1, rc: 0.0 },                           // 6: H_C1
      { i: Hc2.i, j: Hc2.j, k: Hc2.k, Z: 1, rc: 0.0 },                           // 7: H_C2
      { i: Hc3.i, j: Hc3.j, k: Hc3.k, Z: 1, rc: 0.0 },                           // 8: H_C3
    ];
    // 9 nuclei, 9 orbitals — C(4-e) + 3×N-sector(1-e) + 5×H(1-e) = 12 valence e-
    window.USER_NORM_TARGETS = [4, 1, 1, 1, 1, 1, 1, 1, 1];
    window.USER_ALPHA_TF = 0;
    window.USER_DYNAMICS = false;  // start with frozen geometry; press D to enable

    console.log('Methylamine 3-split N: 9 atoms, 9 orbitals, 12 valence e-');

    // Force diagnostic + dipole readout
    var monDiv = document.createElement('div');
    monDiv.style.cssText = 'position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,0.85);padding:10px;border:1px solid #ffa;border-radius:6px;max-width:440px;font-size:12px;z-index:100;color:#ffa';
    monDiv.textContent = 'Diagnostic: waiting…';
    document.body.appendChild(monDiv);
    var lastE = null, lastEtime = Date.now();
    setInterval(function() {
      if (!window.nucForce || !window.nuclei) return;
      // |F|_RMS over free atoms (skip locked ones)
      var maxF = 0, rmsF2 = 0, n = 0;
      for (var k = 0; k < window.nucForce.length; k++) {
        if (window.nuclei[k] && window.nuclei[k].fixed) continue;
        var fa = window.nucForce[k];
        var fm = Math.sqrt(fa[0]*fa[0] + fa[1]*fa[1] + fa[2]*fa[2]);
        if (fm > maxF) maxF = fm;
        rmsF2 += fm*fm; n++;
      }
      var rmsF = Math.sqrt(rmsF2 / Math.max(n, 1));
      var conv = rmsF < 0.001 ? '#66bb6a' : (rmsF < 0.01 ? '#ffd54f' : '#ff7043');
      // Energy
      var dEtext = '';
      if (lastE !== null && window._E !== undefined) {
        var dE = window._E - lastE;
        var dt_s = (Date.now() - lastEtime) / 1000;
        var econv = Math.abs(dE) < 1e-5 ? '#66bb6a' : (Math.abs(dE) < 1e-3 ? '#ffd54f' : '#ff7043');
        dEtext = '<span style="color:' + econv + '">E = ' + window._E.toFixed(4) + ' Ha &nbsp; ΔE/Δt = ' + (dE/Math.max(dt_s,0.001)).toExponential(2) + ' Ha/s</span>';
      } else if (window._E !== undefined) {
        dEtext = 'E = ' + window._E.toFixed(4);
      }
      if (window._E !== undefined) {
        lastE = window._E;
        lastEtime = Date.now();
      }
      monDiv.innerHTML =
        '<b>Methylamine 3-split N — diagnostic</b><br>' +
        '<span style="color:' + conv + '">|F|<sub>RMS</sub> = ' + rmsF.toFixed(4) + ' Ha/au &nbsp; |F|<sub>max</sub> = ' + maxF.toFixed(4) + '</span><br>' +
        '<span style="color:#888;font-size:11px">QC converged: RMS &lt; 1e-3 — dipole below from mol_fast readout</span><br>' +
        dEtext +
        '<br><span style="color:#888;font-size:11px">Press D to enable dynamics — see if RealQM minimum is near experimental geometry</span>';
    }, 500);
  })();

  var loadEl = document.getElementById('loadStatus');
  var s = document.createElement('script');
  s.src = 'mol_fast.js?t=' + Date.now();
  s.onload = function() {
    loadEl.textContent += '\nmol_fast.js loaded';
    var p = document.createElement('script');
    p.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
    p.onload = function() { if (loadEl && loadEl.parentNode) loadEl.parentNode.removeChild(loadEl); };
    document.body.appendChild(p);
  };
  s.onerror = function() { loadEl.textContent += '\nFAILED to load mol_fast.js'; loadEl.style.color = '#f44'; };
  document.body.appendChild(s);
</script>
</body></html>
