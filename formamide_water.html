<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>Formamide + water — peptide-bond solvation</title>
  <style>body { margin: 0; background: #000; color: #fff; font-family: monospace; }</style>
</head><body>
<div id="info" style="position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.8);padding:10px;border:1px solid #333;border-radius:6px;max-width:440px;font-size:12px;z-index:100">
  <div style="color:#ffa;font-weight:bold">Formamide + water — peptide solvation</div>
  HCONH<sub>2</sub> (simplest peptide-bond analog) with one water near C=O.
  Water H ⋯ O(formamide) H-bond should form. Target H⋯O ≈ 2 Å.
  URL <b>?sep=N</b> = initial water-O to formamide-O distance (default 4 au).
</div>
<script>
(function() {
  var gridN = 180, scr = 18, N2 = 90;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, el, Z) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  // Formamide HCONH2 geometry (Å)
  var ax = A;
  addAtom( 0.0 * ax,  0.0 * ax, 0, 'C', 4);      // 0: carbonyl C
  addAtom( 1.22 * ax, 0.0 * ax, 0, 'O', 2);      // 1: C=O (H-bond acceptor)
  addAtom(-0.7 * ax,  1.2 * ax, 0, 'N', 3);      // 2: amide N
  addAtom(-0.5 * ax, -1.05 * ax, 0, 'H', 1);     // 3: formyl H (on C)
  addAtom(-0.2 * ax,  2.0 * ax, 0, 'H', 1);      // 4: N-H trans
  addAtom(-1.7 * ax,  1.25 * ax, 0, 'H', 1);     // 5: N-H cis

  // Water near C=O along +x axis
  var urlSep = parseFloat(new URLSearchParams(location.search).get('sep'));
  var sep = isFinite(urlSep) ? urlSep : 4.0;  // water O to formamide O distance in au
  var waterTriplets = [];
  var bOH = 0.96 * A;
  var wOx = 1.22 * ax + sep;   // water O along +x from formamide O
  var wO_idx = atoms.length;
  addAtom(wOx, 0, 0, 'O', 2);                                            // 6: water O
  addAtom(wOx - bOH * Math.sin(52 * Math.PI / 180), bOH * Math.cos(52 * Math.PI / 180), 0, 'H', 1);  // 7: water H1 (toward formamide O)
  addAtom(wOx + bOH * 0.5, -bOH * 0.87, 0, 'H', 1);                      // 8: water H2 (away)
  waterTriplets.push([wO_idx, wO_idx + 1, wO_idx + 2]);
  // Note: H1 (atom 7) is the one pointing AT formamide's O.

  window.USER_WATER_TRIPLETS = waterTriplets;
  window.USER_BEND_K = 1.5;

  window.USER_BOND_PAIRS = [
    [1, 7, "O_form⋯H_water:"],
    [1, 6, "O_form⋯O_water:"]
  ];
  window.USER_BOND_MAX_AU = 5.0;

  // Monitor H-bond distance (formamide O ⋯ water H1)
  setInterval(function() {
    if (typeof nucPos === 'undefined' || !nucPos[1] || !nucPos[7] || !nucPos[6]) return;
    function dist(i, j) {
      var dx = (nucPos[i][0] - nucPos[j][0]) * h;
      var dy = (nucPos[i][1] - nucPos[j][1]) * h;
      var dz = (nucPos[i][2] - nucPos[j][2]) * h;
      return Math.sqrt(dx*dx + dy*dy + dz*dz);
    }
    var dHbond = dist(1, 7);  // formamide O ⋯ water H1
    var dOO = dist(1, 6);     // formamide O ⋯ water O
    window._ooDist = 'O_form⋯H_water = ' + dHbond.toFixed(2) + ' au (' + (dHbond/A).toFixed(2) + ' Å, target 1.9)  |  O⋯O = ' + dOO.toFixed(2) + ' au';
  }, 500);

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  setInterval(function() {
    if (typeof phaseSteps !== 'undefined' && phaseSteps > 5000 && typeof dynamicsEnabled !== 'undefined' && !dynamicsEnabled) {
      window.dynamicsEnabled = true;
    }
  }, 500);
  window.USER_FORCE_SCALE = 1.0;
  setInterval(function() {
    if (typeof nucStepCount !== 'undefined' && nucStepCount > 2000 && window.USER_FORCE_SCALE < 5) {
      window.USER_FORCE_SCALE = 10.0;
    }
  }, 200);
  window.USER_ARROW_SCALE = 50.0;
  window.USER_TEMPERATURE_K = 0;
  window.USER_LANGEVIN_GAMMA = 0.2;
  window.USER_NUC_SUBSTEPS = 10;
  window.USER_N_MOVE = 30;
  window.USER_THERMAL_KICK = 0;
  window.USER_ROT_SPEED = 0.005;
  window.USER_GRADP_FORCE = true;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });
  window.INIT_ZEFF = 2;
  console.log('Formamide+water: sep=' + sep + ' au initial');
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p = document.createElement('script');
  p.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p);
};
document.body.appendChild(s);
</script>
</body></html>
