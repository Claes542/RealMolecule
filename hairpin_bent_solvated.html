<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Beta hairpin 12-residue polyglycine — SLIGHTLY BENT + solvation shell
// Chain follows a gentle arc (bend angle ~150°), not folded into a hairpin
// Water molecules surround the chain to provide hydrophobic pressure
(function() {
  var gridN = 300, scr = 80, N2 = 150;
  var h = scr / gridN;
  var A = 1.8897; // angstrom to au
  var atoms = [];

  function addAtom(au_x, au_y, Z, el) {
    atoms.push({
      i: Math.round(N2 + au_x / h),
      j: Math.round(N2 + au_y / h),
      Z: Z, el: el, x: au_x, y: au_y
    });
  }

  var nRes = 12;
  var resAdv = 3.4 * A;   // ~6.4 au per residue
  var zig = 0.5 * A;

  // Lay out backbone as two straight strands with sharp turn at middle
  // Fold angle = angle between strands at hinge (20°)
  var openingAngle = 170 * Math.PI / 180; // angle between the two strands at top

  // Place backbone: U-shape with smooth turn at bottom
  var bb = [];
  var hingeIdx = 5.5;
  var turnWidth = 2.5; // smoothness of turn

  // Tangent angles: strand1 goes up-left, U-turn at bottom, strand2 goes up-right
  // Strand1 direction: PI/2 + opening/2 (up and slightly left)
  // Strand2 direction: PI/2 - opening/2 (up and slightly right)
  // Total sweep through the turn: PI - openingAngle
  var angle1 = Math.PI / 2 + openingAngle / 2; // strand1 tangent (up-left)
  var angle2 = Math.PI / 2 - openingAngle / 2; // strand2 tangent (up-right)
  // But strand1 residues go from tip DOWN to turn, so tangent is reversed
  var startAngle = -(Math.PI - angle1); // going downward along strand1
  var endAngle = angle2;                // going upward along strand2

  var angles = [];
  for (var r = 0; r < nRes; r++) {
    var blend = 0.5 * (1 + Math.tanh((r - hingeIdx) / turnWidth));
    angles.push(startAngle * (1 - blend) + endAngle * blend);
  }

  // Integrate positions along the chain
  var positions = [{x: 0, y: 0}];
  for (var r = 1; r < nRes; r++) {
    var avgAngle = (angles[r - 1] + angles[r]) / 2;
    positions.push({
      x: positions[r - 1].x + resAdv * Math.cos(avgAngle),
      y: positions[r - 1].y + resAdv * Math.sin(avgAngle)
    });
  }

  // Center the chain
  var sumX = 0, sumY = 0;
  for (var r = 0; r < nRes; r++) { sumX += positions[r].x; sumY += positions[r].y; }
  var cenX = sumX / nRes, cenY = sumY / nRes;

  for (var r = 0; r < nRes; r++) {
    var cx = positions[r].x - cenX;
    var cy = positions[r].y - cenY;
    var tlx = Math.cos(angles[r]);
    var tly = Math.sin(angles[r]);
    // Normal (perpendicular)
    var nx = -tly;
    var ny = tlx;
    var zigSign = (r % 2 === 0) ? 1 : -1;

    // Shift hinge down so full hairpin fits on screen
    var yShift = 0;
    bb.push({
      N:  [cx - 0.35 * resAdv * tlx + zigSign * zig * 0.6 * nx,
           cy - 0.35 * resAdv * tly + zigSign * zig * 0.6 * ny + yShift],
      Ca: [cx,
           cy - zigSign * zig * 0.4 * ny + yShift],
      C:  [cx + 0.35 * resAdv * tlx + zigSign * zig * 0.3 * nx,
           cy + 0.35 * resAdv * tly + zigSign * zig * 0.3 * ny + yShift]
    });
  }

  // Place atoms for each residue
  for (var r = 0; r < nRes; r++) {
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var nca_x = Cap[0] - Np[0], nca_y = Cap[1] - Np[1];
    var nca_l = Math.sqrt(nca_x * nca_x + nca_y * nca_y);
    var nca_px = -nca_y / nca_l, nca_py = nca_x / nca_l;
    var cac_x = Cp[0] - Cap[0], cac_y = Cp[1] - Cap[1];
    var cac_l = Math.sqrt(cac_x * cac_x + cac_y * cac_y);
    var cac_px = -cac_y / cac_l, cac_py = cac_x / cac_l;

    // N
    addAtom(Np[0], Np[1], 3, 'N');
    // H on N
    var nhSide = (r < 6) ? -1 : 1;
    addAtom(Np[0] + nhSide * nca_px * 1.01 * A, Np[1] + nhSide * nca_py * 1.01 * A, 1, 'H');
    if (r === 0) {
      addAtom(Np[0] - nhSide * nca_px * 1.01 * A, Np[1] - nhSide * nca_py * 1.01 * A, 1, 'H');
    }
    // Ca
    addAtom(Cap[0], Cap[1], 4, 'C');
    // 2 H on Ca
    addAtom(Cap[0] + cac_px * 1.09 * A, Cap[1] + cac_py * 1.09 * A, 1, 'H');
    addAtom(Cap[0] - cac_px * 1.09 * A, Cap[1] - cac_py * 1.09 * A, 1, 'H');
    // Carbonyl C
    addAtom(Cp[0], Cp[1], 4, 'C');
    // Carbonyl O
    var oSide = (r < 6) ? ((r % 2 === 0) ? 1 : -1) : ((r % 2 === 0) ? -1 : 1);
    addAtom(Cp[0] + oSide * cac_px * 1.24 * A, Cp[1] + oSide * cac_py * 1.24 * A, 2, 'O');
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc_x = lastC[0] - lastCa[0], lc_y = lastC[1] - lastCa[1];
  var lc_l = Math.sqrt(lc_x * lc_x + lc_y * lc_y);
  var oh_x = lastC[0] + lc_x / lc_l * 1.34 * A;
  var oh_y = lastC[1] + lc_y / lc_l * 1.34 * A;
  addAtom(oh_x, oh_y, 2, 'O');
  addAtom(oh_x + lc_x / lc_l * 0.97 * A, oh_y + lc_y / lc_l * 0.97 * A, 1, 'H');

  var nProtein = atoms.length;

  // --- Solvation shell: surround entire chain ---
  var ohBond = 0.96 * A;
  var halfAngle = 52.25 * Math.PI / 180;
  var waterSpacing = 2.8 * A;
  var minDist = 2.5 * A;
  var shellDist = 8 * A;   // place water within this distance of any protein atom
  var gridLimit = scr / 2 - 8; // stay well within grid boundaries

  // Inside/outside U test using angular wedge from turn center
  // Turn center = midpoint of positions 5 and 6 (centered)
  var turnCx = (positions[5].x + positions[6].x) / 2 - cenX;
  var turnCy = (positions[5].y + positions[6].y) / 2 - cenY;
  // Strand tips (centered)
  var tip1x = positions[0].x - cenX, tip1y = positions[0].y - cenY;
  var tip2x = positions[11].x - cenX, tip2y = positions[11].y - cenY;
  // Angles from turn center to each tip
  var ang1 = Math.atan2(tip1y - turnCy, tip1x - turnCx);
  var ang2 = Math.atan2(tip2y - turnCy, tip2x - turnCx);
  // Ensure ang1 < ang2 (ang1 = left strand, ang2 = right strand)
  if (ang1 > ang2) { var tmp = ang1; ang1 = ang2; ang2 = tmp; }

  function isInsideU(wx, wy) {
    var ang = Math.atan2(wy - turnCy, wx - turnCx);
    // Inside if angle is between the two strand directions (within the wedge)
    return ang > ang1 && ang < ang2;
  }

  var nWater = 0;
  for (var wx = -gridLimit; wx <= gridLimit; wx += waterSpacing) {
    for (var wy = -gridLimit; wy <= gridLimit; wy += waterSpacing) {
      // Place water all around (no inside/outside filtering)

      // Check proximity to protein: must be near some atom but not too close
      var tooClose = false;
      var nearProtein = false;
      for (var p = 0; p < nProtein; p++) {
        var dx = wx - atoms[p].x, dy = wy - atoms[p].y;
        var d2 = dx * dx + dy * dy;
        if (d2 < minDist * minDist) { tooClose = true; break; }
        if (d2 < shellDist * shellDist) nearProtein = true;
      }
      if (tooClose || !nearProtein) continue;

      var angle = (wx * 7.3 + wy * 11.1) % (2 * Math.PI);
      addAtom(wx, wy, 2, 'O');
      addAtom(wx + ohBond * Math.cos(angle + halfAngle),
              wy + ohBond * Math.sin(angle + halfAngle), 1, 'H');
      addAtom(wx + ohBond * Math.cos(angle - halfAngle),
              wy + ohBond * Math.sin(angle - halfAngle), 1, 'H');
      nWater++;
    }
  }

  console.log('Bent solvated hairpin: ' + nProtein + ' protein atoms + ' +
              nWater + ' waters (' + (nWater * 3) + ' water atoms) = ' +
              atoms.length + ' total');

  // Atom indices for fold angle measurement:
  // Residue 0: N(0) H(1) H(2) Ca(3) Ha(4) Ha(5) C(6) O(7) = 8 atoms
  // Residue r (r>=1): N(7r+1) H(7r+2) Ca(7r+3) Ha(7r+4) Ha(7r+5) C(7r+6) O(7r+7)
  // Strand1 end = N of residue 0 (atom 0)
  // Hinge = Ca of residue 6 (atom 6*7+3 = 45)
  // Strand2 end = C of residue 11 (atom 11*7+6 = 83)
  // After 12 residues: 85 backbone atoms + C-term O(85) H(86) = 87 protein atoms
  window.USER_FOLD_ATOMS = [0, 45, 83];

  // Elastic backbone: each residue is a bead on an elastic string
  // Ca atom indices: res0=3, res_r(r>=1)=7r+3+1=7r+4...
  // Res0: atoms 0-7, Ca at index 3
  // Res r (r>=1): atoms 7r+1 to 7r+7, Ca at index 7r+3
  var caIndices = [3]; // residue 0
  for (var r = 1; r < 12; r++) caIndices.push(7*r + 3);

  // Groups: which atoms belong to each residue
  var elasticGroups = [];
  elasticGroups.push([0,1,2,3,4,5,6,7]); // residue 0
  for (var r = 1; r < 12; r++) {
    var g = [];
    for (var a = 7*r+1; a <= 7*r+7; a++) g.push(a);
    elasticGroups.push(g);
  }
  elasticGroups.push([85, 86]); // C-terminal OH (no Ca, follows last residue)

  // Store initial offsets in LOCAL frame (tangent, normal) relative to Ca
  // This way offsets can be rotated when backbone bends
  var elasticOffsets = [];
  for (var g = 0; g < 12; g++) {
    var caIdx = caIndices[g];
    // Compute initial tangent at this Ca
    var tx, ty;
    if (g === 0) { tx = atoms[caIndices[1]].i - atoms[caIndices[0]].i; ty = atoms[caIndices[1]].j - atoms[caIndices[0]].j; }
    else if (g === 11) { tx = atoms[caIndices[11]].i - atoms[caIndices[10]].i; ty = atoms[caIndices[11]].j - atoms[caIndices[10]].j; }
    else { tx = atoms[caIndices[g+1]].i - atoms[caIndices[g-1]].i; ty = atoms[caIndices[g+1]].j - atoms[caIndices[g-1]].j; }
    var tl = Math.sqrt(tx*tx + ty*ty);
    tx /= tl; ty /= tl;
    var nx = -ty, ny = tx; // normal

    var groupOffsets = [];
    for (var k = 0; k < elasticGroups[g].length; k++) {
      var ai = elasticGroups[g][k];
      var dx = atoms[ai].i - atoms[caIdx].i;
      var dy = atoms[ai].j - atoms[caIdx].j;
      // Project offset onto tangent and normal
      groupOffsets.push({
        di: dx * tx + dy * ty,   // tangent component
        dj: dx * nx + dy * ny    // normal component
      });
    }
    elasticOffsets.push(groupOffsets);
  }
  // C-term OH offsets relative to last Ca (use last Ca's frame)
  var lastCaIdx = caIndices[11];
  var ltx = atoms[caIndices[11]].i - atoms[caIndices[10]].i;
  var lty = atoms[caIndices[11]].j - atoms[caIndices[10]].j;
  var ltl = Math.sqrt(ltx*ltx + lty*lty);
  ltx /= ltl; lty /= ltl;
  var lnx = -lty, lny = ltx;
  var ctOffsets = [];
  for (var ct = 85; ct <= 86; ct++) {
    var dx = atoms[ct].i - atoms[lastCaIdx].i;
    var dy = atoms[ct].j - atoms[lastCaIdx].j;
    ctOffsets.push({ di: dx * ltx + dy * lty, dj: dx * lnx + dy * lny });
  }
  elasticOffsets.push(ctOffsets);

  // Equilibrium Ca-Ca distance (in grid units)
  var ca0 = caIndices[0], ca1 = caIndices[1];
  var r0_grid = Math.sqrt(
    (atoms[ca1].i - atoms[ca0].i) * (atoms[ca1].i - atoms[ca0].i) +
    (atoms[ca1].j - atoms[ca0].j) * (atoms[ca1].j - atoms[ca0].j)
  );

  window.USER_ELASTIC_BACKBONE = {
    caIndices: caIndices,         // Ca atom index for each residue
    groups: elasticGroups,        // atom indices per residue
    offsets: elasticOffsets,       // initial offsets from Ca per group
    r0: r0_grid,                  // equilibrium Ca-Ca distance (grid units)
    springK: 50.0,                // spring constant
    elasticSteps: 20,             // elastic relaxation steps per quantum force update
    elasticDt: 0.05              // elastic timestep
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;      // start with nuclear motion on
  window.USER_FORCE_SCALE = 5.0;  // 5x force for dynamics
  window.USER_DAMPING = 0.5;  // heavy damping — overdamped regime
  window.USER_NUC_SUBSTEPS = 10;  // 10 position updates per force computation
  window.USER_ARROW_SCALE = 10.0;   // arrow display
  window.USER_PROTEIN_COUNT = nProtein;  // for coloring force arrows
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
