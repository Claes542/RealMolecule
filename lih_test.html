<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// LiH: Li(+1 kernel, 1 electron, r_c=0.5) + H(Z=1)
// Bond length: 1.60 Å experimental
(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  var sep = 1.60 * A;  // LiH reference distance
  addAtom(-sep/2, 0, 0, 1, 'Li');     // 0: Li (Z=1)
  addAtom(sep/2, 0, 0, 1, 'H');       // 1: H

  console.log('LiH: Li(Z=1,r_c=0.5) + H(Z=1) at ' + (sep*0.529177).toFixed(2) + ' Å');

  window.USER_BOND_PAIRS = [
    [0, 1, "Li-H:"],
  ];

  window.USER_REFERENCE = {
    bonds: { "Li-H": "1.60" },
    energy: "LiH: -8.07 Ha",
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [1, 1];
  window.USER_RC = [0.8, 0];
  window.INIT_ZEFF = 2;  // compact initial wavefunction
  // both free — should behave like H2
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
