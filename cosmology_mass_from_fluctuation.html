<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cosmology: mass generated by the Laplacian of a gravitational-potential fluctuation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>body{margin:0;background:#000;color:#ddd;font-family:monospace}</style>
</head>
<body>
<script>
// 2D test: mass GENERATED by the Laplacian of a gravitational-potential fluctuation
// (rho = Lap(phi)), then compressible self-gravitating flow -- same-sign mass attracts,
// opposite repels -- do LARGER same-sign regions form (without collapse)?
// Conservation of mass/momentum/energy; explicit (conservative) step; periodic BC.
//   v = m/(|rho|+C)  (no blow-up at rho=0 crossings);  |grad phi| capped (no collapse).

let vx=[],vy=[],mx=[],my=[],rho=[],e=[],p=[],phi=[],tmp=[];
let omx=[],omy=[],orho=[],oe=[];
let N=200, h, dt, t=0, T=0;
let gamma=0.6;
let F=10, C=0.50, GMAX=40, VISC=0.10, SMOOTH=14;
let MAP=500;
let sV,sC,sG,sS,sF,sSm,sN,btn;
let SX, SY0=44, SDY=27;

function A(){let a=[];for(let i=-1;i<N+1;i++){a[i]=[];for(let j=-1;j<N+1;j++)a[i][j]=0;}return a;}
function ghost(a){for(let i=0;i<N;i++){a[i][-1]=a[i][N-1];a[i][N]=a[i][0];a[-1][i]=a[N-1][i];a[N][i]=a[0][i];}}

function seed(){
  for(let i=0;i<N;i++)for(let j=0;j<N;j++)phi[i][j]=random(-1,1); ghost(phi);
  for(let s=0;s<SMOOTH;s++){
    for(let i=0;i<N;i++)for(let j=0;j<N;j++)
      tmp[i][j]=0.5*phi[i][j]+0.125*(phi[i+1][j]+phi[i-1][j]+phi[i][j+1]+phi[i][j-1]);
    for(let i=0;i<N;i++)for(let j=0;j<N;j++)phi[i][j]=tmp[i][j]; ghost(phi);
  }
  let mxa=1e-9;
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){
    rho[i][j]=phi[i+1][j]+phi[i-1][j]+phi[i][j+1]+phi[i][j-1]-4*phi[i][j];   // rho = Lap(phi)
    if(abs(rho[i][j])>mxa)mxa=abs(rho[i][j]);
  }
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){rho[i][j]=F*rho[i][j]/mxa; e[i][j]=abs(rho[i][j]);}
  for(let i=-1;i<N+1;i++)for(let j=-1;j<N+1;j++){phi[i][j]=0;mx[i][j]=0;my[i][j]=0;vx[i][j]=0;vy[i][j]=0;}
  ghost(rho); ghost(e); T=0;
}
function poisson(iters){
  for(let q=0;q<iters;q++){
    for(let i=0;i<N;i++)for(let j=0;j<N;j++)
      phi[i][j]=phi[i][j]+0.1*dt*((phi[i+1][j]+phi[i-1][j]-4*phi[i][j]+phi[i][j+1]+phi[i][j-1])/(h*h)+100*rho[i][j]);
    ghost(phi);
  }
}
function initGrid(){
  vx=A();vy=A();mx=A();my=A();rho=A();e=A();p=A();phi=A();tmp=A();
  omx=A();omy=A();orho=A();oe=A();
  h=1/N; dt=0.005*h; seed(); poisson(3000);
}
function reseedNow(){ F=sF.value(); SMOOTH=sSm.value(); seed(); poisson(3000); }
function gp(a){ return constrain(a,-GMAX,GMAX); }

function step(){
  poisson(10);
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){
    vx[i][j]=mx[i][j]/(abs(rho[i][j])+C);
    vy[i][j]=my[i][j]/(abs(rho[i][j])+C);
    p[i][j]=gamma*e[i][j];
  }
  ghost(vx); ghost(vy); ghost(p);
  for(let i=-1;i<N+1;i++)for(let j=-1;j<N+1;j++){omx[i][j]=mx[i][j];omy[i][j]=my[i][j];orho[i][j]=rho[i][j];oe[i][j]=e[i][j];}
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){
    mx[i][j]=omx[i][j]+VISC*dt*(vx[i+1][j]+vx[i-1][j]-4*vx[i][j]+vx[i][j+1]+vx[i][j-1])/h
      -0.5*dt*(vx[i+1][j]*omx[i+1][j]-vx[i-1][j]*omx[i-1][j])/h
      -0.5*dt*(vy[i][j+1]*omx[i][j+1]-vy[i][j-1]*omx[i][j-1])/h
      -dt*gamma*(oe[i+1][j]-oe[i-1][j])/h + dt*orho[i][j]*gp((phi[i+1][j]-phi[i-1][j])/h);
    my[i][j]=omy[i][j]+VISC*dt*(vy[i+1][j]+vy[i-1][j]-4*vy[i][j]+vy[i][j+1]+vy[i][j-1])/h
      -0.5*dt*(vx[i+1][j]*omy[i+1][j]-vx[i-1][j]*omy[i-1][j])/h
      -0.5*dt*(vy[i][j+1]*omy[i][j+1]-vy[i][j-1]*omy[i][j-1])/h
      -dt*gamma*(oe[i][j+1]-oe[i][j-1])/h + dt*orho[i][j]*gp((phi[i][j+1]-phi[i][j-1])/h);
    rho[i][j]=orho[i][j]+VISC*dt*(orho[i+1][j]+orho[i-1][j]-4*orho[i][j]+orho[i][j+1]+orho[i][j-1])/h
      -0.5*dt*(omx[i+1][j]-omx[i-1][j])/h-0.5*dt*(omy[i][j+1]-omy[i][j-1])/h;
    e[i][j]=oe[i][j]+VISC*dt*(oe[i+1][j]+oe[i-1][j]-4*oe[i][j]+oe[i][j+1]+oe[i][j-1])/h
      -0.5*dt*(vx[i+1][j]*oe[i+1][j]-vx[i-1][j]*oe[i-1][j])/h
      -0.5*dt*(vy[i][j+1]*oe[i][j+1]-vy[i][j-1]*oe[i][j-1])/h
      -dt*gamma*oe[i][j]*(vx[i+1][j]-vx[i-1][j]+vy[i][j+1]-vy[i][j-1])/h
      +dt*phi[i][j]*(omx[i+1][j]-omx[i-1][j]+omy[i][j+1]-omy[i][j-1])/h;
  }
  ghost(mx); ghost(my); ghost(e); ghost(rho); ghost(phi);
  t+=dt; T+=dt;
}

function setup(){
  createCanvas(MAP+430, MAP+40);
  initGrid();
  SX=MAP+170;
  sV=createSlider(0.05,3,VISC,0.05);  sV.position(SX,SY0+0*SDY); sV.style('width','150px');
  sC=createSlider(0.2,5,C,0.1);       sC.position(SX,SY0+1*SDY); sC.style('width','150px');
  sG=createSlider(5,120,GMAX,5);      sG.position(SX,SY0+2*SDY); sG.style('width','150px');
  sS=createSlider(1,30,10,1);         sS.position(SX,SY0+3*SDY); sS.style('width','150px');
  sF=createSlider(2,30,F,1);          sF.position(SX,SY0+4*SDY); sF.style('width','150px');
  sSm=createSlider(2,30,SMOOTH,1);    sSm.position(SX,SY0+5*SDY); sSm.style('width','150px');
  sN=createSlider(50,320,N,10);       sN.position(SX,SY0+6*SDY); sN.style('width','150px');
  btn=createButton('reseed');         btn.position(SX,SY0+7*SDY); btn.mousePressed(reseedNow);
}

function draw(){
  background(0);
  if(sN.value()!==N){ N=sN.value(); initGrid(); }
  VISC=sV.value(); C=sC.value(); GMAX=sG.value();
  let steps=sS.value();
  for(let q=0;q<steps;q++) step();
  // 2D density map
  let cs=MAP/N; noStroke();
  let mxr=0; for(let i=0;i<N;i++)for(let j=0;j<N;j++) if(abs(rho[i][j])>mxr)mxr=abs(rho[i][j]);
  let sc=(mxr>1e-6)?mxr:1;
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){
    let v=rho[i][j], mg=Math.pow(constrain(abs(v)/sc,0,1),0.55);
    let c=Math.round(255*mg), y=Math.round(255*mg*mg);
    if(v>=0) fill(c,y,0); else fill(0,y,c);   // +mass: red->yellow (warm);  -mass: blue->cyan (cool); void: black
    rect(i*cs,j*cs,cs+1,cs+1);
  }
  stroke(70); noFill(); rect(0,0,MAP,MAP); noStroke();
  let tot=0; for(let i=0;i<N;i++)for(let j=0;j<N;j++)tot+=rho[i][j];
  // labels
  let lx=MAP+16; fill(255); textSize(13);
  text("Mass from a gravitational-potential fluctuation",lx,20);
  textSize(11); fill(210);
  let names=["viscosity  "+VISC.toFixed(2),
             "|rho| floor C  "+C.toFixed(2),
             "|grad phi| cap  "+GMAX.toFixed(0),
             "steps / frame  "+steps,
             "amplitude F  "+sF.value()+"  (reseed)",
             "blob size  "+sSm.value()+"  (reseed)",
             "mesh N  "+N];
  for(let k=0;k<names.length;k++) text(names[k], lx, SY0+k*SDY+13);
  // info block below the sliders
  fill(190); let iy=SY0+8*SDY+18;
  let info=["rho = Lap(phi)  (Poisson run backwards)",
            "Lap phi = rho,  v = m/(|rho|+C),  p = gamma e",
            "same-sign ATTRACTS, opposite REPELS",
            "explicit conservative step, periodic BC",
            "",
            "warm (red->yellow) = +mass",
            "cool (blue->cyan) = -mass,   black = void",
            "total mass = "+tot.toFixed(5)+"   (conserved)",
            "max|rho| = "+mxr.toFixed(2)+",   t = "+T.toFixed(3),
            "",
            "Do +/- blobs merge into LARGER",
            "same-sign regions, without collapse?"];
  for(let k=0;k<info.length;k++) text(info[k], lx, iy+13*k);
}
function keyPressed(){
  if(key==='s'||key==='S') saveCanvas('cosmic_web_pm','png');   // save figure
  if(key==='r'||key==='R') reseedNow();
}
</script>
</body>
</html>
