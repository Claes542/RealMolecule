<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building GB1...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Protein G B1 domain (1PGB): 56 residues, α+β fold
// MTYKLILNGKTLKGETTTEAVDAATAEKVFKQYANDNGVDGEWTYDDATKTFTVTE
// Structure: β1(2-8) + turn + β2(13-19) + helix(23-36) + β3(42-46) + β4(51-56)
// 4-stranded β-sheet with α-helix packed against it
(function() {
  var gridN = 300, scr = 90;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;
  var nRes = 56;
  var seq = ['M','T','Y','K','L','I','L','N','G','K',
             'T','L','K','G','E','T','T','T','E','A',
             'V','D','A','A','T','A','E','K','V','F',
             'K','Q','Y','A','N','D','N','G','V','D',
             'G','E','W','T','Y','D','D','A','T','K',
             'T','F','T','V','T','E'];

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  // Bond lengths
  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;

  // Compact spiral start
  var resAdv = 3.8 * A;
  var helixRadius = 14.0; // au — tighter to fit 90 au box
  var helixRise = 1.5;    // au per residue
  var helixAngle = 2 * Math.PI / 5.5; // ~65° per residue
  var z0 = -(nRes - 1) * helixRise / 2;

  var bb = [];
  for (var r = 0; r < nRes; r++) {
    var angle = r * helixAngle;
    var cx = helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = z0 + r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty =  helixRadius * Math.cos(angle) * helixAngle;
    var tz = helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
  }

  // Track indices
  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function normalize(v) { var l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])+1e-10; return [v[0]/l,v[1]/l,v[2]/l]; }

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca = [Cap[0]-Np[0], Cap[1]-Np[1], Cap[2]-Np[2]];
    var nca_n = normalize(nca);
    var cac = [Cp[0]-Cap[0], Cp[1]-Cap[1], Cp[2]-Cap[2]];
    var cac_n = normalize(cac);
    var perp = normalize(cross(nca_n, cac_n));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,0,1]));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,1,0]));
    var perp2 = normalize(cross(nca_n, perp));

    // N
    pushAtom(Np[0], Np[1], Np[2], 'N', 3);

    // H on N (not for Pro)
    if (!isPro) {
      amideHIdx.push(atoms.length);
      pushAtom(Np[0] + perp[0]*bNH, Np[1] + perp[1]*bNH, Np[2] + perp[2]*bNH, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    // Extra H on N-terminus
    if (r === 0) {
      pushAtom(Np[0] - perp[0]*bNH, Np[1] - perp[1]*bNH, Np[2] - perp[2]*bNH, 'H', 1);
    }

    // Ca
    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], Cap[2], 'C', 4);

    // Ha + sidechain
    if (isGly) {
      pushAtom(Cap[0] + perp[0]*bCH, Cap[1] + perp[1]*bCH, Cap[2] + perp[2]*bCH, 'H', 1);
      pushAtom(Cap[0] - perp[0]*bCH, Cap[1] - perp[1]*bCH, Cap[2] - perp[2]*bCH, 'H', 1);
    } else {
      pushAtom(Cap[0] + perp[0]*bCH*0.7 + perp2[0]*bCH*0.7,
               Cap[1] + perp[1]*bCH*0.7 + perp2[1]*bCH*0.7,
               Cap[2] + perp[2]*bCH*0.7 + perp2[2]*bCH*0.7, 'H', 1);
      var cbX = Cap[0] - perp[0]*bCaCb*0.8;
      var cbY = Cap[1] - perp[1]*bCaCb*0.8;
      var cbZ = Cap[2] - perp[2]*bCaCb*0.8;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        var hx = perp[0]*Math.cos(phi) + perp2[0]*Math.sin(phi);
        var hy = perp[1]*Math.cos(phi) + perp2[1]*Math.sin(phi);
        var hz = perp[2]*Math.cos(phi) + perp2[2]*Math.sin(phi);
        pushAtom(cbX + hx*bCH*0.8, cbY + hy*bCH*0.8, cbZ + hz*bCH*0.8, 'H', 1);
      }
    }

    // Carbonyl C
    pushAtom(Cp[0], Cp[1], Cp[2], 'C', 4);

    carbonylOIdx.push(atoms.length);
    pushAtom(Cp[0] + perp[0]*bCO, Cp[1] + perp[1]*bCO, Cp[2] + perp[2]*bCO, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc = normalize([lastC[0]-lastCa[0], lastC[1]-lastCa[1], lastC[2]-lastCa[2]]);
  var ctOx = lastC[0] + lc[0]*1.34*A, ctOy = lastC[1] + lc[1]*1.34*A, ctOz = lastC[2] + lc[2]*1.34*A;
  pushAtom(ctOx, ctOy, ctOz, 'O', 2);
  pushAtom(lastC[0] + lc[0]*(1.34*A+bOH), lastC[1] + lc[1]*(1.34*A+bOH), lastC[2] + lc[2]*(1.34*A+bOH), 'H', 1);

  var nProtein = atoms.length;

  log.textContent = 'GB1 (spiral start): ' + atoms.length + ' atoms, ' + nRes + ' residues';
  log.textContent += '\nβ1(2-8) + β2(13-19) + helix(23-36) + β3(42-46) + β4(51-56)';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr.toFixed(1) + ' au';

  // Fold angle
  window.USER_FOLD_ATOMS = [caIndices[0], caIndices[27], caIndices[55]];

  // Build residue groups
  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  resGroups.push([nProtein - 2, nProtein - 1]);

  // Bond pairs to display
  var bondPairs = [];
  // Sample helix H-bonds
  for (var i = 23; i + 4 <= 36; i += 2) {
    if (amideHIdx[i+4] >= 0) bondPairs.push([carbonylOIdx[i], amideHIdx[i+4], "Hx:O"+i+"···H"+(i+4)+":"]);
  }
  // Core contacts
  bondPairs.push([caIndices[4], caIndices[29], "L5-F30:"]);
  bondPairs.push([caIndices[2], caIndices[42], "Y3-W43:"]);
  bondPairs.push([caIndices[5], caIndices[28], "I6-V29:"]);
  // β1-β4 (antiparallel)
  bondPairs.push([caIndices[2], caIndices[54], "β1-β4:Y3-T55:"]);
  // β2-β3
  bondPairs.push([caIndices[15], caIndices[44], "β2-β3:T16-Y45:"]);
  // End-to-end
  bondPairs.push([caIndices[0], caIndices[55], "Ca0-Ca55:"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "L5-F30": "~7",
      "Y3-W43": "~8",
      "Ca0-Ca55": "~8"
    },
    energy: "GB1: α+β fold (4-strand β-sheet + helix)",
    binding: "Native: β-sheet(1-8,13-19,42-46,51-56) + helix(23-36)"
  };

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A,
    contactBias: {
      // Alpha helix H-bonds (res 23-36): i→i+4
      hbonds: (function() {
        var hb = [];
        for (var i = 23; i + 4 <= 36; i++) {
          if (amideHIdx[i+4] >= 0) hb.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "Hx:O"+i+"···H"+(i+4) });
        }
        // β-sheet H-bonds: β1(2-8) ↔ β4(51-56) antiparallel
        // Antiparallel: O[i]→H[j] where j decreases as i increases
        var beta14 = [[2,55],[3,54],[4,53],[5,52],[6,51]];
        for (var b = 0; b < beta14.length; b++) {
          var bi = beta14[b][0], bj = beta14[b][1];
          if (amideHIdx[bj] >= 0) hb.push({ a: carbonylOIdx[bi], b: amideHIdx[bj], target: 2.0 * A, label: "β14:O"+bi+"···H"+bj });
          if (amideHIdx[bi] >= 0) hb.push({ a: carbonylOIdx[bj], b: amideHIdx[bi], target: 2.0 * A, label: "β14:O"+bj+"···H"+bi });
        }
        // β2(13-19) ↔ β3(42-46) antiparallel
        var beta23 = [[13,46],[14,45],[15,44],[16,43],[17,42]];
        for (var b = 0; b < beta23.length; b++) {
          var bi = beta23[b][0], bj = beta23[b][1];
          if (amideHIdx[bj] >= 0) hb.push({ a: carbonylOIdx[bi], b: amideHIdx[bj], target: 2.0 * A, label: "β23:O"+bi+"···H"+bj });
          if (amideHIdx[bi] >= 0) hb.push({ a: carbonylOIdx[bj], b: amideHIdx[bi], target: 2.0 * A, label: "β23:O"+bj+"···H"+bi });
        }
        return hb;
      })(),
      // Hydrophobic core + inter-element contacts
      contacts: [
        // Core: L5, I6, V28, F30 pack together
        { a: caIndices[4], b: caIndices[29], target: 7.0 * A, label: "L5-F30" },
        { a: caIndices[5], b: caIndices[28], target: 7.0 * A, label: "I6-V29" },
        { a: caIndices[2], b: caIndices[42], target: 8.0 * A, label: "Y3-W43" },
        { a: caIndices[4], b: caIndices[42], target: 8.0 * A, label: "L5-W43" },
        // β1-β4 strand packing
        { a: caIndices[3], b: caIndices[53], target: 5.0 * A, label: "β1-β4:K4-V54" },
        { a: caIndices[6], b: caIndices[51], target: 5.0 * A, label: "β1-β4:L7-T52" },
        // β2-β3 strand packing
        { a: caIndices[14], b: caIndices[44], target: 5.0 * A, label: "β2-β3:E15-Y45" },
        { a: caIndices[16], b: caIndices[42], target: 5.0 * A, label: "β2-β3:T17-W43" },
        // Helix-sheet packing
        { a: caIndices[26], b: caIndices[5], target: 9.0 * A, label: "Hx-β1:E27-I6" },
        { a: caIndices[30], b: caIndices[15], target: 9.0 * A, label: "Hx-β2:K31-T16" },
        // End-to-end (β1 N-term to β4 C-term, adjacent in sheet)
        { a: caIndices[0], b: caIndices[55], target: 8.0 * A, label: "Ca0-Ca55" },
        // Turn contacts
        { a: caIndices[8], b: caIndices[13], target: 8.0 * A, label: "turn1:N9-G14" },
        { a: caIndices[36], b: caIndices[42], target: 8.0 * A, label: "turn2:A37-W43" }
      ],
      hbondStrength: 0.8,
      contactStrength: 1.5
    }
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 15;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    var recorder = null, chunks = [], recording = false, recInterval = null;
    window._toggleRecording = function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      if (!recording) {
        chunks = [];
        var stream = canvas.captureStream(0);
        var track = stream.getVideoTracks()[0];
        window._recStreamTrack = track;
        var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9')
          ? 'video/webm; codecs=vp9' : 'video/webm';
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = function() {
          var blob = new Blob(chunks, { type: mimeType });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'gb1_fold.webm'; a.click();
          URL.revokeObjectURL(url);
        };
        recorder.start(1000);
        // Request frame on every p5 draw cycle (works even with slow sims)
        var origDraw = window.draw;
        window._recOrigDraw = origDraw;
        window.draw = function() { if (origDraw) origDraw(); try { track.requestFrame(); } catch(e) {} };
        recording = true;
        var dot = document.createElement('div');
        dot.id = 'rec-indicator';
        dot.style.cssText = 'position:fixed;top:10px;right:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;';
        dot.textContent = '\u25CF REC';
        document.body.appendChild(dot);
      } else {
        // Restore original draw
        if (window._recOrigDraw) { window.draw = window._recOrigDraw; window._recOrigDraw = null; }
        recorder.stop(); recording = false;
        window._recStreamTrack = null;
        var ind = document.getElementById('rec-indicator');
        if (ind) ind.remove();
      }
    };
    // Auto-start 3D view; press R to start/stop recording manually
    setTimeout(function() {
      window._view3D = true;
    }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
