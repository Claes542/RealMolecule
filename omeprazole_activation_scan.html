<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<div id="results" style="position:fixed;bottom:8px;left:8px;background:rgba(0,0,0,0.9);border:1px solid #444;padding:6px 8px;z-index:100;font-size:10px;line-height:1.25;max-width:380px"></div>
<pre id="log" style="margin:0;padding:8px;color:#8cf;font-size:12px">Building omeprazole acid-activation scan...</pre>
<script>
// ===========================================================================
//  OMEPRAZOLE acid activation (reduced, RealQM reactive scan)
// ---------------------------------------------------------------------------
//  Omeprazole is a prodrug: in acid (gastric canaliculi, pH~1) it protonates and
//  rearranges to the active cyclic sulfenamide, the pyridine N attacking the
//  benzimidazole C2 (forming the new N-C bond). We model the KEY reactive step:
//  drive the pyridine-N ... benzimidazole-C2 distance R inward and record the
//  RealQM energy, for TWO environments:
//    * 'acid'    : a bare proton on the imidazole N3 (imidazolium, +1) -- the
//                  acid trigger that makes C2 electrophilic;
//    * 'neutral' : the same core, no extra proton.
//  READ-OUT: dE(R)=E(R)-E(R0) for each. If the acid rise is shallower (or it goes
//  downhill) vs neutral, protonation is DRIVING the cyclization -- the activation.
//  EXPLORATORY: reduced reactive core (imidazole + pyridine, the S(=O)-CH2 bridge
//  omitted), hand-built gas-phase geometry, qualitative (sign/trend only).
// ===========================================================================
var variants = ['acid','neutral'];
var Rlist = [3.80, 3.00, 2.40, 1.90, 1.55];   // forming N(pyr)...C2 distance, Angstrom
var A = 1.8897;
var vIdx = 0, rIdx = 0, results = { acid:{}, neutral:{} };
(function(){ var s = sessionStorage.getItem('omzScan');
  if (s){ var st=JSON.parse(s); vIdx=st.vIdx; rIdx=st.rIdx; results=st.results; sessionStorage.removeItem('omzScan'); } })();

function buildAtoms(acid, R) {
  var c = [];
  // --- imidazole reactive ring in xy-plane (z=0); C2 the electrophile, +y toward pyridine ---
  function pent(deg){ var a=deg*Math.PI/180; return [1.15*Math.cos(a), 1.15*Math.sin(a), 0]; }
  var C2=pent(90), N1=pent(162), C5=pent(234), C4=pent(306), N3=pent(18);
  function radial(p,d){ var n=Math.hypot(p[0],p[1]); return [p[0]+d*p[0]/n, p[1]+d*p[1]/n, 0]; }
  c.push(['C',C2[0],C2[1],0]);                 // 0  C2 (attack site)
  c.push(['N',N1[0],N1[1],0]);                 // 1  N1
  c.push(['C',C5[0],C5[1],0]);                 // 2  C5
  c.push(['C',C4[0],C4[1],0]);                 // 3  C4
  c.push(['N',N3[0],N3[1],0]);                 // 4  N3
  var n1h=radial(N1,1.0), c5h=radial(C5,1.0), c4h=radial(C4,1.0);
  c.push(['H',n1h[0],n1h[1],0]);               // 5  N1-H
  c.push(['H',c5h[0],c5h[1],0]);               // 6  C5-H
  c.push(['H',c4h[0],c4h[1],0]);               // 7  C4-H
  c.push(['H',C2[0],C2[1],-1.0]);              // 8  C2-H (below plane, away from pyridine)
  // --- pyridine ring in xz-plane above C2; N points down (-z) at C2, distance R ---
  var yc=1.15, zc=R+1.39;
  function hex(deg){ var a=deg*Math.PI/180; return [1.39*Math.cos(a), yc, zc+1.39*Math.sin(a)]; }
  var Npy=hex(-90), P1=hex(-30), P2=hex(30), P3=hex(90), P4=hex(150), P5=hex(210);
  c.push(['N',Npy[0],Npy[1],Npy[2]]);          // 9  pyridine N (nucleophile)
  c.push(['C',P1[0],P1[1],P1[2]]);             //10
  c.push(['C',P2[0],P2[1],P2[2]]);             //11
  c.push(['C',P3[0],P3[1],P3[2]]);             //12
  c.push(['C',P4[0],P4[1],P4[2]]);             //13
  c.push(['C',P5[0],P5[1],P5[2]]);             //14
  function outxz(p,d){ var dx=p[0], dz=p[2]-zc, n=Math.hypot(dx,dz); return [p[0]+d*dx/n, yc, p[2]+d*dz/n]; }
  [P1,P2,P3,P4,P5].forEach(function(p){ var h=outxz(p,1.0); c.push(['H',h[0],yc,h[2]]); }); //15-19
  if (acid) { var hp=radial(N3,1.0); c.push(['Hp',hp[0],hp[1],0]); } // 20: bare proton on N3 (acid, +1)
  return c;
}

if (vIdx < variants.length) {
  var variant=variants[vIdx], R=Rlist[rIdx];
  var coords=buildAtoms(variant==='acid', R);
  var gridN=160, scr=40, gN2=Math.round(gridN/2), h=scr/gridN;   // gN2 avoids molecule.js N2 clash
  // FIX: proton rc=0 -> add the +1 as a pure potential term (Z_nuc=1) with NO Dirichlet
  // exclusion hole. The hole's sharp rim (rc>0) was contested by the flanking electron
  // domains, oscillating so E never converged at fine grid. rc=0 lets the neighbouring
  // electron domain simply cover the proton (softened at R_SING=2h).
  var Zof={H:1,C:4,N:3,O:2,Hp:0}, ZNof={H:1,C:4,N:3,O:2,Hp:1}, RCof={H:0,C:0.3,N:0.3,O:0.8,Hp:0};
  var atoms=[], zList=[], znList=[], rcList=[];
  for (var n=0;n<coords.length;n++){
    var el=coords[n][0];
    var gi=Math.max(3,Math.min(gridN-3,Math.round(gN2+coords[n][1]*A/h)));
    var gj=Math.max(3,Math.min(gridN-3,Math.round(gN2+coords[n][2]*A/h)));
    var gk=Math.max(3,Math.min(gridN-3,Math.round(gN2+coords[n][3]*A/h)));
    atoms.push({i:gi,j:gj,k:gk,Z:Zof[el],el:(el==='Hp'?'H':el)});
    zList.push(Zof[el]); znList.push(ZNof[el]); rcList.push(RCof[el]);
  }
  document.getElementById('log').textContent =
    'omeprazole activation: '+variant+'  R(N..C2)='+R.toFixed(2)+' A  ('+(vIdx*Rlist.length+rIdx+1)+'/'+(variants.length*Rlist.length)+')  '+atoms.length+' atoms';
  window.USER_BOND_PAIRS=[[0,9,"N..C2:"]];
  window.USER_REFERENCE={ energy:"Omeprazole acid activation: pyridine N -> benzimidazole C2 cyclization (acid vs neutral)" };
  window.USER_NN=gridN; window.USER_ATOMS=atoms; window.USER_SCREEN=scr;
  window.USER_STEPS=6000; window.USER_DV=0.05; window.USER_DYNAMICS=false;
  window.USER_Z=zList; window.USER_Z_NUC=znList; window.USER_RC=rcList;
  window.CONVERGENCE_THRESHOLD=0.02;
  // Fine-grid insurance (enable if 160^3 still oscillates around the proton): freeze the
  // domain partition during early relaxation, then unlock. Applied equally to acid+neutral,
  // so any partition bias cancels in the drive = dE(neutral) - dE(acid).
  // window.FREEZE_BOUNDARY=true; window.UNLOCK_AT_STEP=1500;
}

function render(){
  var div=document.getElementById('results');
  function rise(v){ var e0=results[v][Rlist[0]]; if(e0===undefined) return null;
    return Rlist.map(function(R){ var e=results[v][R]; return e===undefined?undefined:e-e0; }); }
  var rA=rise('acid'), rN=rise('neutral');
  var html='<b style="color:#0cf">Omeprazole &mdash; acid activation (N&middot;&middot;C2 cyclization)</b><br>'
    + '<span style="color:#888">&Delta;E(R)=E(R)&minus;E(R<sub>0</sub>); drive = neutral&minus;acid (acid favours cyclization if &gt;0)</span><br><br>'
    + '<table style="border-collapse:collapse"><tr style="color:#0cf"><th style="padding:1px 6px">R(&Aring;)</th><th>&Delta;E acid</th><th>&Delta;E neutral</th><th>drive</th></tr>';
  var cur=(vIdx<variants.length)?{v:variants[vIdx],R:Rlist[rIdx]}:null;
  for(var i=0;i<Rlist.length;i++){ var R=Rlist[i];
    var da=rA?rA[i]:undefined, dn=rN?rN[i]:undefined, drive=(da!==undefined&&dn!==undefined)?dn-da:undefined;
    var run=cur&&cur.R===R&&results[cur.v][R]===undefined;
    html+='<tr'+(run?' style="color:#ff0"':'')+'><td style="padding:1px 6px">'+R.toFixed(2)+'</td>'
      +'<td>'+(da!==undefined?da.toFixed(3):(run&&cur.v==='acid'?'run&hellip;':'&mdash;'))+'</td>'
      +'<td>'+(dn!==undefined?dn.toFixed(3):(run&&cur.v==='neutral'?'run&hellip;':'&mdash;'))+'</td>'
      +'<td style="color:#0f0">'+(drive!==undefined?(drive>=0?'+':'')+drive.toFixed(3):'')+'</td></tr>'; }
  html+='</table>';
  if(rA&&rN&&rA[0]!==undefined){ var last=Rlist.length-1;
    if(rA[last]!==undefined&&rN[last]!==undefined){ var s=rN[last]-rA[last];
      html+='<br>At R='+Rlist[last].toFixed(2)+': separating costs '+rN[last].toFixed(3)+' neutral vs '+rA[last].toFixed(3)
        +' acid &rarr; <b style="color:'+(s>0?'#0f0':'#f55')+'">'+(s>0?'acid drives cyclization by '+s.toFixed(3):'no acid drive ('+s.toFixed(3)+')')
        +'</b> <span style="color:#888">(Ha, model units; sign/trend only)</span>'; } }
  if(vIdx>=variants.length) html+='<br><span style="color:#0f0">Done.</span>';
  div.innerHTML=html;
}
render();

window.onSweepDone=function(E){
  results[variants[vIdx]][Rlist[rIdx]]=E; render();
  rIdx++; if(rIdx>=Rlist.length){ rIdx=0; vIdx++; }
  if(vIdx<variants.length){ sessionStorage.setItem('omzScan',JSON.stringify({vIdx:vIdx,rIdx:rIdx,results:results}));
    setTimeout(function(){ location.reload(); },500);
  } else { console.log('=== omeprazole activation scan done ===', JSON.stringify(results)); }
};

if(vIdx<variants.length){
  var s=document.createElement('script'); s.src='molecule.js?t='+Date.now();
  s.onload=function(){ var p=document.createElement('script'); p.src='https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js'; document.body.appendChild(p); };
  document.body.appendChild(s);
}
</script>
</body></html>
