<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building drug-protein binding...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Drug-protein binding: acetaminophen → hydrophobic pocket
// Protein: helix-turn-helix (20 res) with Leu/Val lined pocket
// Drug: acetaminophen (C8H9NO2) — phenol ring + amide
// NO binding biases — quantum forces drive docking
// This is what AlphaFold2 cannot do: non-protein ligand binding
(function() {
  var gridN = 200, scr = 40;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;

  // Protein: two short helices creating a hydrophobic groove
  // Helix 1 (res 0-9): hydrophobic face inward
  // Turn (res 10-11)
  // Helix 2 (res 12-19): hydrophobic face inward
  var seqP = ['L','A','L','V','L','A','L','V','L','A',  // helix 1: L/V alternate
              'G','G',                                    // turn
              'L','A','L','V','L','A','L','V'];           // helix 2
  var nResP = seqP.length;  // 20

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;
  var resAdv = 3.8 * A;

  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function normalize(v) { var l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])+1e-10; return [v[0]/l,v[1]/l,v[2]/l]; }

  // Build helix-turn-helix: two antiparallel helices creating a groove
  var helixRise = 1.5 * A;
  var helixRadius = 2.3 * A;
  var helixAngle = 2 * Math.PI / 3.6;
  var helixSep = 8.0 * A;  // distance between helix axes

  var bb = [];

  // Helix 1: axis along z at x = -helixSep/2, hydrophobic face toward +x
  var z1_0 = -4.5 * helixRise;
  for (var r = 0; r < 10; r++) {
    var angle = r * helixAngle;
    var cx = -helixSep/2 + helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = z1_0 + r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty = helixRadius * Math.cos(angle) * helixAngle;
    var tz = helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
  }

  // Turn: 2 residues connecting the helices at the top
  var turnTop = z1_0 + 9 * helixRise;
  for (var r = 0; r < 2; r++) {
    var frac = (r + 1) / 3;
    var cx = -helixSep/2 + frac * helixSep;
    var cy = 0;
    var cz = turnTop + 2 * A;
    var tx = 1, ty = 0, tz = 0;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy, cz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy, cz]
    });
  }

  // Helix 2: axis along z at x = +helixSep/2, going DOWN (antiparallel)
  var z2_0 = turnTop;
  for (var r = 0; r < 8; r++) {
    var angle = r * helixAngle + Math.PI;  // phase offset to face helix 1
    var cx = helixSep/2 + helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = z2_0 - r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty = helixRadius * Math.cos(angle) * helixAngle;
    var tz = -helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
  }

  // Build backbone atoms
  var nRes = nResP;
  var seq = seqP;
  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca = [Cap[0]-Np[0], Cap[1]-Np[1], Cap[2]-Np[2]];
    var nca_n = normalize(nca);
    var cac = [Cp[0]-Cap[0], Cp[1]-Cap[1], Cp[2]-Cap[2]];
    var cac_n = normalize(cac);
    var perp = normalize(cross(nca_n, cac_n));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,0,1]));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,1,0]));
    var perp2 = normalize(cross(nca_n, perp));

    pushAtom(Np[0], Np[1], Np[2], 'N', 3);

    if (!isPro) {
      amideHIdx.push(atoms.length);
      pushAtom(Np[0] + perp[0]*bNH, Np[1] + perp[1]*bNH, Np[2] + perp[2]*bNH, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    if (r === 0) {
      pushAtom(Np[0] - perp[0]*bNH, Np[1] - perp[1]*bNH, Np[2] - perp[2]*bNH, 'H', 1);
    }

    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], Cap[2], 'C', 4);

    if (isGly) {
      pushAtom(Cap[0] + perp[0]*bCH, Cap[1] + perp[1]*bCH, Cap[2] + perp[2]*bCH, 'H', 1);
      pushAtom(Cap[0] - perp[0]*bCH, Cap[1] - perp[1]*bCH, Cap[2] - perp[2]*bCH, 'H', 1);
    } else {
      pushAtom(Cap[0] + perp[0]*bCH*0.7 + perp2[0]*bCH*0.7,
               Cap[1] + perp[1]*bCH*0.7 + perp2[1]*bCH*0.7,
               Cap[2] + perp[2]*bCH*0.7 + perp2[2]*bCH*0.7, 'H', 1);
      var cbX = Cap[0] - perp[0]*bCaCb*0.8;
      var cbY = Cap[1] - perp[1]*bCaCb*0.8;
      var cbZ = Cap[2] - perp[2]*bCaCb*0.8;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        var hx2 = perp[0]*Math.cos(phi) + perp2[0]*Math.sin(phi);
        var hy2 = perp[1]*Math.cos(phi) + perp2[1]*Math.sin(phi);
        var hz2 = perp[2]*Math.cos(phi) + perp2[2]*Math.sin(phi);
        pushAtom(cbX + hx2*bCH*0.8, cbY + hy2*bCH*0.8, cbZ + hz2*bCH*0.8, 'H', 1);
      }
    }

    pushAtom(Cp[0], Cp[1], Cp[2], 'C', 4);
    carbonylOIdx.push(atoms.length);
    pushAtom(Cp[0] + perp[0]*bCO, Cp[1] + perp[1]*bCO, Cp[2] + perp[2]*bCO, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc = normalize([lastC[0]-lastCa[0], lastC[1]-lastCa[1], lastC[2]-lastCa[2]]);
  pushAtom(lastC[0] + lc[0]*1.34*A, lastC[1] + lc[1]*1.34*A, lastC[2] + lc[2]*1.34*A, 'O', 2);
  pushAtom(lastC[0] + lc[0]*(1.34*A+bOH), lastC[1] + lc[1]*(1.34*A+bOH), lastC[2] + lc[2]*(1.34*A+bOH), 'H', 1);

  var nProtein = atoms.length;

  // ===== ACETAMINOPHEN (Tylenol) =====
  // C8H9NO2: phenol ring + amide group + methyl
  // HO-C6H4-NH-CO-CH3
  //
  // Place drug with OH pointing at helix 1 carbonyl O (res 4)
  // Drug OH needs to be ~3 Å from protein C=O for H-bond
  var targetO = [bb[4].C[0] + 1.24*A, bb[4].C[1], bb[4].C[2]];  // approx carbonyl O position
  var drugX = targetO[0] + 4.0 * A;  // approach from +x
  var drugY = targetO[1];
  var drugZ = targetO[2];

  // Phenol ring (6 carbons in hexagon, 1.4 Å C-C)
  var bCC = 1.40 * A;
  var drugAtomStart = atoms.length;
  for (var c = 0; c < 6; c++) {
    var ang = c * Math.PI / 3;
    pushAtom(drugX + bCC * Math.cos(ang), drugY + bCC * Math.sin(ang), drugZ, 'C', 4);
  }
  // H on ring carbons (positions 2,3,5 — 1 is OH, 4 is NH)
  for (var c = 0; c < 6; c++) {
    if (c === 0 || c === 3) continue;  // skip OH and NH positions
    var ang = c * Math.PI / 3;
    var hDist = (bCC + bCH);
    pushAtom(drugX + hDist * Math.cos(ang), drugY + hDist * Math.sin(ang), drugZ, 'H', 1);
  }

  // OH group on ring C0 (para to NH)
  var ohAng = 0;
  var oX = drugX + (bCC + 1.36*A) * Math.cos(ohAng);
  var oY = drugY + (bCC + 1.36*A) * Math.sin(ohAng);
  var drugOHidx = atoms.length;
  pushAtom(oX, oY, drugZ, 'O', 2);
  pushAtom(oX + bOH * Math.cos(ohAng), oY + bOH * Math.sin(ohAng), drugZ, 'H', 1);

  // NH group on ring C3 (para to OH)
  var nhAng = Math.PI;
  var nX = drugX + (bCC + 1.38*A) * Math.cos(nhAng);
  var nY = drugY + (bCC + 1.38*A) * Math.sin(nhAng);
  var drugNHidx = atoms.length;
  pushAtom(nX, nY, drugZ, 'N', 3);
  pushAtom(nX + bNH * Math.cos(nhAng - 0.5), nY + bNH * Math.sin(nhAng - 0.5), drugZ, 'H', 1);

  // C=O (amide carbonyl)
  var coX = nX - 1.24 * A;
  var coY = nY;
  pushAtom(coX, coY, drugZ, 'C', 4);
  var drugCOidx = atoms.length;
  pushAtom(coX, coY - bCO, drugZ, 'O', 2);

  // CH3 (methyl on amide)
  var meX = coX - 1.52 * A;
  var meY = coY;
  pushAtom(meX, meY, drugZ, 'C', 4);
  pushAtom(meX - bCH*0.8, meY + bCH*0.6, drugZ + bCH*0.5, 'H', 1);
  pushAtom(meX - bCH*0.8, meY - bCH*0.6, drugZ - bCH*0.5, 'H', 1);
  pushAtom(meX - bCH*0.8, meY, drugZ - bCH*0.8, 'H', 1);

  var drugAtomEnd = atoms.length;
  var nDrugAtoms = drugAtomEnd - drugAtomStart;

  // Water shell around the drug (outside, pushing it toward pocket)
  var bOHw = 0.96 * A;
  var angW = 104.5 * Math.PI / 180;
  var nWater = 0;
  var waterSpacing = 2.8 * A;
  var halfScr = scr / 2 - 3 * h;

  for (var wx = -8*A; wx <= 8*A; wx += waterSpacing) {
    for (var wy = -2*A; wy <= 12*A; wy += waterSpacing) {
      for (var wz = -6*A; wz <= 6*A; wz += waterSpacing) {
        if (Math.abs(wx) > halfScr || Math.abs(wy) > halfScr || Math.abs(wz) > halfScr) continue;

        var tooClose = false;
        for (var a = 0; a < atoms.length; a++) {
          var dx = (atoms[a].i - N2) * h - wx;
          var dy = (atoms[a].j - N2) * h - wy;
          var dz = (atoms[a].k - N2) * h - wz;
          if (dx*dx + dy*dy + dz*dz < (2.5*A)*(2.5*A)) { tooClose = true; break; }
        }
        if (tooClose) continue;

        pushAtom(wx, wy, wz, 'O', 2);
        pushAtom(wx + bOHw*Math.sin(angW/2), wy + bOHw*Math.cos(angW/2), wz, 'H', 1);
        pushAtom(wx - bOHw*Math.sin(angW/2), wy + bOHw*Math.cos(angW/2), wz, 'H', 1);
        nWater++;
      }
    }
  }

  log.textContent = 'Drug-protein binding: acetaminophen (' + nDrugAtoms + ' atoms) + pocket (' + nProtein + ' protein atoms) + ' + nWater + ' waters';
  log.textContent += '\nTotal: ' + atoms.length + ' atoms on ' + gridN + '^3 grid';
  log.textContent += '\nProtein: helix-turn-helix (20 res), hydrophobic groove';
  log.textContent += '\nDrug: HO-C6H4-NH-CO-CH3 (Tylenol)';
  log.textContent += '\nNO binding biases — quantum forces only';

  // Residue groups for protein
  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  resGroups.push([nProtein - 2, nProtein - 1]);  // C-term OH
  // Drug as one group
  var drugGroup = [];
  for (var a = drugAtomStart; a < drugAtomEnd; a++) drugGroup.push(a);
  resGroups.push(drugGroup);

  // Bond pairs: drug H-bond + pocket distances
  var bondPairs = [];
  // Key: drug OH → protein carbonyl O (H-bond target ~2.0 Å)
  bondPairs.push([drugOHidx, carbonylOIdx[4], "drug-OH···O=C4:"]);
  // Drug NH to protein
  bondPairs.push([drugNHidx, carbonylOIdx[3], "drug-NH···O=C3:"]);
  // Drug ring to pocket
  bondPairs.push([drugAtomStart, caIndices[4], "ring→Ca5:"]);
  bondPairs.push([drugAtomStart, caIndices[14], "ring→Ca15:"]);
  // Intra-protein helix H-bonds
  if (amideHIdx[4] >= 0) bondPairs.push([carbonylOIdx[0], amideHIdx[4], "H1:O0···H4:"]);
  if (amideHIdx[16] >= 0) bondPairs.push([carbonylOIdx[12], amideHIdx[16], "H2:O12···H16:"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "drug-pocket": "3-5 Å (bound)",
      "helix H-bond": "2.0 Å"
    },
    energy: "Acetaminophen binding to hydrophobic pocket",
    binding: "Does the drug enter the groove between the two helices?"
  };

  // Intra-protein helix biases only — NO drug binding biases
  var hbonds = [];
  // Helix 1: res 0-9
  for (var i = 0; i + 4 <= 9; i++) {
    if (amideHIdx[i+4] >= 0) hbonds.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "H1:O"+i+"···H"+(i+4) });
  }
  // Helix 2: res 12-19
  for (var i = 12; i + 4 <= 19; i++) {
    if (amideHIdx[i+4] >= 0) hbonds.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "H2:O"+i+"···H"+(i+4) });
  }

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A,
    contactBias: {
      hbonds: hbonds,
      contacts: [
        { a: drugOHidx, b: carbonylOIdx[4], target: 2.0 * A, label: "drug-OH···O=C4" }
      ],
      hbondStrength: 0.8,
      contactStrength: 1.5
    }
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_GRADP_FORCE = true;
  window.USER_POISSON_INTERVAL = 5;   // V-cycle every 5 steps (was 50)
  window.USER_JACOBI_PER_STEP = 10;   // 10 Jacobi smoothing/step (was 2)
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 15;
  window.USER_DAMPING = 0.9;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    setTimeout(function() { window._view3D = true; }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
