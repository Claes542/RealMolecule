<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// C-N bond test: isolated C-N molecule
// C (Z=4, r_c=0.3) + N (Z=3, r_c=0.3)
// Experimental: C-N single bond 1.47 Å, C=N double bond 1.27 Å, C≡N triple bond 1.16 Å
// Start at 1.3 Å — let quantum forces find equilibrium
(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  var sep = 1.3 * A;  // start at ~C=N distance

  addAtom(-sep/2, 0, 0, 4, 'C');   // 0: C
  addAtom(sep/2, 0, 0, 3, 'N');    // 1: N

  console.log('C-N test: 2 atoms, sep=' + (sep/A).toFixed(2) + ' Å');

  window.USER_BOND_PAIRS = [
    [0, 1, "C-N:"],
  ];

  window.USER_REFERENCE = {
    bonds: {
      "C≡N": "1.16 Å (triple)",
      "C=N": "1.27 Å (double)",
      "C-N": "1.47 Å (single)",
      "peptide C-N": "1.33 Å (partial double)"
    },
    energy: "Isolated C-N: which bond order emerges?",
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_GRADP_FORCE = true;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.1;
    if (a.el === 'N') return 0.1;
    if (a.el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
