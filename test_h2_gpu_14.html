<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>H2 R=1.4 — realqm_gpu.js with plots</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; flex-direction: column; }
    canvas { border: none; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      document.body.style.color = 'red';
      document.body.innerHTML = '<pre>ERROR: ' + msg + '\nLine: ' + line + '\n' + (err && err.stack || '') + '</pre>';
    };
    window.USER_NN = 200;
    window.USER_SCREEN = 10;
    window.USER_D = 28;  // 28 cells * 0.05 = 1.4 au
    window.USER_NELEC = 2;
    window.USER_STEPS = 20000;
    window.USER_RC = [0, 0];
  </script>
  <script src="realqm_gpu.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</body>
</html>
