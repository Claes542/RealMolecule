<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Beta hairpin minipeptide solvated: 12-residue polyglycine + ~30 water molecules
// Strand1(5 res) - Turn(2 res) - Strand2(5 res), antiparallel
(function() {
  var gridN = 500, scr = 50, N2 = 250;
  var h = scr / gridN;
  var A = 1.8897; // angstrom to au
  var atoms = [];

  function addAtom(au_x, au_y, Z, el) {
    atoms.push({
      i: Math.round(N2 + au_x / h),
      j: Math.round(N2 + au_y / h),
      Z: Z, el: el, x: au_x, y: au_y
    });
  }

  // Backbone geometry for beta hairpin
  var resAdv = 3.4 * A;
  var sSep = 4.7 * A;
  var zig = 0.5 * A;
  var bb = [];

  // Strand 1: 5 residues going right
  var x0 = -2.5 * resAdv;
  for (var r = 0; r < 5; r++) {
    var xr = x0 + r * resAdv;
    var z = (r % 2 === 0) ? 1 : -1;
    bb.push({
      N:  [xr,                    z * zig * 0.6],
      Ca: [xr + 0.35 * resAdv,  -z * zig * 0.4],
      C:  [xr + 0.7 * resAdv,    z * zig * 0.3]
    });
  }

  // Turn: 2 residues
  var tx = bb[4].C[0] + 0.4 * resAdv;
  var mid = sSep / 2;
  bb.push({
    N:  [tx,                  0.8 * A],
    Ca: [tx + 0.2 * resAdv,  mid],
    C:  [tx,                  sSep - 0.8 * A]
  });
  bb.push({
    N:  [tx - 0.3 * resAdv,  sSep - 0.3 * A],
    Ca: [tx - 0.7 * resAdv,  sSep + 0.2 * A],
    C:  [tx - 1.1 * resAdv,  sSep - 0.3 * A]
  });

  // Strand 2: 5 residues going left
  var sx2 = bb[6].C[0] - 0.3 * resAdv;
  for (var r = 0; r < 5; r++) {
    var xr = sx2 - r * resAdv;
    var z = (r % 2 === 0) ? 1 : -1;
    bb.push({
      N:  [xr,                    sSep + z * zig * 0.6],
      Ca: [xr - 0.35 * resAdv,   sSep - z * zig * 0.4],
      C:  [xr - 0.7 * resAdv,    sSep + z * zig * 0.3]
    });
  }

  // Place atoms for each residue
  var nRes = 12;
  for (var r = 0; r < nRes; r++) {
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var nca_x = Cap[0] - Np[0], nca_y = Cap[1] - Np[1];
    var nca_l = Math.sqrt(nca_x * nca_x + nca_y * nca_y);
    var nca_px = -nca_y / nca_l, nca_py = nca_x / nca_l;
    var cac_x = Cp[0] - Cap[0], cac_y = Cp[1] - Cap[1];
    var cac_l = Math.sqrt(cac_x * cac_x + cac_y * cac_y);
    var cac_px = -cac_y / cac_l, cac_py = cac_x / cac_l;

    addAtom(Np[0], Np[1], 3, 'N');
    var nhSide = (r < 6) ? -1 : 1;
    addAtom(Np[0] + nhSide * nca_px * 1.01 * A, Np[1] + nhSide * nca_py * 1.01 * A, 1, 'H');
    if (r === 0) {
      addAtom(Np[0] - nhSide * nca_px * 1.01 * A, Np[1] - nhSide * nca_py * 1.01 * A, 1, 'H');
    }
    addAtom(Cap[0], Cap[1], 4, 'C');
    addAtom(Cap[0] + cac_px * 1.09 * A, Cap[1] + cac_py * 1.09 * A, 1, 'H');
    addAtom(Cap[0] - cac_px * 1.09 * A, Cap[1] - cac_py * 1.09 * A, 1, 'H');
    addAtom(Cp[0], Cp[1], 4, 'C');
    var oSide = (r < 6) ? ((r % 2 === 0) ? 1 : -1) : ((r % 2 === 0) ? -1 : 1);
    addAtom(Cp[0] + oSide * cac_px * 1.24 * A, Cp[1] + oSide * cac_py * 1.24 * A, 2, 'O');
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc_x = lastC[0] - lastCa[0], lc_y = lastC[1] - lastCa[1];
  var lc_l = Math.sqrt(lc_x * lc_x + lc_y * lc_y);
  var oh_x = lastC[0] + lc_x / lc_l * 1.34 * A;
  var oh_y = lastC[1] + lc_y / lc_l * 1.34 * A;
  addAtom(oh_x, oh_y, 2, 'O');
  addAtom(oh_x + lc_x / lc_l * 0.97 * A, oh_y + lc_y / lc_l * 0.97 * A, 1, 'H');

  var nProtein = atoms.length;

  // --- Solvation shell: place water molecules around the protein ---
  // Water geometry: O-H = 0.96 A, H-O-H = 104.5 deg
  var ohBond = 0.96 * A;
  var halfAngle = 52.25 * Math.PI / 180;
  var waterSpacing = 2.8 * A; // ~5.3 au, liquid water O-O distance
  var minDist = 2.5 * A;      // minimum O distance from any protein atom
  var maxDist = 22;            // au, stay within grid

  // Center of protein
  var cx = 0, cy = sSep / 2;

  // Place waters on a grid, skip if too close to protein or too far from center
  var nWater = 0;
  for (var wx = -20; wx <= 20; wx += waterSpacing) {
    for (var wy = cy - 20; wy <= cy + 20; wy += waterSpacing) {
      // Check distance from grid center (stay in domain)
      if (Math.abs(wx) > maxDist || Math.abs(wy) > maxDist) continue;

      // Check minimum distance from all protein atoms
      var tooClose = false;
      for (var p = 0; p < nProtein; p++) {
        var dx = wx - atoms[p].x, dy = wy - atoms[p].y;
        if (dx * dx + dy * dy < minDist * minDist) {
          tooClose = true;
          break;
        }
      }
      if (tooClose) continue;

      // Random-ish orientation for each water (deterministic from position)
      var angle = (wx * 7.3 + wy * 11.1) % (2 * Math.PI);

      // O atom
      addAtom(wx, wy, 2, 'O');
      // H atoms
      addAtom(wx + ohBond * Math.cos(angle + halfAngle),
              wy + ohBond * Math.sin(angle + halfAngle), 1, 'H');
      addAtom(wx + ohBond * Math.cos(angle - halfAngle),
              wy + ohBond * Math.sin(angle - halfAngle), 1, 'H');
      nWater++;
    }
  }

  console.log('Solvated hairpin: ' + nProtein + ' protein atoms + ' +
              nWater + ' waters (' + (nWater * 3) + ' water atoms) = ' +
              atoms.length + ' total');

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
