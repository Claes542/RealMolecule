<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Simple H2 molecule — does the bond hold under dynamics?
(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  var bondH2 = 0.74 * A;  // 1.4 au
  addAtom(-bondH2/2, 0, 0, 1, 'H');   // 0: H1
  addAtom(bondH2/2, 0, 0, 1, 'H');    // 1: H2

  window.USER_BOND_PAIRS = [
    [0, 1, "H1-H2:"],
  ];

  window.USER_REFERENCE = {
    bonds: { "H1-H2": "0.74" },
    energy: "H2: -1.17 Ha",
    binding: "Does H-H bond hold at 0.74 Å?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [1, 1];
  window.USER_RC = [0, 0];
  window.INIT_ZEFF = 2;
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
