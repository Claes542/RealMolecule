<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alanine Dipeptide (Ace-Ala-NMe) — Quantum Simulation (22 atoms)</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; flex-direction: column; }
    canvas { border: none; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line) {
      document.body.style.color = 'red';
      document.body.innerHTML = '<pre>ERROR: ' + msg + '\nLine: ' + line + '\nFile: ' + url + '</pre>';
    };

    // Alanine dipeptide: CH3-CO-NH-CaH(CH3)-CO-NH-CH3  (Ace-Ala-NMe)
    // 22 atoms: 6C + 2O + 2N + 12H
    // 100^3 grid, 22 au screen. h = 0.22 au/cell
    // Bond lengths: C-C ~13 cells, C=O ~11, C-N ~11, C-H ~9, N-H ~9

    var atoms = [
      // === Acetyl cap: CH3-C(=O)- ===
      { i: 30, j: 125, Z: 4, el: 'C' },   // Ace methyl C
      { i: 10, j: 113, Z: 1, el: 'H' },   // methyl H
      { i: 10, j: 138, Z: 1, el: 'H' },   // methyl H
      { i: 13, j: 125, Z: 1, el: 'H' },   // methyl H (out of plane in 3D)
      { i: 63, j: 125, Z: 4, el: 'C' },   // carbonyl C
      { i: 63, j:  98, Z: 2, el: 'O' },   // carbonyl O

      // === Peptide bond 1: -NH- ===
      { i: 90, j: 125, Z: 3, el: 'N' },   // amide N
      { i: 90, j: 103, Z: 1, el: 'H' },   // amide H

      // === Alanine: -CaH(CH3)- ===
      { i:118, j: 125, Z: 4, el: 'C' },   // C-alpha
      { i:118, j: 103, Z: 1, el: 'H' },   // H-alpha
      { i:118, j: 158, Z: 4, el: 'C' },   // C-beta (methyl)
      { i:100, j: 175, Z: 1, el: 'H' },   // beta H
      { i:135, j: 175, Z: 1, el: 'H' },   // beta H
      { i:118, j: 180, Z: 1, el: 'H' },   // beta H

      // === Carbonyl 2: -C(=O)- ===
      { i:150, j: 125, Z: 4, el: 'C' },   // carbonyl C
      { i:150, j:  98, Z: 2, el: 'O' },   // carbonyl O

      // === Peptide bond 2: -NH- ===
      { i:178, j: 125, Z: 3, el: 'N' },   // amide N
      { i:178, j: 103, Z: 1, el: 'H' },   // amide H

      // === N-methyl cap: -CH3 ===
      { i:210, j: 125, Z: 4, el: 'C' },   // NMe methyl C
      { i:230, j: 113, Z: 1, el: 'H' },   // methyl H
      { i:230, j: 138, Z: 1, el: 'H' },   // methyl H
      { i:228, j: 125, Z: 1, el: 'H' },   // methyl H
    ];

    function rcForZ(z) {
      if (z === 0) return 0;
      if (z <= 1) return 0.1;
      if (z === 2) return 0.5;
      if (z === 3) return 0.3;
      return 0.4;
    }

    console.log('Alanine dipeptide: ' + atoms.length + ' atoms');

    window.USER_NN = 250;
    window.USER_ATOMS = atoms;
    window.USER_SCREEN = 22;
    window.USER_STEPS = 100000;
    window.USER_Z = atoms.map(function(a) { return a.Z; });
    window.USER_RC = atoms.map(function(a) { return rcForZ(a.Z); });

    var s = document.createElement('script');
    s.src = 'molecule.js?t=' + Date.now();
    s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load molecule.js</pre>'; };
    s.onload = function() {
      var p5s = document.createElement('script');
      p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
      document.body.appendChild(p5s);
    };
    document.body.appendChild(s);
  </script>
</body>
</html>
