<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Proton transfer: HCl + NH3 → Cl⁻ + NH4+
// HCl decomposed as: Cl⁻ (Z=2 electrons, Z_nuc=1 kernel) + H⁺ (Z=0 electrons, Z_nuc=1 kernel)
// NH3: N (Z=3, Z_nuc=3) + 3×H (Z=1, Z_nuc=1)
// Total electrons = 2+0+3+3 = 8, total Z_nuc = 1+1+3+3 = 8 → neutral
(function() {
  var gridN = 150, scr = 15, N2 = 75;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  var bHCl = 1.27 * A;   // H-Cl bond length 1.27 Å
  var bNH = 1.01 * A;    // N-H bond length 1.01 Å
  var angNH3 = 107.3 * Math.PI / 180;
  var sep = 2.1 * A;     // Cl-N separation

  // Cl⁻: kernel charge 1, 2 electrons split by plane through Cl perpendicular to Cl-N axis
  var clOff = 0.1 * A;  // tiny x-offset to seed perpendicular split
  addAtom(-sep/2 - clOff, 0, 0, 1, 'Cl');                               // 0: Cl⁻ outer half (away from N)
  addAtom(-sep/2 + clOff, 0, 0, 1, 'Cl');                               // 1: Cl⁻ inner half (toward N)

  // H⁺: bare proton, no electron
  addAtom(-sep/2 + bHCl, 0, 0, 0, 'H');                                // 2: H⁺ (Z=0 electrons)

  // NH3: N with 3 electrons + 3 H with 1 electron each
  var tilt = (Math.PI - angNH3) / 2;
  addAtom(sep/2, 0, 0, 3, 'N');                                         // 3: N
  addAtom(sep/2 + bNH*Math.cos(tilt), bNH*Math.sin(tilt), 0, 1, 'H');  // 4: Ha
  addAtom(sep/2 + bNH*Math.cos(tilt), -bNH*Math.sin(tilt)*0.5, bNH*Math.sin(tilt)*0.866, 1, 'H');  // 5: Hb
  addAtom(sep/2 + bNH*Math.cos(tilt), -bNH*Math.sin(tilt)*0.5, -bNH*Math.sin(tilt)*0.866, 1, 'H'); // 6: Hc

  console.log('HCl + NH3 proton transfer (ionic decomposition)');
  console.log('Cl⁻(2 half-spaces) + H⁺(Z=0,Znuc=1) + NH3');
  console.log('Cl-N separation: ' + (sep/A).toFixed(2) + ' Å');

  // Z controls electron count, Z_nuc controls kernel potential
  window.USER_Z =     [1, 1, 0, 3, 1, 1, 1];  // electrons: Cl½=1, Cl½=1, H⁺=0, N=3, Ha=1, Hb=1, Hc=1
  window.USER_Z_NUC = [1, 0, 1, 3, 1, 1, 1];  // kernels:   Cl=1,  0,     H=1,  N=3, Ha=1, Hb=1, Hc=1

  window.USER_BOND_PAIRS = [
    [0, 2, "Cl-Ht:"],    // should stay large (Cl⁻ releases H⁺)
    [2, 3, "Ht-N:"],     // should shrink to ~1.01 Å (N captures H⁺)
    [0, 3, "Cl···N:"],   // Cl-N distance
    [3, 4, "N-Ha:"],     // reference N-H
  ];

  window.USER_REFERENCE = {
    bonds: {
      "Cl-Ht": "H⁺ has no electron — pure Coulomb repulsion from Cl⁻",
      "Ht-N": "should shrink to 1.01 (N lone pair captures bare proton)",
      "Cl···N": "2.54 Å",
      "N-Ha": "1.01 Å (reference)"
    },
    energy: "HCl pKa = -7. Ionic decomposition: Cl⁻ + H⁺ + NH3",
    binding: "Does the bare proton bond to N?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;   // converge first, press D
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.95;
  window.USER_N_MOVE = 30;
  window.USER_GRADP_FORCE = false;  // direct Coulomb for bare H atoms
  window.USER_RC = [1.0, 1.0, 0, 0.5, 0, 0, 0];  // Cl½=1.0, Cl½=1.0, H⁺ bare, N=0.5, H bare
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load</pre>'; };
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
