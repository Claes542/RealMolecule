<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// RealNucleus: Deuterium (2H) — 3D WebGPU
// Analog of H2 molecule with roles reversed:
// - "Nucleus" = 1 electron (charge -1) at center → acts as the binding center
// - 2 "electron" domains = protons (charge +1, mass 1836) → the wave functions
//
// In molecule.js terms: this IS an H2 molecule,
// but with mass=1836 on the domains (protons are heavy → compact wave functions)
// The electron kernel is the +1 point charge at center (like a nucleus in H2)
//
// Physics test: do 2 heavy particles (protons) bind around a central charge?
// The mass=1836 makes their wave functions ~43× more compact than electrons.
// This is the 3D analog of the 1D radial RealNucleus simulator.

(function() {
  var gridN = 100, scr = 10, N2 = 50;
  var h = scr / gridN;
  var atoms = [];

  // 2 proton domains around a central charge
  // Separation ~ 1.4 au (like H2 equilibrium, but these are protons)
  var sep = 1.4;

  // Proton 1
  atoms.push({
    i: Math.round(N2 - sep/(2*h)),
    j: N2,
    k: N2,
    Z: 1,
    el: 'P'
  });

  // Proton 2
  atoms.push({
    i: Math.round(N2 + sep/(2*h)),
    j: N2,
    k: N2,
    Z: 1,
    el: 'P'
  });

  console.log('RealNucleus 2H: 2 proton wave functions (mass=1836) + central charge');
  console.log('Grid: ' + gridN + '^3, screen=' + scr + ' au');

  window.USER_BOND_PAIRS = [
    [0, 1, "P1-P2:"]
  ];

  window.USER_REFERENCE = {
    bonds: { "P1-P2": "equilibrium distance" },
    energy: "RealNucleus: Deuterium — heavy domain decomposition",
    binding: "Do 2 proton wave functions (mass=1836) bind like H2?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [1, 1];
  window.USER_RC = [0, 0];
  window.USER_MASS = [1836, 1836];    // proton mass
  window.USER_CHARGE = [-1, -1];      // default electron charge (molecule.js convention)
  window.INIT_ZEFF = 1;
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
