<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// BeH: Be(+2 kernel, 2 electrons, r_c=0.5) + H(Z=1)
// Be: [1s²] core → Z_nuc=2, 2 valence electrons
// Bond length: 1.34 Å experimental
(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  var sep = 1.34 * A;  // BeH equilibrium distance
  addAtom(0, 0, 0, 2, 'Be');          // 0: Be (Z=2, r_c=0.5)
  addAtom(sep, 0, 0, 1, 'H');         // 1: H (Z=1, r_c=0)

  console.log('BeH: Be(Z=2,r_c=0.5) + H(Z=1) at ' + (sep*0.529177).toFixed(2) + ' Å');

  window.USER_BOND_PAIRS = [
    [0, 1, "Be-H:"],
  ];

  window.USER_REFERENCE = {
    bonds: { "Be-H": "1.34" },
    energy: "BeH bond test",
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [2, 1];
  window.USER_RC = [0.5, 0];
  window.USER_FROZEN_ATOMS = [0];  // fix Be, only H moves
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
