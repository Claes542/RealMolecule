<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building Ubiquitin...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Ubiquitin (1UBQ): 76 residues, mixed α+β fold
// MQIFVKTLTGKTITLEVEPSDTIENVKAKIQDKEGIPPDQQRLIFAGKQLEDGRTLSDYNIQKESTLHLVLRLRGG
// Structure:
//   β1: 1-7     β2: 10-17    α1: 23-34    β3: 40-45
//   3₁₀: 56-59  β4: 48-50    β5: 64-72
//   5-stranded β-sheet (β1-β2-β5-β3-β4) + α-helix + 3₁₀ helix
(function() {
  var gridN = 300, scr = 100;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;
  var nRes = 76;
  var seq = ['M','Q','I','F','V','K','T','L','T','G',
             'K','T','I','T','L','E','V','E','P','S',
             'D','T','I','E','N','V','K','A','K','I',
             'Q','D','K','E','G','I','P','P','D','Q',
             'Q','R','L','I','F','A','G','K','Q','L',
             'E','D','G','R','T','L','H','L','V','L',
             'R','L','R','G','G'];
  // Pad to 76 residues
  while (seq.length < 76) seq.push('G');

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;

  // Compact spiral
  var resAdv = 3.8 * A;
  var helixRadius = 16.0;
  var helixRise = 1.3;
  var helixAngle = 2 * Math.PI / 5.5;
  var z0 = -(nRes - 1) * helixRise / 2;

  var bb = [];
  for (var r = 0; r < nRes; r++) {
    var angle = r * helixAngle;
    var cx = helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = z0 + r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty =  helixRadius * Math.cos(angle) * helixAngle;
    var tz = helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
  }

  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function normalize(v) { var l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])+1e-10; return [v[0]/l,v[1]/l,v[2]/l]; }

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca = [Cap[0]-Np[0], Cap[1]-Np[1], Cap[2]-Np[2]];
    var nca_n = normalize(nca);
    var cac = [Cp[0]-Cap[0], Cp[1]-Cap[1], Cp[2]-Cap[2]];
    var cac_n = normalize(cac);
    var perp = normalize(cross(nca_n, cac_n));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,0,1]));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,1,0]));
    var perp2 = normalize(cross(nca_n, perp));

    pushAtom(Np[0], Np[1], Np[2], 'N', 3);

    if (!isPro) {
      amideHIdx.push(atoms.length);
      pushAtom(Np[0] + perp[0]*bNH, Np[1] + perp[1]*bNH, Np[2] + perp[2]*bNH, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    if (r === 0) {
      pushAtom(Np[0] - perp[0]*bNH, Np[1] - perp[1]*bNH, Np[2] - perp[2]*bNH, 'H', 1);
    }

    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], Cap[2], 'C', 4);

    if (isGly) {
      pushAtom(Cap[0] + perp[0]*bCH, Cap[1] + perp[1]*bCH, Cap[2] + perp[2]*bCH, 'H', 1);
      pushAtom(Cap[0] - perp[0]*bCH, Cap[1] - perp[1]*bCH, Cap[2] - perp[2]*bCH, 'H', 1);
    } else {
      pushAtom(Cap[0] + perp[0]*bCH*0.7 + perp2[0]*bCH*0.7,
               Cap[1] + perp[1]*bCH*0.7 + perp2[1]*bCH*0.7,
               Cap[2] + perp[2]*bCH*0.7 + perp2[2]*bCH*0.7, 'H', 1);
      var cbX = Cap[0] - perp[0]*bCaCb*0.8;
      var cbY = Cap[1] - perp[1]*bCaCb*0.8;
      var cbZ = Cap[2] - perp[2]*bCaCb*0.8;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        var hx = perp[0]*Math.cos(phi) + perp2[0]*Math.sin(phi);
        var hy = perp[1]*Math.cos(phi) + perp2[1]*Math.sin(phi);
        var hz = perp[2]*Math.cos(phi) + perp2[2]*Math.sin(phi);
        pushAtom(cbX + hx*bCH*0.8, cbY + hy*bCH*0.8, cbZ + hz*bCH*0.8, 'H', 1);
      }
    }

    pushAtom(Cp[0], Cp[1], Cp[2], 'C', 4);

    carbonylOIdx.push(atoms.length);
    pushAtom(Cp[0] + perp[0]*bCO, Cp[1] + perp[1]*bCO, Cp[2] + perp[2]*bCO, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc = normalize([lastC[0]-lastCa[0], lastC[1]-lastCa[1], lastC[2]-lastCa[2]]);
  pushAtom(lastC[0] + lc[0]*1.34*A, lastC[1] + lc[1]*1.34*A, lastC[2] + lc[2]*1.34*A, 'O', 2);
  pushAtom(lastC[0] + lc[0]*(1.34*A+bOH), lastC[1] + lc[1]*(1.34*A+bOH), lastC[2] + lc[2]*(1.34*A+bOH), 'H', 1);

  var nProtein = atoms.length;

  log.textContent = 'Ubiquitin 1UBQ (spiral start): ' + atoms.length + ' atoms, ' + nRes + ' residues';
  log.textContent += '\nβ1(1-7) + β2(10-17) + α1(23-34) + β3(40-45) + β4(48-50) + 3₁₀(56-59) + β5(64-72)';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr.toFixed(1) + ' au';

  window.USER_FOLD_ATOMS = [caIndices[0], caIndices[37], caIndices[75]];

  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  resGroups.push([nProtein - 2, nProtein - 1]);

  // Display bond pairs
  var bondPairs = [];
  // Sample helix H-bonds
  bondPairs.push([carbonylOIdx[23], amideHIdx[27] >= 0 ? amideHIdx[27] : 0, "α1:O23···H27:"]);
  bondPairs.push([carbonylOIdx[27], amideHIdx[31] >= 0 ? amideHIdx[31] : 0, "α1:O27···H31:"]);
  bondPairs.push([carbonylOIdx[30], amideHIdx[34] >= 0 ? amideHIdx[34] : 0, "α1:O30···H34:"]);
  // Core
  bondPairs.push([caIndices[2], caIndices[69], "I3-L70:"]);
  bondPairs.push([caIndices[4], caIndices[14], "V5-L15:"]);
  bondPairs.push([caIndices[29], caIndices[43], "I30-I44:"]);
  // β1-β5
  bondPairs.push([caIndices[1], caIndices[71], "β1-β5:Q2-L72:"]);
  // End-to-end
  bondPairs.push([caIndices[0], caIndices[75], "Ca0-Ca75:"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "I3-L70": "~6",
      "V5-L15": "~6",
      "I30-I44": "~8",
      "Ca0-Ca75": "~15"
    },
    energy: "Ubiquitin 1UBQ: mixed α+β fold",
    binding: "Native: 5-strand β-sheet + α-helix + 3₁₀ helix"
  };

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A,
    contactBias: {
      hbonds: (function() {
        var hb = [];
        // α-helix (res 23-34): i→i+4
        for (var i = 23; i + 4 <= 34; i++) {
          if (amideHIdx[i+4] >= 0) hb.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "α1:O"+i+"···H"+(i+4) });
        }
        // 3₁₀ helix (res 56-59): i→i+3
        for (var i = 56; i + 3 <= 59; i++) {
          if (amideHIdx[i+3] >= 0) hb.push({ a: carbonylOIdx[i], b: amideHIdx[i+3], target: 2.0 * A, label: "310:O"+i+"···H"+(i+3) });
        }
        // β-sheet H-bonds (5-stranded mixed parallel/antiparallel)
        // β1(1-7) ↔ β2(10-17) parallel
        var b12 = [[1,12],[2,13],[3,14],[4,15],[5,16],[6,17]];
        for (var b = 0; b < b12.length; b++) {
          var bi = b12[b][0], bj = b12[b][1];
          if (amideHIdx[bj] >= 0) hb.push({ a: carbonylOIdx[bi], b: amideHIdx[bj], target: 2.0 * A, label: "β12:O"+bi+"···H"+bj });
        }
        // β1(1-7) ↔ β5(64-72) antiparallel
        var b15 = [[1,71],[2,70],[3,69],[4,68],[5,67],[6,66]];
        for (var b = 0; b < b15.length; b++) {
          var bi = b15[b][0], bj = b15[b][1];
          if (amideHIdx[bj] >= 0) hb.push({ a: carbonylOIdx[bi], b: amideHIdx[bj], target: 2.0 * A, label: "β15:O"+bi+"···H"+bj });
          if (amideHIdx[bi] >= 0) hb.push({ a: carbonylOIdx[bj], b: amideHIdx[bi], target: 2.0 * A, label: "β15:O"+bj+"···H"+bi });
        }
        // β3(40-45) ↔ β5(64-72) parallel
        var b35 = [[40,65],[41,66],[42,67],[43,68],[44,69]];
        for (var b = 0; b < b35.length; b++) {
          var bi = b35[b][0], bj = b35[b][1];
          if (amideHIdx[bj] >= 0) hb.push({ a: carbonylOIdx[bi], b: amideHIdx[bj], target: 2.0 * A, label: "β35:O"+bi+"···H"+bj });
        }
        // β3(40-45) ↔ β4(48-50)
        var b34 = [[40,50],[41,49],[42,48]];
        for (var b = 0; b < b34.length; b++) {
          var bi = b34[b][0], bj = b34[b][1];
          if (amideHIdx[bj] >= 0) hb.push({ a: carbonylOIdx[bi], b: amideHIdx[bj], target: 2.0 * A, label: "β34:O"+bi+"···H"+bj });
          if (amideHIdx[bi] >= 0) hb.push({ a: carbonylOIdx[bj], b: amideHIdx[bi], target: 2.0 * A, label: "β34:O"+bj+"···H"+bi });
        }
        return hb;
      })(),
      contacts: [
        // Hydrophobic core
        { a: caIndices[2], b: caIndices[69], target: 6.0 * A, label: "I3-L70" },
        { a: caIndices[4], b: caIndices[14], target: 6.0 * A, label: "V5-L15" },
        { a: caIndices[29], b: caIndices[43], target: 8.0 * A, label: "I30-I44" },
        { a: caIndices[3], b: caIndices[25], target: 7.0 * A, label: "F4-V26" },
        { a: caIndices[25], b: caIndices[67], target: 8.0 * A, label: "V26-L67" },
        // Helix-sheet packing
        { a: caIndices[26], b: caIndices[4], target: 9.0 * A, label: "α-β1:A27-V5" },
        { a: caIndices[30], b: caIndices[42], target: 9.0 * A, label: "α-β3:I30-L43" },
        // Turn contacts
        { a: caIndices[7], b: caIndices[10], target: 7.0 * A, label: "turn:L8-K11" },
        { a: caIndices[34], b: caIndices[40], target: 8.0 * A, label: "loop:I35-Q41" },
        { a: caIndices[45], b: caIndices[48], target: 7.0 * A, label: "turn:A46-Q49" },
        { a: caIndices[50], b: caIndices[64], target: 8.0 * A, label: "loop:E51-S65" },
        // End-to-end
        { a: caIndices[0], b: caIndices[75], target: 15.0 * A, label: "Ca0-Ca75" }
      ],
      hbondStrength: 0.8,
      contactStrength: 1.5
    }
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 15;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    var recorder = null, chunks = [], recording = false;
    window._toggleRecording = function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      if (!recording) {
        chunks = [];
        var stream = canvas.captureStream(0);
        var track = stream.getVideoTracks()[0];
        window._recStreamTrack = track;
        var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9')
          ? 'video/webm; codecs=vp9' : 'video/webm';
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = function() {
          var blob = new Blob(chunks, { type: mimeType });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'ubiquitin_fold.webm'; a.click();
          URL.revokeObjectURL(url);
        };
        recorder.start(1000);
        var origDraw = window.draw;
        window._recOrigDraw = origDraw;
        var frameCount = 0;
        window.draw = function() { if (origDraw) origDraw(); try { track.requestFrame(); frameCount++; } catch(e) {} if (dot) dot.textContent = '\u25CF REC ' + frameCount; };
        recording = true;
        var dot = document.createElement('div');
        dot.id = 'rec-indicator';
        dot.style.cssText = 'position:fixed;top:10px;left:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;animation:blink 1s infinite;';
        dot.textContent = '\u25CF REC 0';
        var style = document.createElement('style');
        style.textContent = '@keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.4 } }';
        document.head.appendChild(style);
        document.body.appendChild(dot);
      } else {
        if (window._recOrigDraw) { window.draw = window._recOrigDraw; window._recOrigDraw = null; }
        recorder.stop(); recording = false;
        window._recStreamTrack = null;
        var ind = document.getElementById('rec-indicator');
        if (ind) ind.remove();
      }
    };
    // Auto-start 3D view; press R to record
    setTimeout(function() { window._view3D = true; }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
