<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building GFP...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Green Fluorescent Protein (GFP): 238 residues
// 11-stranded β-barrel with central α-helix containing the chromophore
// The largest protein benchmark — tests scaling of RealQM
// Structure: β1(7-10) β2(12-16) β3(22-29) ... β11(209-218) + helix(56-72)
(function() {
  var gridN = 300, scr = 120;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;
  var nRes = 238;

  // GFP sequence (from 1GFL)
  var seqStr = 'MSKGEELFTGVVPILVELDGDVNGHKFSVSGEGEGDATYGKLTLKFICTTGKLPVPWPTLVTTFSYGVQCFSRYPDHMKQHDFFKSAMPEGYVQERTIFFKDDGNYKTRAEVKFEGDTLVNRIELKGIDFKEDGNILGHKLEYNYNSHNVYIMADKQKNGIKVNFKIRHNIEDGSVQLADHYQQNTPIGDGPVLLPDNHYLSTQSALSKDPNEKRDHMVLLEFVTAAGITHGMDELYK';
  var seq = seqStr.split('');

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;
  var resAdv = 3.8 * A;

  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function normalize(v) { var l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])+1e-10; return [v[0]/l,v[1]/l,v[2]/l]; }

  // Compact spiral start — fits 238 residues in 120 au box
  var helixRadius = 18.0;
  var helixRise = 1.0;
  var helixAngle = 2 * Math.PI / 7.0;
  var z0 = -(nRes - 1) * helixRise / 2;

  var bb = [];
  for (var r = 0; r < nRes; r++) {
    var angle = r * helixAngle;
    var cx = helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = z0 + r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty =  helixRadius * Math.cos(angle) * helixAngle;
    var tz = helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
  }

  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca = [Cap[0]-Np[0], Cap[1]-Np[1], Cap[2]-Np[2]];
    var nca_n = normalize(nca);
    var cac = [Cp[0]-Cap[0], Cp[1]-Cap[1], Cp[2]-Cap[2]];
    var cac_n = normalize(cac);
    var perp = normalize(cross(nca_n, cac_n));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,0,1]));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,1,0]));
    var perp2 = normalize(cross(nca_n, perp));

    pushAtom(Np[0], Np[1], Np[2], 'N', 3);

    if (!isPro) {
      amideHIdx.push(atoms.length);
      pushAtom(Np[0] + perp[0]*bNH, Np[1] + perp[1]*bNH, Np[2] + perp[2]*bNH, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    if (r === 0) {
      pushAtom(Np[0] - perp[0]*bNH, Np[1] - perp[1]*bNH, Np[2] - perp[2]*bNH, 'H', 1);
    }

    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], Cap[2], 'C', 4);

    if (isGly) {
      pushAtom(Cap[0] + perp[0]*bCH, Cap[1] + perp[1]*bCH, Cap[2] + perp[2]*bCH, 'H', 1);
      pushAtom(Cap[0] - perp[0]*bCH, Cap[1] - perp[1]*bCH, Cap[2] - perp[2]*bCH, 'H', 1);
    } else {
      pushAtom(Cap[0] + perp[0]*bCH*0.7 + perp2[0]*bCH*0.7,
               Cap[1] + perp[1]*bCH*0.7 + perp2[1]*bCH*0.7,
               Cap[2] + perp[2]*bCH*0.7 + perp2[2]*bCH*0.7, 'H', 1);
      var cbX = Cap[0] - perp[0]*bCaCb*0.8;
      var cbY = Cap[1] - perp[1]*bCaCb*0.8;
      var cbZ = Cap[2] - perp[2]*bCaCb*0.8;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        var hx2 = perp[0]*Math.cos(phi) + perp2[0]*Math.sin(phi);
        var hy2 = perp[1]*Math.cos(phi) + perp2[1]*Math.sin(phi);
        var hz2 = perp[2]*Math.cos(phi) + perp2[2]*Math.sin(phi);
        pushAtom(cbX + hx2*bCH*0.8, cbY + hy2*bCH*0.8, cbZ + hz2*bCH*0.8, 'H', 1);
      }
    }

    pushAtom(Cp[0], Cp[1], Cp[2], 'C', 4);
    carbonylOIdx.push(atoms.length);
    pushAtom(Cp[0] + perp[0]*bCO, Cp[1] + perp[1]*bCO, Cp[2] + perp[2]*bCO, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc = normalize([lastC[0]-lastCa[0], lastC[1]-lastCa[1], lastC[2]-lastCa[2]]);
  pushAtom(lastC[0] + lc[0]*1.34*A, lastC[1] + lc[1]*1.34*A, lastC[2] + lc[2]*1.34*A, 'O', 2);
  pushAtom(lastC[0] + lc[0]*(1.34*A+bOH), lastC[1] + lc[1]*(1.34*A+bOH), lastC[2] + lc[2]*(1.34*A+bOH), 'H', 1);

  var nProtein = atoms.length;

  log.textContent = 'GFP: ' + nRes + ' residues, ' + nProtein + ' atoms';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr + ' au';
  log.textContent += '\n11-stranded β-barrel + central helix';

  window.USER_FOLD_ATOMS = [caIndices[0], caIndices[119], caIndices[237]];

  // Residue groups
  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  resGroups.push([nProtein - 2, nProtein - 1]);

  // GFP secondary structure
  // Central helix: 56-72
  // β-strands (approximate): β1(7-10), β2(12-16), β3(22-29), β4(32-38),
  // β5(40-44), β6(80-85), β7(93-99), β8(117-123), β9(139-148),
  // β10(152-164), β11(209-218)
  var helixRanges = [[56, 72]];
  var betaStrands = [
    [7,10], [12,16], [22,29], [32,38], [40,44],
    [80,85], [93,99], [117,123], [139,148], [152,164], [209,218]
  ];

  // Bond pairs: sample H-bonds
  var bondPairs = [];
  // Helix H-bonds
  for (var i = 56; i + 4 <= 72; i += 4) {
    if (amideHIdx[i+4] >= 0) bondPairs.push([carbonylOIdx[i], amideHIdx[i+4], "Hx:O"+i+"···H"+(i+4)+":"]);
  }
  // β-barrel: adjacent strand pairs (approximate antiparallel)
  var betaPairs = [[0,1],[1,2],[2,3],[3,4],[5,6],[6,7],[7,8],[8,9],[9,10],[10,0]];
  for (var bp = 0; bp < Math.min(betaPairs.length, 4); bp++) {
    var s1 = betaStrands[betaPairs[bp][0]];
    var s2 = betaStrands[betaPairs[bp][1]];
    var m1 = Math.floor((s1[0]+s1[1])/2);
    var m2 = Math.floor((s2[0]+s2[1])/2);
    bondPairs.push([caIndices[m1], caIndices[m2], "β"+betaPairs[bp][0]+"-β"+betaPairs[bp][1]+":"]);
  }
  // End-to-end
  bondPairs.push([caIndices[0], caIndices[237], "Ca0-Ca237:"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: { "helix H-bond": "2.0 Å", "β-barrel diameter": "~24 Å" },
    energy: "GFP: 238-residue β-barrel, largest quantum protein simulation",
    binding: "Do helix H-bonds form? Does β-barrel topology emerge?"
  };

  // Contact biases
  var hbonds = [];
  // Central helix: i→i+4
  for (var i = 56; i + 4 <= 72; i++) {
    if (amideHIdx[i+4] >= 0) hbonds.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: "Hx:O"+i+"···H"+(i+4) });
  }
  // β-sheet H-bonds between adjacent strands
  for (var bp = 0; bp < betaPairs.length; bp++) {
    var s1 = betaStrands[betaPairs[bp][0]];
    var s2 = betaStrands[betaPairs[bp][1]];
    var len = Math.min(s1[1]-s1[0], s2[1]-s2[0]);
    for (var k = 0; k <= len; k += 2) {
      var r1 = s1[0] + k;
      var r2 = s2[1] - k;  // antiparallel
      if (r2 < s2[0]) r2 = s2[0] + k;
      if (r1 < nRes && r2 < nRes) {
        if (amideHIdx[r2] >= 0) hbonds.push({ a: carbonylOIdx[r1], b: amideHIdx[r2], target: 2.0 * A, label: "β:O"+r1+"···H"+r2 });
      }
    }
  }

  var contacts = [];
  // Barrel closure: β1-β11 (first and last strands)
  contacts.push({ a: caIndices[8], b: caIndices[213], target: 5.0 * A, label: "β1-β11" });
  // Hydrophobic core
  contacts.push({ a: caIndices[64], b: caIndices[150], target: 10.0 * A, label: "helix-β10" });
  contacts.push({ a: caIndices[30], b: caIndices[100], target: 12.0 * A, label: "β4-β7" });
  // End-to-end
  contacts.push({ a: caIndices[0], b: caIndices[237], target: 15.0 * A, label: "Ca0-Ca237" });

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A,
    contactBias: {
      hbonds: hbonds,
      contacts: contacts,
      hbondStrength: 1.2,
      contactStrength: 2.5
    }
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_GRADP_FORCE = true;
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 5;  // move nuclei more often for faster folding
  window.USER_DAMPING = 0.9;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    setTimeout(function() { window._view3D = true; }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
