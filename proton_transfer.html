<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Proton transfer: HF + H2O → F⁻ + H3O+
// HF decomposed as: F⁻ (Z_nuc=3, 4 electrons split into 2 half-spaces) + H⁺ (Z_nuc=1, 0 electrons)
// H2O: O (Z=2, Z_nuc=2) + 2×H (Z=1, Z_nuc=1)
// Total electrons = 2+2+0+2+1+1 = 8, total Z_nuc = 3+0+1+2+1+1 = 8 → neutral
(function() {
  var gridN = 150, scr = 15, N2 = 75;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  var bHF = 0.92 * A;   // H-F bond length 0.92 Å
  var bOH = 0.96 * A;   // O-H bond length 0.96 Å
  var ang = 104.5 * Math.PI / 180;
  var sep = 2.4 * A;    // F-O separation

  // F⁻: kernel charge 3, 4 electrons split into 2 half-spaces (2 each)
  var fOff = 0.1 * A;   // small x-offset for perpendicular split
  addAtom(-sep/2 - fOff, 0, 0, 2, 'F');                                 // 0: F⁻ outer half (2 electrons)
  addAtom(-sep/2 + fOff, 0, 0, 2, 'F');                                 // 1: F⁻ inner half (2 electrons)

  // H⁺: bare proton, no electron
  addAtom(-sep/2 + bHF, 0, 0, 0, 'H');                                  // 2: H⁺

  // H2O (base): O on right, both H pointing away
  addAtom(sep/2, 0, 0, 2, 'O');                                         // 3: O
  addAtom(sep/2 + bOH*Math.sin(ang/2), bOH*Math.cos(ang/2), 0, 1, 'H');    // 4: Ha
  addAtom(sep/2 + bOH*Math.sin(ang/2), -bOH*Math.cos(ang/2), 0, 1, 'H');   // 5: Hb

  console.log('HF + H2O proton transfer (ionic decomposition)');
  console.log('F⁻(2×2e split) + H⁺(0e) + H2O');
  console.log('F-O separation: ' + (sep/A).toFixed(2) + ' Å');

  // Z controls electron count, Z_nuc controls kernel potential
  window.USER_Z =     [2, 2, 0, 2, 1, 1];  // F½=2, F½=2, H⁺=0, O=2, Ha=1, Hb=1
  window.USER_Z_NUC = [3, 0, 1, 2, 1, 1];  // F=3, ghost=0, H=1, O=2, Ha=1, Hb=1

  window.USER_BOND_PAIRS = [
    [0, 2, "F-Ht:"],     // should stay large (F⁻ releases H⁺)
    [2, 3, "Ht-O:"],     // should shrink to ~0.96 Å (proton bonds to O)
    [0, 3, "F···O:"],    // F-O distance
    [3, 4, "O-Ha:"],     // reference O-H
  ];

  window.USER_REFERENCE = {
    bonds: {
      "F-Ht": "H⁺ has no electron — released by F⁻",
      "Ht-O": "should shrink to 0.96 (proton bonds to O)",
      "F···O": "2.4 Å",
      "O-Ha": "0.96 Å (reference)"
    },
    energy: "HF pKa = 3.2. Ionic decomposition: F⁻ + H⁺ + H2O",
    binding: "Does the bare proton bond to O?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;   // converge first, press D
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.95;
  window.USER_N_MOVE = 30;
  window.USER_GRADP_FORCE = false;  // direct Coulomb for bare H atoms
  window.USER_RC = [1.0, 1.0, 0, 0.8, 0, 0];  // F⁻=1.0, ghost=1.0, H⁺ bare, O=0.8, H bare
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load</pre>'; };
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
