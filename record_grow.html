<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<div id="controls" style="position:fixed;top:10px;left:10px;z-index:100;background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:6px">
  <button id="recBtn" style="font-size:14px;padding:4px 12px;background:#c33;color:#fff;border:none;border-radius:4px">Record grow movie</button>
  <select id="molSelect" style="font-size:14px;padding:4px;margin-left:6px">
    <option value="water">Water cluster (9 atoms)</option>
    <option value="glycine">Glycine (16 atoms)</option>
    <option value="ethanol">Ethanol (12 atoms)</option>
    <option value="formamide">Formamide (12 atoms)</option>
  </select>
  <label style="margin-left:8px">Dwell: <input id="dwellInput" type="number" value="3" min="1" max="30" style="width:40px"> sec</label>
  <span id="status" style="margin-left:10px"></span>
</div>
<pre id="log" style="margin-top:50px">Select molecule and press Record.</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// ====== Molecule definitions (centered coordinates in Angstroms) ======
var molecules = {
  water: {
    name: 'Water cluster',
    gridN: 200,
    coords: [
      { ax: 0.0, ay: 0.0, az: 0.0, Z: 2, el: 'O' },
      { ax: 0.76, ay: 0.59, az: 0.0, Z: 1, el: 'H' },
      { ax:-0.76, ay: 0.59, az: 0.0, Z: 1, el: 'H' },
      { ax: 2.8, ay: 0.2, az: 0.0, Z: 2, el: 'O' },
      { ax: 2.1, ay:-0.2, az: 0.0, Z: 1, el: 'H' },
      { ax: 3.5, ay:-0.3, az: 0.0, Z: 1, el: 'H' },
      { ax:-1.5, ay: 2.5, az: 0.0, Z: 2, el: 'O' },
      { ax:-0.8, ay: 1.9, az: 0.0, Z: 1, el: 'H' },
      { ax:-2.3, ay: 2.1, az: 0.0, Z: 1, el: 'H' },
    ],
    names: ['O (water 1)','H (water 1)','H (water 1)','O (water 2)','H (water 2)','H (water 2)','O (water 3)','H (water 3)','H (water 3)'],
    padding: 12, scrMin: 15, scrMax: 40
  },
  glycine: {
    name: 'Glycine + 2 waters',
    gridN: 200,
    coords: [
      { ax: 0.0, ay: 0.0, az: 0.0, Z: 3, el: 'N' },
      { ax: 1.47, ay: 0.0, az: 0.0, Z: 4, el: 'C' },
      { ax: 2.0, ay: 1.4, az: 0.0, Z: 4, el: 'C' },
      { ax: 1.3, ay: 2.4, az: 0.0, Z: 2, el: 'O' },
      { ax: 3.2, ay: 1.5, az: 0.0, Z: 2, el: 'O' },
      { ax:-0.4, ay: 0.8, az: 0.3, Z: 1, el: 'H' },
      { ax:-0.4, ay:-0.8, az:-0.3, Z: 1, el: 'H' },
      { ax: 1.8, ay:-0.5, az: 0.9, Z: 1, el: 'H' },
      { ax: 1.8, ay:-0.5, az:-0.9, Z: 1, el: 'H' },
      { ax: 3.6, ay: 2.3, az: 0.0, Z: 1, el: 'H' },
      { ax:-1.8, ay:-1.0, az: 0.0, Z: 2, el: 'O' },
      { ax:-1.1, ay:-1.5, az: 0.0, Z: 1, el: 'H' },
      { ax:-2.5, ay:-1.5, az: 0.0, Z: 1, el: 'H' },
      { ax: 3.0, ay: 3.5, az: 0.0, Z: 2, el: 'O' },
      { ax: 2.3, ay: 3.1, az: 0.0, Z: 1, el: 'H' },
      { ax: 3.7, ay: 3.1, az: 0.0, Z: 1, el: 'H' },
    ],
    names: ['N (amino)','C (Ca)','C (carboxyl)','O (C=O)','O (C-OH)','H (NH2)','H (NH2)','H (Ca)','H (Ca)','H (OH)','O (water 1)','H (water 1)','H (water 1)','O (water 2)','H (water 2)','H (water 2)'],
    padding: 12, scrMin: 15, scrMax: 50
  },
  ethanol: {
    name: 'Ethanol + water',
    gridN: 200,
    coords: [
      { ax: 0.0, ay: 0.0, az: 0.0, Z: 4, el: 'C' },
      { ax: 1.52, ay: 0.0, az: 0.0, Z: 4, el: 'C' },
      { ax: 2.1, ay: 1.2, az: 0.5, Z: 2, el: 'O' },
      { ax:-0.4, ay: 0.9, az: 0.4, Z: 1, el: 'H' },
      { ax:-0.4, ay:-0.5, az: 0.9, Z: 1, el: 'H' },
      { ax:-0.4, ay:-0.4, az:-0.9, Z: 1, el: 'H' },
      { ax: 1.9, ay:-0.5, az: 0.9, Z: 1, el: 'H' },
      { ax: 1.9, ay:-0.5, az:-0.9, Z: 1, el: 'H' },
      { ax: 3.0, ay: 1.3, az: 0.5, Z: 1, el: 'H' },
      { ax: 2.5, ay: 3.0, az: 0.0, Z: 2, el: 'O' },
      { ax: 2.0, ay: 2.3, az: 0.3, Z: 1, el: 'H' },
      { ax: 3.3, ay: 2.7, az:-0.3, Z: 1, el: 'H' },
    ],
    names: ['C (methyl)','C (methylene)','O (hydroxyl)','H (CH3)','H (CH3)','H (CH3)','H (CH2)','H (CH2)','H (OH)','O (water)','H (water)','H (water)'],
    padding: 12, scrMin: 15, scrMax: 40
  },
  formamide: {
    name: 'Formamide + 2 waters',
    gridN: 200,
    coords: [
      { ax: 0.0, ay: 0.0, az: 0.0, Z: 4, el: 'C' },
      { ax:-0.6, ay: 1.2, az: 0.0, Z: 2, el: 'O' },
      { ax: 1.3, ay:-0.3, az: 0.0, Z: 3, el: 'N' },
      { ax:-0.6, ay:-0.9, az: 0.0, Z: 1, el: 'H' },
      { ax: 1.8, ay:-1.2, az: 0.0, Z: 1, el: 'H' },
      { ax: 1.9, ay: 0.5, az: 0.0, Z: 1, el: 'H' },
      { ax:-1.8, ay: 2.5, az: 0.0, Z: 2, el: 'O' },
      { ax:-1.2, ay: 1.8, az: 0.0, Z: 1, el: 'H' },
      { ax:-2.6, ay: 2.2, az: 0.0, Z: 1, el: 'H' },
      { ax: 3.0, ay:-1.5, az: 0.0, Z: 2, el: 'O' },
      { ax: 2.3, ay:-1.2, az: 0.0, Z: 1, el: 'H' },
      { ax: 3.5, ay:-0.8, az: 0.0, Z: 1, el: 'H' },
    ],
    names: ['C (carbonyl)','O (C=O)','N (amide)','H (aldehyde)','H (NH2)','H (NH2)','O (water 1)','H (water 1)','H (water 1)','O (water 2)','H (water 2)','H (water 2)'],
    padding: 12, scrMin: 15, scrMax: 40
  }
};

var statusEl = document.getElementById('status');
var recording = false;

document.getElementById('recBtn').onclick = function() {
  if (recording) return;
  var molKey = document.getElementById('molSelect').value;
  var dwellSec = parseInt(document.getElementById('dwellInput').value) || 3;
  startRecording(molKey, dwellSec);
};

function buildMolecule(mol) {
  var A = 1.8897;
  var gridN = mol.gridN;
  var rawCoords = mol.coords;

  var cx = 0, cy = 0, cz = 0;
  for (var i = 0; i < rawCoords.length; i++) {
    cx += rawCoords[i].ax; cy += rawCoords[i].ay; cz += rawCoords[i].az;
  }
  cx /= rawCoords.length; cy /= rawCoords.length; cz /= rawCoords.length;

  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (var i = 0; i < rawCoords.length; i++) {
    var x = (rawCoords[i].ax - cx) * A, y = (rawCoords[i].ay - cy) * A, z = (rawCoords[i].az - cz) * A;
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
    if (z < minZ) minZ = z; if (z > maxZ) maxZ = z;
  }
  var extent = Math.max(maxX - minX, maxY - minY, maxZ - minZ);
  var scr = extent + mol.padding * A;
  scr = Math.max(mol.scrMin, Math.min(mol.scrMax, scr));

  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var atoms = [];
  for (var i = 0; i < rawCoords.length; i++) {
    var rc = rawCoords[i];
    var x = (rc.ax - cx) * A, y = (rc.ay - cy) * A, z = (rc.az - cz) * A;
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: rc.Z, el: rc.el });
  }

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });
  window._atomNames = mol.names;
  return atoms.length;
}

function startRecording(molKey, dwellSec) {
  var mol = molecules[molKey];
  recording = true;
  statusEl.textContent = 'Loading ' + mol.name + '...';
  log.textContent = 'Recording: ' + mol.name + '\nDwell: ' + dwellSec + 's per atom';

  var nAtoms = buildMolecule(mol);
  var totalAtoms = window.USER_Z.filter(function(z) { return z > 0; }).length;

  // Need to reload page with molecule set up — use a simpler approach:
  // set globals then load scripts
  if (window._scriptsLoaded) {
    // Already loaded — just need to restart. This is tricky, so reload.
    window.location.reload();
    return;
  }

  var s = document.createElement('script');
  s.src = 'molecule.js?t=' + Date.now();
  s.onerror = function() { log.textContent += '\nFailed to load molecule.js!'; };
  s.onload = function() {
    log.textContent += '\nmolecule.js loaded...';
    var p5s = document.createElement('script');
    p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
    p5s.crossOrigin = 'anonymous';
    p5s.onerror = function() { log.textContent += '\nFailed to load p5.js!'; };
    p5s.onload = function() {
      log.textContent += '\np5.js loaded, waiting for GPU...';
      window._scriptsLoaded = true;

      var waitInit = setInterval(function() {
        if (window.isGpuReady && window.isGpuReady()) {
          clearInterval(waitInit);
          setTimeout(function() {
            beginRecordSequence(totalAtoms, dwellSec, mol.name);
          }, 2000);
        }
      }, 300);
    };
    document.body.appendChild(p5s);
  };
  document.body.appendChild(s);
}

function beginRecordSequence(totalAtoms, dwellSec, molName) {
  // Find the p5 canvas
  var canvas = document.querySelector('canvas');
  if (!canvas) {
    statusEl.textContent = 'ERROR: no canvas found';
    recording = false;
    return;
  }

  // Start MediaRecorder on canvas stream
  var stream = canvas.captureStream(30);  // 30 fps
  var chunks = [];
  var mimeType = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm;codecs=vp8';
  }
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm';
  }
  var recorder = new MediaRecorder(stream, { mimeType: mimeType, videoBitsPerSecond: 5000000 });

  recorder.ondataavailable = function(e) {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = function() {
    var blob = new Blob(chunks, { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = molName.replace(/[^a-zA-Z0-9]/g, '_') + '_grow.webm';
    a.click();
    URL.revokeObjectURL(url);
    statusEl.textContent = 'Recording saved! (' + (blob.size / 1e6).toFixed(1) + ' MB)';
    recording = false;
  };

  recorder.start(1000);  // collect data every second
  statusEl.textContent = 'Recording... atom 1/' + totalAtoms;

  // Activate atom 1
  window.activateAtoms(1);

  // Sequentially add atoms with dwell time between each
  var currentAtom = 1;
  var dwellMs = dwellSec * 1000;

  function addNext() {
    currentAtom++;
    if (currentAtom > totalAtoms) {
      // Final dwell after last atom, then stop
      statusEl.textContent = 'Final dwell...';
      setTimeout(function() {
        recorder.stop();
      }, dwellMs);
      return;
    }
    statusEl.textContent = 'Recording... atom ' + currentAtom + '/' + totalAtoms +
      ' (' + window._atomNames[currentAtom - 1] + ')';
    window.activateAtoms(currentAtom);
    setTimeout(addNext, dwellMs);
  }

  // Start adding after first dwell
  setTimeout(addNext, dwellMs);
}
</script>
</body></html>
