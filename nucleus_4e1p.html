<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// RealNucleus: 4 electrons (-1 each, inner tetrahedra) + 1 proton domain (Z=8, charge +8)
// Total charge: -4 + 8 = +4

(function() {
  var gridN = 200, scr = 5, N2 = 100;
  var h = scr / gridN;
  var atoms = [];

  // 4 electrons in tetrahedral arrangement
  var Rin = 0.3;
  var si = Rin / Math.sqrt(3);
  atoms.push({ i: Math.round(N2 + si/h), j: Math.round(N2 + si/h), k: Math.round(N2 + si/h), Z: 1, el: 'e' });  // 0
  atoms.push({ i: Math.round(N2 + si/h), j: Math.round(N2 - si/h), k: Math.round(N2 - si/h), Z: 1, el: 'e' });  // 1
  atoms.push({ i: Math.round(N2 - si/h), j: Math.round(N2 + si/h), k: Math.round(N2 - si/h), Z: 1, el: 'e' });  // 2
  atoms.push({ i: Math.round(N2 - si/h), j: Math.round(N2 - si/h), k: Math.round(N2 + si/h), Z: 1, el: 'e' });  // 3

  // 1 proton domain (Z=8, charge +8), centered
  atoms.push({ i: N2 + 1, j: N2, k: N2, Z: 8, el: 'P' });  // 4

  console.log('RealNucleus: 4e(-1) + 1P(Z=8,q=+8)');

  window.USER_BOND_PAIRS = [
    [0, 1, "e1-e2:"],
    [0, 4, "e1-P:"],
  ];

  window.USER_REFERENCE = {
    energy: "RealNucleus: 4e(-1) + 1P(Z=8,q=+8)",
    binding: "4 split electrons + joint proton shell"
  };

  window.USER_NUCLEUS_MODE = true;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [1, 1, 1, 1, 8];
  window.USER_Z_NUC = [0, 0, 0, 0, 0];
  window.USER_RC = [0, 0, 0, 0, 0];
  window.USER_MASS = [1, 1, 1, 1, 1];
  window.USER_CHARGE = [-1, -1, -1, -1, 8];
  window.USER_SHELL_RADIUS = 0.8;
  window.USER_SHELL_INNER = [0, 1, 2, 3];
  window.USER_SHELL_OUTER = [4];
  window.USER_CURV_REG = 2.0;
  window.USER_DIRICHLET_EP = 'electron';
  // Lock e-P boundaries, unlock e-e
  window.USER_LOCKED_GROUPS = [[0, 4], [1, 4], [2, 4], [3, 4]];
  window.INIT_ZEFF = 2;
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
