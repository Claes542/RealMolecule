<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0;background:#000;color:#ddd;font-family:monospace">
<div id="stat" style="padding:10px 14px;font-size:14px;color:#80d8ff">initialising…</div>
<div id="err" style="padding:4px 14px;color:#ff5252;font-size:12px"></div>
<script>window.addEventListener('error',function(e){var d=document.getElementById('err');if(d)d.textContent='ERR: '+e.message+' @'+(e.lineno||'');});</script>
<script>
// MASS-IRRELEVANCE TEST (deuteron 2p + 1e). The electron is a FLAT (constant-density) core caged
// between two fixed protons. Its kinetic energy is c_e*Integral|grad psi|^2; for a flat cloud this is
// ZERO regardless of c_e (=hbar^2/2m_e). PREDICTION: sweep the electron mass ?me= and the binding E
// should be ~INDEPENDENT of me (a flat line), confirming the caged electron pays no kinetic price and
// its mass is irrelevant. Geometry FIXED (DYNAMICS off), so the only variable is me.
(function() {
  var me = parseFloat((new URLSearchParams(location.search)).get('me') || '1.0');
  var gridN = 200, scr = 10, N2 = 100, h = scr / gridN, d = 0.6;   // protons at +/- d along x, electron caged between
  var atoms = [
    { i:N2, j:N2, k:N2, Z:1, el:'e' },                             // electron core (charge -1) at center
    { i:Math.round(N2-d/h), j:N2, k:N2, Z:1, el:'P' },             // proton 1
    { i:Math.round(N2+d/h), j:N2, k:N2, Z:1, el:'P' }              // proton 2
  ];

  window.USER_NUCLEUS_MODE = true; window.USER_NN = gridN; window.USER_ATOMS = atoms; window.USER_SCREEN = scr;
  window.USER_STEPS = 8000000; window.USER_DYNAMICS = false;        // FIXED geometry: only me varies
  window.USER_Z=[1,1,1]; window.USER_Z_NUC=[0,0,0]; window.USER_RC=[0,0,0];
  window.USER_MASS=[me,1,1];                                        // <-- electron mass swept; protons mass 1
  window.USER_DV = Math.min(0.12, 0.12*me);                        // <-- time step ~ me: keeps CFL 6*dv/me = 0.72 stable for light electrons
  window.USER_CHARGE=[-1,1,1];
  window.USER_SHELL_RADIUS = 0.6;
  window.USER_SHELL_ZONES = [ { rMax:0.6, atoms:[0] }, { rMax:1e9, atoms:[1,2] } ];
  window.USER_CONST_ECORE = true;                                   // <-- FLAT electron init (no gradient to blow up)
  window.USER_DIRICHLET_EP = false; window.USER_CURV_REG = 0.5;     // all-Neumann free boundaries
  window.INIT_ZEFF = 1; window.CONVERGENCE_THRESHOLD = 0.01*Math.min(1,me);  // tighter for small dv, avoid false convergence
  window.USER_BOND_PAIRS = [ [0,1,"e-P:"], [1,2,"P-P:"] ];
  window.USER_REFERENCE = { energy: "deuteron 2p+1e, flat caged electron, me="+me+"; is E independent of me?" };
  window._me = me;
})();
window.onSweepDone = function (E) { window._Ef = Number(E); document.title='DMASS me='+window._me+' DONE E='+Number(E).toFixed(4); };
var s=document.createElement('script'); s.src='molecule_nucleus.js?t='+Date.now();
s.onload=function(){ var p=document.createElement('script'); p.src='https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js'; document.body.appendChild(p); };
document.body.appendChild(s);
setInterval(function(){
  var e = (window._Ef!==undefined)? window._Ef.toFixed(4) : (window._prevE!==undefined? Number(window._prevE).toFixed(4) : '…');
  document.getElementById('stat').innerHTML = '<b>DEUTERON MASS TEST</b> &nbsp; electron m<sub>e</sub>=<b style="color:#ff0">'+window._me+'</b> &nbsp; E=<b style="color:#0f0">'+e+'</b> &nbsp; conv='+(window._convCount||0)+' frame='+(window.frameCount||0);
  document.title = 'DMASS me='+window._me+' E='+e;
}, 400);
</script>
</body></html>
