<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Beta hairpin 12-residue polyglycine — U-shaped, NO water
(function() {
  var gridN = 200, scr = 80, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897; // angstrom to au
  var atoms = [];

  function addAtom(au_x, au_y, Z, el) {
    atoms.push({
      i: Math.round(N2 + au_x / h),
      j: Math.round(N2 + au_y / h),
      Z: Z, el: el, x: au_x, y: au_y
    });
  }

  var nRes = 12;
  var resAdv = 3.4 * A;   // ~6.4 au per residue
  var zig = 0.5 * A;

  var openingAngle = 175 * Math.PI / 180;

  var bb = [];
  var hingeIdx = 5.5;
  var turnWidth = 2.5;

  var angle1 = Math.PI / 2 + openingAngle / 2;
  var angle2 = Math.PI / 2 - openingAngle / 2;
  var startAngle = -(Math.PI - angle1);
  var endAngle = angle2;

  var angles = [];
  for (var r = 0; r < nRes; r++) {
    var blend = 0.5 * (1 + Math.tanh((r - hingeIdx) / turnWidth));
    angles.push(startAngle * (1 - blend) + endAngle * blend);
  }

  var positions = [{x: 0, y: 0}];
  for (var r = 1; r < nRes; r++) {
    var avgAngle = (angles[r - 1] + angles[r]) / 2;
    positions.push({
      x: positions[r - 1].x + resAdv * Math.cos(avgAngle),
      y: positions[r - 1].y + resAdv * Math.sin(avgAngle)
    });
  }

  var sumX = 0, sumY = 0;
  for (var r = 0; r < nRes; r++) { sumX += positions[r].x; sumY += positions[r].y; }
  var cenX = sumX / nRes, cenY = sumY / nRes;

  for (var r = 0; r < nRes; r++) {
    var cx = positions[r].x - cenX;
    var cy = positions[r].y - cenY;
    var tlx = Math.cos(angles[r]);
    var tly = Math.sin(angles[r]);
    var nx = -tly;
    var ny = tlx;
    var zigSign = (r % 2 === 0) ? 1 : -1;

    bb.push({
      N:  [cx - 0.35 * resAdv * tlx + zigSign * zig * 0.6 * nx,
           cy - 0.35 * resAdv * tly + zigSign * zig * 0.6 * ny],
      Ca: [cx,
           cy - zigSign * zig * 0.4 * ny],
      C:  [cx + 0.35 * resAdv * tlx + zigSign * zig * 0.3 * nx,
           cy + 0.35 * resAdv * tly + zigSign * zig * 0.3 * ny]
    });
  }

  for (var r = 0; r < nRes; r++) {
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var nca_x = Cap[0] - Np[0], nca_y = Cap[1] - Np[1];
    var nca_l = Math.sqrt(nca_x * nca_x + nca_y * nca_y);
    var nca_px = -nca_y / nca_l, nca_py = nca_x / nca_l;
    var cac_x = Cp[0] - Cap[0], cac_y = Cp[1] - Cap[1];
    var cac_l = Math.sqrt(cac_x * cac_x + cac_y * cac_y);
    var cac_px = -cac_y / cac_l, cac_py = cac_x / cac_l;

    addAtom(Np[0], Np[1], 3, 'N');
    var nhSide = (r < 6) ? -1 : 1;
    addAtom(Np[0] + nhSide * nca_px * 1.01 * A, Np[1] + nhSide * nca_py * 1.01 * A, 1, 'H');
    if (r === 0) {
      addAtom(Np[0] - nhSide * nca_px * 1.01 * A, Np[1] - nhSide * nca_py * 1.01 * A, 1, 'H');
    }
    addAtom(Cap[0], Cap[1], 4, 'C');
    addAtom(Cap[0] + cac_px * 1.09 * A, Cap[1] + cac_py * 1.09 * A, 1, 'H');
    addAtom(Cap[0] - cac_px * 1.09 * A, Cap[1] - cac_py * 1.09 * A, 1, 'H');
    addAtom(Cp[0], Cp[1], 4, 'C');
    var oSide = (r < 6) ? ((r % 2 === 0) ? 1 : -1) : ((r % 2 === 0) ? -1 : 1);
    addAtom(Cp[0] + oSide * cac_px * 1.24 * A, Cp[1] + oSide * cac_py * 1.24 * A, 2, 'O');
  }

  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc_x = lastC[0] - lastCa[0], lc_y = lastC[1] - lastCa[1];
  var lc_l = Math.sqrt(lc_x * lc_x + lc_y * lc_y);
  var oh_x = lastC[0] + lc_x / lc_l * 1.34 * A;
  var oh_y = lastC[1] + lc_y / lc_l * 1.34 * A;
  addAtom(oh_x, oh_y, 2, 'O');
  addAtom(oh_x + lc_x / lc_l * 0.97 * A, oh_y + lc_y / lc_l * 0.97 * A, 1, 'H');

  console.log('Bent dry hairpin: ' + atoms.length + ' atoms (no water)');

  window.USER_FOLD_ATOMS = [0, 45, 83];

  // Classical MD force field: auto-detect bonds and angles from initial geometry
  // Bonds: pairs within bonding distance, angles: triplets sharing a bond
  var nAtoms = atoms.length;
  var h_grid = scr / gridN; // au per grid cell

  // Compute initial positions in grid units
  var pos0 = atoms.map(function(a) { return [a.i, a.j]; });

  // Bond detection: max bonding distance per element pair (in grid units)
  var maxBondAu = {
    'H-H': 0, 'H-C': 1.2*A, 'H-N': 1.1*A, 'H-O': 1.05*A,
    'C-C': 1.7*A, 'C-N': 1.6*A, 'C-O': 1.5*A,
    'N-N': 1.5*A, 'N-O': 1.5*A, 'O-O': 1.6*A
  };
  function bondKey(e1, e2) {
    return [e1, e2].sort().join('-');
  }

  var bonds = []; // {a, b, r0} — atom indices and equilibrium distance (grid units)
  for (var i = 0; i < nAtoms; i++) {
    for (var j = i + 1; j < nAtoms; j++) {
      var dx = pos0[i][0] - pos0[j][0], dy = pos0[i][1] - pos0[j][1];
      var dist = Math.sqrt(dx*dx + dy*dy); // grid units
      var distAu = dist * h_grid;
      var key = bondKey(atoms[i].el, atoms[j].el);
      var maxD = maxBondAu[key] || 0;
      if (maxD > 0 && distAu < maxD) {
        bonds.push({ a: i, b: j, r0: dist });
      }
    }
  }

  // Build neighbor list for angle detection
  var neighbors = [];
  for (var i = 0; i < nAtoms; i++) neighbors.push([]);
  for (var b = 0; b < bonds.length; b++) {
    neighbors[bonds[b].a].push(bonds[b].b);
    neighbors[bonds[b].b].push(bonds[b].a);
  }

  // Angle detection: for each atom with 2+ neighbors, form angles
  var angles = []; // {a, b, c, theta0} — b is central atom
  for (var b = 0; b < nAtoms; b++) {
    var nbrs = neighbors[b];
    for (var ii = 0; ii < nbrs.length; ii++) {
      for (var jj = ii + 1; jj < nbrs.length; jj++) {
        var a = nbrs[ii], c = nbrs[jj];
        // Compute initial angle
        var bax = pos0[a][0] - pos0[b][0], bay = pos0[a][1] - pos0[b][1];
        var bcx = pos0[c][0] - pos0[b][0], bcy = pos0[c][1] - pos0[b][1];
        var dot = bax*bcx + bay*bcy;
        var magBA = Math.sqrt(bax*bax + bay*bay);
        var magBC = Math.sqrt(bcx*bcx + bcy*bcy);
        var cosA = dot / (magBA * magBC);
        cosA = Math.max(-1, Math.min(1, cosA));
        angles.push({ a: a, b: b, c: c, theta0: Math.acos(cosA) });
      }
    }
  }

  console.log('Classical MD: ' + bonds.length + ' bonds, ' + angles.length + ' angles');

  // Ca indices and residue groups for coarse-grained dynamics
  var caIndices = [3];
  for (var r = 1; r < 12; r++) caIndices.push(7*r + 3);

  var mdGroups = [];
  mdGroups.push([0,1,2,3,4,5,6,7]);
  for (var r = 1; r < 12; r++) {
    var g = [];
    for (var a = 7*r+1; a <= 7*r+7; a++) g.push(a);
    mdGroups.push(g);
  }
  mdGroups.push([85, 86]);

  // Compute per-residue offsets in local frame (tangent/normal)
  var mdOffsets = [];
  for (var g = 0; g < 12; g++) {
    var caIdx = caIndices[g];
    var tx, ty;
    if (g === 0) { tx = atoms[caIndices[1]].i - atoms[caIndices[0]].i; ty = atoms[caIndices[1]].j - atoms[caIndices[0]].j; }
    else if (g === 11) { tx = atoms[caIndices[11]].i - atoms[caIndices[10]].i; ty = atoms[caIndices[11]].j - atoms[caIndices[10]].j; }
    else { tx = atoms[caIndices[g+1]].i - atoms[caIndices[g-1]].i; ty = atoms[caIndices[g+1]].j - atoms[caIndices[g-1]].j; }
    var tl = Math.sqrt(tx*tx + ty*ty);
    tx /= tl; ty /= tl;
    var nx = -ty, ny = tx;
    var groupOffsets = [];
    for (var k = 0; k < mdGroups[g].length; k++) {
      var ai = mdGroups[g][k];
      var dx = atoms[ai].i - atoms[caIdx].i;
      var dy = atoms[ai].j - atoms[caIdx].j;
      groupOffsets.push({ di: dx * tx + dy * ty, dj: dx * nx + dy * ny });
    }
    mdOffsets.push(groupOffsets);
  }
  // C-term OH offsets
  var lastCaIdx2 = caIndices[11];
  var ltx2 = atoms[caIndices[11]].i - atoms[caIndices[10]].i;
  var lty2 = atoms[caIndices[11]].j - atoms[caIndices[10]].j;
  var ltl2 = Math.sqrt(ltx2*ltx2 + lty2*lty2);
  ltx2 /= ltl2; lty2 /= ltl2;
  var lnx2 = -lty2, lny2 = ltx2;
  mdOffsets.push([
    { di: (atoms[85].i - atoms[lastCaIdx2].i) * ltx2 + (atoms[85].j - atoms[lastCaIdx2].j) * lty2,
      dj: (atoms[85].i - atoms[lastCaIdx2].i) * lnx2 + (atoms[85].j - atoms[lastCaIdx2].j) * lny2 },
    { di: (atoms[86].i - atoms[lastCaIdx2].i) * ltx2 + (atoms[86].j - atoms[lastCaIdx2].j) * lty2,
      dj: (atoms[86].i - atoms[lastCaIdx2].i) * lnx2 + (atoms[86].j - atoms[lastCaIdx2].j) * lny2 }
  ]);

  window.USER_CLASSICAL_MD = {
    caIndices: caIndices,
    groups: mdGroups,
    offsets: mdOffsets,
    mdSteps: 50,      // SHAKE iterations for Ca-Ca constraints
    mdDt: 0.01        // force displacement scale
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_N_MOVE = 200;  // 200 electronic steps to settle before elastic update
  window.USER_FORCE_SCALE = 200.0;
  window.USER_DAMPING = 0.5;
  window.USER_ARROW_SCALE = 0.1;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    // Video recording: press R to start/stop, auto-downloads webm
    var recorder = null, chunks = [], recording = false;
    window._toggleRecording = function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      if (!recording) {
        chunks = [];
        var stream = canvas.captureStream(10); // 10 fps
        var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9')
          ? 'video/webm; codecs=vp9'
          : MediaRecorder.isTypeSupported('video/webm; codecs=vp8')
          ? 'video/webm; codecs=vp8'
          : MediaRecorder.isTypeSupported('video/webm')
          ? 'video/webm'
          : 'video/mp4';
        console.log('Recording with: ' + mimeType);
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = function() {
          var blob = new Blob(chunks, { type: mimeType });
          var ext = mimeType.indexOf('mp4') >= 0 ? 'mp4' : 'webm';
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'hairpin_fold.' + ext; a.click();
          URL.revokeObjectURL(url);
          console.log('Recording saved: hairpin_fold.webm');
        };
        window._recStreamTrack = stream.getVideoTracks()[0];
        recorder.start();
        recording = true;
        var dot = document.createElement('div');
        dot.id = 'rec-indicator';
        dot.style.cssText = 'position:fixed;top:10px;right:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;';
        dot.textContent = '\u25CF REC';
        document.body.appendChild(dot);
        console.log('Recording started (press R to stop)');
      } else {
        recorder.stop();
        recording = false;
        window._recStreamTrack = null;
        var ind = document.getElementById('rec-indicator');
        if (ind) ind.remove();
        console.log('Recording stopped, saving...');
      }
    };
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
