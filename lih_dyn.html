<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LiH — Per-Electron Grid (moleculedyn)</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; flex-direction: column; }
    canvas { border: none; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line) {
      document.body.style.color = 'red';
      document.body.innerHTML = '<pre>ERROR: ' + msg + '\nLine: ' + line + '\nFile: ' + url + '</pre>';
    };

    (function() {
      var N = 200, scr = 12;
      var hv = scr / N;
      var bond = 3.0;
      var bCells = Math.round(bond / hv);
      var hi = Math.round(5.0 / hv);
      var hj = Math.round(6.0 / hv);

      window.USER_NN = N;
      window.USER_ATOMS = [
        { i: hi, j: hj, Z: 1, el: 'Li' },
        { i: hi + bCells, j: hj, Z: 1, el: 'H' }
      ];
      window.USER_SCREEN = scr;
      window.USER_STEPS = 100000;
      window.USER_Z = [1, 1];
      window.USER_RC = [0.5, 0];

      console.log('LiH (per-electron grid): 2 atoms, bond=' + bond + ' au');
    })();

    var s = document.createElement('script');
    s.src = 'moleculedyn.js?t=' + Date.now();
    s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load moleculedyn.js</pre>'; };
    s.onload = function() {
      var p5s = document.createElement('script');
      p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
      document.body.appendChild(p5s);
    };
    document.body.appendChild(s);
  </script>
</body>
</html>
