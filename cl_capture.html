<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Cl atom captures electron → Cl⁻
// +1 kernel at origin, 2 electrons split into half-spaces but decentered
// Does the electron pair settle around the kernel?
(function() {
  var gridN = 150, scr = 15, N2 = 75;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  // +1 kernel at origin
  // 2 electrons split in y (half-spaces), decentered 1 Å to the right in x
  var decenter = 1.0 * A;  // electrons start 1 Å away from kernel
  var splitOff = 0.1 * A;  // small y-offset for half-space split

  addAtom(decenter, splitOff, 0, 1, 'Cl');    // 0: electron upper half
  addAtom(decenter, -splitOff, 0, 1, 'Cl');   // 1: electron lower half

  console.log('Cl⁻ formation: +1 kernel at origin, 2 electrons decentered by ' + (decenter/A).toFixed(2) + ' Å');

  window.USER_Z =     [1, 1];    // 1 electron each half
  window.USER_Z_NUC = [1, 0];    // kernel on atom 0 only

  // But kernel should be at origin, not at atom 0 position
  // We need the kernel at (0,0,0) and electrons at (decenter, ±splitOff, 0)
  // Use atom 0 for kernel position — but then atom 0 electron is at the kernel
  // Instead: put a bare kernel at origin, electrons decentered

  // Redo: 3 atoms — kernel at origin (Z=0, Z_nuc=1), two electrons decentered
  atoms = [];
  // 4 quadrants in the xy-plane around +3 kernel
  // 3 electrons centered at kernel (in quadrants 1,2,3), 1 incoming (quadrant 4)
  var qOff = 0.5 * A;  // offset to seed quadrant Voronoi domains
  addAtom(0, 0, 0, 0, 'Cl');                              // 0: +3 kernel
  addAtom(qOff, qOff, 0, 1, 'e');                         // 1: quadrant 1 (upper right)
  addAtom(-qOff, qOff, 0, 1, 'e');                        // 2: quadrant 2 (upper left)
  addAtom(-qOff, -qOff, 0, 1, 'e');                       // 3: quadrant 3 (lower left)
  addAtom(decenter, -qOff, 0, 1, 'e');                    // 4: incoming electron (quadrant 4, decentered)

  window.USER_Z =     [0, 1, 1, 1, 1];    // kernel=0e, 3 Cl electrons + 1 free
  window.USER_Z_NUC = [3, 0, 0, 0, 0];   // +3 kernel, electrons have no kernel

  window.USER_BOND_PAIRS = [
    [0, 4, "Cl-e:"],     // should shrink as free electron is captured
    [0, 1, "Cl-e1:"],   // Cl's own electron
    [0, 2, "Cl-e2:"],   // Cl's own electron
  ];

  window.USER_REFERENCE = {
    bonds: {
      "Cl-e": "should shrink → electrons settle around kernel"
    },
    binding: "Do decentered electrons get pulled to the +1 kernel?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;   // converge first, press D
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.95;
  window.USER_N_MOVE = 30;
  window.USER_GRADP_FORCE = false;
  window.USER_RC = [0.8, 0, 0, 0, 0];  // kernel rc=0.8, electrons bare
  window.USER_HINGE_ATOMS = [0, 1, 2, 3];  // fix kernel and its 3 electrons
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load</pre>'; };
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
