<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Catalytic triad proton relay: Asp⁻ → His → Ser
// Simplified as: O⁻(Asp) ··· H1 ··· N(His) ··· H2 ··· O(Ser)
// Two sequential proton transfers activate serine for nucleophilic attack
// O⁻(Asp) pushes H1 toward N(His), then N passes H2 to O(Ser) releasing OH⁻
(function() {
  var gridN = 200, scr = 20, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  // Distances along x-axis
  // Asp(O⁻) --- H1 --- His(N) --- H2 --- Ser(O)
  var dON = 2.8 * A;    // Asp O to His N distance
  var dNO = 2.8 * A;    // His N to Ser O distance
  var bOH = 0.96 * A;   // O-H bond
  var bNH = 1.01 * A;   // N-H bond

  // Asp O⁻: negative ion, 2 electrons split, pushes proton
  var aspX = -dON;
  var oOff = 0.1 * A;
  addAtom(aspX - oOff, 0, 0, 1, 'O');    // 0: Asp O⁻ outer half
  addAtom(aspX + oOff, 0, 0, 1, 'O');    // 1: Asp O⁻ inner half

  // H1: proton between Asp and His (starts bonded to His N)
  addAtom(-bNH, 0, 0, 1, 'H');           // 2: H1 (on His side)

  // His N: central nitrogen, accepts H1 from Asp side, donates H2 to Ser
  addAtom(0, 0, 0, 3, 'N');              // 3: His N

  // H2: proton between His and Ser (starts bonded to Ser O)
  addAtom(dNO - bOH, 0, 0, 1, 'H');     // 4: H2 (on Ser side)

  // Ser O: holds H2, should release it to become O⁻ (activated nucleophile)
  addAtom(dNO, 0, 0, 2, 'O');            // 5: Ser O

  console.log('Catalytic triad: Asp⁻ → His → Ser');
  console.log('Asp O at ' + (aspX/A).toFixed(2) + ', His N at 0, Ser O at ' + (dNO/A).toFixed(2));

  // Z controls electrons, Z_nuc controls kernel charge
  window.USER_Z =     [1, 1, 1, 3, 1, 2];  // AspO½=1, AspO½=1, H1=1, N=3, H2=1, SerO=2
  window.USER_Z_NUC = [1, 0, 1, 3, 1, 2];  // AspO kernel=1, ghost=0, H1=1, N=3, H2=1, SerO=2

  window.USER_BOND_PAIRS = [
    [1, 2, "Asp-H1:"],   // Asp O to H1 (should H1 move toward N?)
    [2, 3, "H1-N:"],     // H1 to His N
    [3, 4, "N-H2:"],     // His N to H2 (should H2 move toward N?)
    [4, 5, "H2-Ser:"],   // H2 to Ser O
  ];

  window.USER_REFERENCE = {
    bonds: {
      "Asp-H1": "H-bond ~1.8 Å",
      "H1-N": "should be ~1.01 (N-H covalent)",
      "N-H2": "should shrink if relay works",
      "H2-Ser": "0.96 (O-H covalent) → should stretch"
    },
    energy: "Catalytic triad: Asp⁻ activates His, His deprotonates Ser",
    binding: "Does the proton relay propagate? Watch H1 and H2 positions."
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;   // converge first, press D
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.95;
  window.USER_N_MOVE = 30;
  window.USER_GRADP_FORCE = true;
  window.USER_RC = [1.0, 1.0, 0, 0.5, 0, 0.8];  // AspO⁻=1.0, ghost=1.0, H1 bare, N=0.5, H2 bare, SerO=0.8
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load</pre>'; };
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
