<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>Water trimer closing — 3 waters → cyclic trimer</title>
  <style>body { margin: 0; background: #000; color: #fff; font-family: monospace; }</style>
</head><body>
<div id="info" style="position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.8);padding:10px;border:1px solid #333;border-radius:6px;max-width:420px;font-size:12px;z-index:100">
  <div style="color:#ffa;font-weight:bold">Water Trimer closing</div>
  Three H<sub>2</sub>O at triangle vertices, each donor oriented toward next clockwise neighbor.
  URL <b>?R=N</b> (au) = starting O-triangle radius (default 4 = ~2.1 Å center-to-O).
  Closing reaches cyclic trimer with O-O ≈ 5.6 au (2.95 Å). Watch all three O-O shrink to that.
</div>
<script>
(function() {
  var gridN = 180, scr = 20, N2 = 90;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  var urlR = parseFloat(new URLSearchParams(location.search).get('R'));
  var R = isFinite(urlR) ? urlR : 4.0;  // triangle radius

  var waterTriplets = [];
  function addWaterAt(theta, phi) {
    // Place O at (R cos θ, R sin θ, 0). Donor H points toward next water CW;
    // Second H off-axis in +z for symmetry breaking.
    var bOH = 0.96 * A, angW = 104.5 * Math.PI / 180;
    var ox = R * Math.cos(theta), oy = R * Math.sin(theta), oz = 0;
    // Donor H direction: rotated +120° around z from O vector (toward next CW water)
    var donorAng = theta + 2 * Math.PI / 3;
    var h1x = ox + bOH * Math.cos(donorAng), h1y = oy + bOH * Math.sin(donorAng), h1z = 0;
    // H2: tangent + up (non-donor, non-aligned)
    var h2x = ox + bOH * Math.cos(theta + Math.PI) * Math.sin(angW),
        h2y = oy + bOH * Math.sin(theta + Math.PI) * Math.sin(angW),
        h2z = bOH * Math.cos(angW);
    var oIdx = atoms.length;
    addAtom(ox, oy, oz, 2, 'O');
    addAtom(h1x, h1y, h1z, 1, 'H');
    addAtom(h2x, h2y, h2z, 1, 'H');
    waterTriplets.push([oIdx, oIdx + 1, oIdx + 2]);
  }

  addWaterAt(0, 0);
  addWaterAt(2 * Math.PI / 3, 0);
  addWaterAt(4 * Math.PI / 3, 0);

  window.USER_WATER_TRIPLETS = waterTriplets;
  window.USER_BEND_K = 1.5;

  // Monitor three O-O distances
  setInterval(function() {
    if (typeof nucPos === 'undefined') return;
    function dist(i, j) {
      if (!nucPos[i] || !nucPos[j]) return 0;
      var dx = (nucPos[i][0] - nucPos[j][0]) * h;
      var dy = (nucPos[i][1] - nucPos[j][1]) * h;
      var dz = (nucPos[i][2] - nucPos[j][2]) * h;
      return Math.sqrt(dx*dx + dy*dy + dz*dz);
    }
    var o1 = waterTriplets[0][0], o2 = waterTriplets[1][0], o3 = waterTriplets[2][0];
    var d12 = dist(o1, o2), d23 = dist(o2, o3), d31 = dist(o3, o1);
    window._ooDist = 'O-O: [' + d12.toFixed(2) + ', ' + d23.toFixed(2) + ', ' + d31.toFixed(2) + '] au  (target 5.6)';
  }, 500);

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;  // relax electrons 5000 steps first
  setInterval(function() {
    if (typeof phaseSteps !== 'undefined' && phaseSteps > 5000 && typeof dynamicsEnabled !== 'undefined' && !dynamicsEnabled) {
      window.dynamicsEnabled = true;
      console.log('trimer: dynamics ON');
    }
  }, 500);
  // Force ramp
  window.USER_FORCE_SCALE = 1.0;
  setInterval(function() {
    if (typeof nucStepCount !== 'undefined' && nucStepCount > 2000 && window.USER_FORCE_SCALE < 15) {
      window.USER_FORCE_SCALE = 20.0;
    }
  }, 200);
  window.USER_ARROW_SCALE = 50.0;
  window.USER_TEMPERATURE_K = 0;
  window.USER_LANGEVIN_GAMMA = 0.2;
  window.USER_NUC_SUBSTEPS = 10;
  window.USER_N_MOVE = 30;
  window.USER_THERMAL_KICK = 0;
  window.USER_ROT_SPEED = 0.005;
  window.USER_GRADP_FORCE = true;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'O') return 0.8;
    return 0;
  });
  window.INIT_ZEFF = 2;
  console.log('Trimer: 3 waters, R=' + R + ' au initial triangle radius');
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p = document.createElement('script');
  p.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p);
};
document.body.appendChild(s);
</script>
</body></html>
