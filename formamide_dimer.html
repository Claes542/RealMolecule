<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Formamide dimer (2× HCONH2) — 12 atoms on 200^3, 3D
// Tests N-H···O=C hydrogen bond — the key interaction for protein folding
// Known: binding energy ~14 kcal/mol, O···H distance ~1.9 Å, O···N distance ~2.9 Å
(function() {
  var gridN = 200, scr = 16, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(au_x, au_y, au_z, Z, el) {
    atoms.push({
      i: Math.round(N2 + au_x / h),
      j: Math.round(N2 + au_y / h),
      k: Math.round(N2 + au_z / h),
      Z: Z, el: el
    });
  }

  // Formamide 1 (donor: N-H points toward O of formamide 2)
  // HCONH2 geometry: C at center, O double-bonded, N with 2 H's
  // Molecule 1: centered at (-sep/2, 0, 0), oriented with C=O pointing right
  // Two formamides facing each other for double H-bond
  // Molecule 1: C=O on left, NH2 on right
  // Molecule 2: C=O on left (facing mol 1's NH2), NH2 on right
  // Separation: C1-C2 ~ 5.5 Å so H-bond O···H ~ 1.9 Å
  var csep = 5.5 * A; // C-C separation in au

  // Formamide 1 (left) — O: Z_nuc=4, 4 tetrahedral electrons, r_c=0.5
  var x1 = -csep / 2;
  var ox1 = x1 - 1.22*A;
  addAtom(x1, 0, 0, 4, 'C');                           // 0: C1
  addAtom(ox1, 0, 0, 0, 'O');                           // 1: O1 kernel (Z=0, Z_nuc=4)
  addAtom(ox1+h, h, h, 1, 'O');                         // 2: O1 e⁻ tetrahedral
  addAtom(ox1+h, -h, -h, 1, 'O');                       // 3: O1 e⁻
  addAtom(ox1-h, h, -h, 1, 'O');                        // 4: O1 e⁻
  addAtom(ox1-h, -h, h, 1, 'O');                        // 5: O1 e⁻
  addAtom(x1, 0, 1.09*A, 1, 'H');                      // 6: HC1
  addAtom(x1 + 1.34*A, 0.3*A, 0, 3, 'N');              // 7: N1
  addAtom(x1 + 1.34*A + 0.87*A, -0.2*A, 0, 1, 'H');   // 8: HN1a (H-bond donor)
  addAtom(x1 + 1.34*A + 0.3*A, 1.2*A, 0, 1, 'H');     // 9: HN1b

  // Formamide 2 (right) — same tetrahedral O
  var x2 = csep / 2;
  var ox2 = x2 - 1.22*A;
  addAtom(x2, 0, 0, 4, 'C');                           // 10: C2
  addAtom(ox2, 0, 0, 0, 'O');                           // 11: O2 kernel (Z=0, Z_nuc=4)
  addAtom(ox2+h, h, h, 1, 'O');                         // 12: O2 e⁻ tetrahedral
  addAtom(ox2+h, -h, -h, 1, 'O');                       // 13: O2 e⁻
  addAtom(ox2-h, h, -h, 1, 'O');                        // 14: O2 e⁻
  addAtom(ox2-h, -h, h, 1, 'O');                        // 15: O2 e⁻
  addAtom(x2, 0, -1.09*A, 1, 'H');                     // 16: HC2
  addAtom(x2 + 1.34*A, -0.3*A, 0, 3, 'N');             // 17: N2
  addAtom(x2 + 1.34*A + 0.87*A, 0.2*A, 0, 1, 'H');    // 18: HN2a
  addAtom(x2 + 1.34*A + 0.3*A, -1.2*A, 0, 1, 'H');    // 19: HN2b

  console.log('Formamide dimer: ' + atoms.length + ' atoms');
  console.log('H-bond: HN1a(4) → O2(7)');
  console.log('Expected: O···H ~1.9A, O···N ~2.9A, binding ~14 kcal/mol');

  // Bond pairs for display
  // Intramolecular bonds
  window.USER_BOND_PAIRS = [
    [0, 1, "C=O:"],      // C1-O1 kernel
    [0, 7, "C-N:"],      // C1-N1
    [7, 8, "N-H:"],      // N1-HN1a (donor H)
    [10, 11, "C=O:"],    // C2-O2 kernel
    [10, 17, "C-N:"],    // C2-N2
    // H-bond: HN1a(8) → O2 kernel(11)
    [8, 11, "H···O:"],   // H-bond distance
    [7, 11, "N···O:"],   // donor-acceptor
    // Inter-monomer
    [0, 10, "C···C:"],   // C1-C2 separation
  ];

  // PySCF HF/6-31G* reference values for on-screen comparison
  window.USER_REFERENCE = {
    bonds: {
      "C=O": "1.22",
      "C-N": "1.34",
      "N-H": "1.01",
      "H···O": "1.90",
      "N···O": "2.90",
      "C···C": "5.50"
    },
    energy: "-337.395 Ha (HF/6-31G*)",
    binding: "-4.87 kcal/mol (HF/6-31G*), lit: -7 to -14"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 5.0;
  window.USER_ARROW_SCALE = 5.0;
  window.USER_DAMPING = 0.92;
  window.USER_N_MOVE = 50;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_Z_NUC = atoms.map(function(a) {
    if (a.Z === 0 && a.el === 'O') return 4;  // O kernel: Z_nuc=4
    if (a.Z === 1 && a.el === 'O') return 0;  // O electron-only
    return a.Z;
  });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.5;              // same core as O: [1s² 2s²]
    if (a.el === 'O' && a.Z === 0) return 0.5; // O kernel
    if (a.el === 'O') return 0;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    // Auto-record: start after 5s, stop after 30 min
    setTimeout(function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      var chunks = [], stream = canvas.captureStream(0);
      var track = stream.getVideoTracks()[0];
      var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9') ? 'video/webm; codecs=vp9' : 'video/webm';
      var recorder = new MediaRecorder(stream, { mimeType: mimeType });
      recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
      recorder.onstop = function() {
        var blob = new Blob(chunks, { type: mimeType });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = 'formamide_dimer.webm'; a.click();
      };
      recorder.start(1000);
      var origDraw = window.draw;
      window.draw = function() { if (origDraw) origDraw(); try { track.requestFrame(); } catch(e) {} };
      var dot = document.createElement('div');
      dot.id = 'rec-indicator';
      dot.style.cssText = 'position:fixed;top:10px;left:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;animation:blink 1s infinite;';
      dot.textContent = '\u25CF REC';
      var style = document.createElement('style');
      style.textContent = '@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}';
      document.head.appendChild(style);
      document.body.appendChild(dot);
      setTimeout(function() { recorder.stop(); dot.remove(); }, 30 * 60 * 1000);
    }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
