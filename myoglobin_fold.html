<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building Myoglobin...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Sperm whale myoglobin (1MBN): 153 residues, all-α globin fold
// 8 helices (A-H) folded around a heme-binding pocket
// Sequence (1MBN):
// VLSEGEWQLVLHVWAKVEADVAGHGQDILIRLFKSHPETLEKFDRFKHLKTEAEMKASEDLKKHGVTVLTALGAILKKKGH
// HEAELKPLAQSHATKHKIPIKYLEFISEAIIHVLHSRHPGDFGADAQGAMNKALELFRKDIAAKYKELGYQG
(function() {
  var gridN = 300, scr = 120;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;
  var nRes = 153;
  var seq = [
    'V','L','S','E','G','E','W','Q','L','V','L','H','V','W','A','K',
    'V','E','A','D','V','A','G','H','G','Q','D','I','L','I','R','L',
    'F','K','S','H','P','E','T','L','E','K','F','D','R','F','K','H',
    'L','K','T','E','A','E','M','K','A','S','E','D','L','K','K','H',
    'G','V','T','V','L','T','A','L','G','A','I','L','K','K','K','G',
    'H','H','E','A','E','L','K','P','L','A','Q','S','H','A','T','K',
    'H','K','I','P','I','K','Y','L','E','F','I','S','E','A','I','I',
    'H','V','L','H','S','R','H','P','G','D','F','G','A','D','A','Q',
    'G','A','M','N','K','A','L','E','L','F','R','K','D','I','A','A',
    'K','Y','K','E','L','G','Y','Q','G'
  ];

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;

  // Compact spiral — 153 residues need tight packing
  var resAdv = 3.8 * A;
  var helixRadius = 20.0;
  var helixRise = 0.7;     // tight rise to fit in box
  var helixAngle = 2 * Math.PI / 5.0;
  var z0 = -(nRes - 1) * helixRise / 2;

  var bb = [];
  for (var r = 0; r < nRes; r++) {
    var angle = r * helixAngle;
    var cx = helixRadius * Math.cos(angle);
    var cy = helixRadius * Math.sin(angle);
    var cz = z0 + r * helixRise;
    var tx = -helixRadius * Math.sin(angle) * helixAngle;
    var ty =  helixRadius * Math.cos(angle) * helixAngle;
    var tz = helixRise;
    var tl = Math.sqrt(tx*tx + ty*ty + tz*tz);
    tx /= tl; ty /= tl; tz /= tl;
    var spread = resAdv * 0.35;
    bb.push({
      N:  [cx - spread * tx, cy - spread * ty, cz - spread * tz],
      Ca: [cx, cy, cz],
      C:  [cx + spread * tx, cy + spread * ty, cz + spread * tz]
    });
  }

  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
  function normalize(v) { var l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])+1e-10; return [v[0]/l,v[1]/l,v[2]/l]; }

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca = [Cap[0]-Np[0], Cap[1]-Np[1], Cap[2]-Np[2]];
    var nca_n = normalize(nca);
    var cac = [Cp[0]-Cap[0], Cp[1]-Cap[1], Cp[2]-Cap[2]];
    var cac_n = normalize(cac);
    var perp = normalize(cross(nca_n, cac_n));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,0,1]));
    if (Math.abs(perp[0])+Math.abs(perp[1])+Math.abs(perp[2]) < 0.01) perp = normalize(cross(nca_n, [0,1,0]));
    var perp2 = normalize(cross(nca_n, perp));

    pushAtom(Np[0], Np[1], Np[2], 'N', 3);

    if (!isPro) {
      amideHIdx.push(atoms.length);
      pushAtom(Np[0] + perp[0]*bNH, Np[1] + perp[1]*bNH, Np[2] + perp[2]*bNH, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    if (r === 0) {
      pushAtom(Np[0] - perp[0]*bNH, Np[1] - perp[1]*bNH, Np[2] - perp[2]*bNH, 'H', 1);
    }

    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], Cap[2], 'C', 4);

    if (isGly) {
      pushAtom(Cap[0] + perp[0]*bCH, Cap[1] + perp[1]*bCH, Cap[2] + perp[2]*bCH, 'H', 1);
      pushAtom(Cap[0] - perp[0]*bCH, Cap[1] - perp[1]*bCH, Cap[2] - perp[2]*bCH, 'H', 1);
    } else {
      pushAtom(Cap[0] + perp[0]*bCH*0.7 + perp2[0]*bCH*0.7,
               Cap[1] + perp[1]*bCH*0.7 + perp2[1]*bCH*0.7,
               Cap[2] + perp[2]*bCH*0.7 + perp2[2]*bCH*0.7, 'H', 1);
      var cbX = Cap[0] - perp[0]*bCaCb*0.8;
      var cbY = Cap[1] - perp[1]*bCaCb*0.8;
      var cbZ = Cap[2] - perp[2]*bCaCb*0.8;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        var hx = perp[0]*Math.cos(phi) + perp2[0]*Math.sin(phi);
        var hy = perp[1]*Math.cos(phi) + perp2[1]*Math.sin(phi);
        var hz = perp[2]*Math.cos(phi) + perp2[2]*Math.sin(phi);
        pushAtom(cbX + hx*bCH*0.8, cbY + hy*bCH*0.8, cbZ + hz*bCH*0.8, 'H', 1);
      }
    }

    pushAtom(Cp[0], Cp[1], Cp[2], 'C', 4);

    carbonylOIdx.push(atoms.length);
    pushAtom(Cp[0] + perp[0]*bCO, Cp[1] + perp[1]*bCO, Cp[2] + perp[2]*bCO, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc = normalize([lastC[0]-lastCa[0], lastC[1]-lastCa[1], lastC[2]-lastCa[2]]);
  pushAtom(lastC[0] + lc[0]*1.34*A, lastC[1] + lc[1]*1.34*A, lastC[2] + lc[2]*1.34*A, 'O', 2);
  pushAtom(lastC[0] + lc[0]*(1.34*A+bOH), lastC[1] + lc[1]*(1.34*A+bOH), lastC[2] + lc[2]*(1.34*A+bOH), 'H', 1);

  var nProtein = atoms.length;

  // Helix definitions (1MBN numbering, 0-indexed):
  // A: 3-18    B: 20-35    C: 36-42    D: 51-57
  // E: 58-77   F: 86-94    G: 100-118  H: 124-148
  var helices = [
    { name: 'A', start: 3,   end: 18  },
    { name: 'B', start: 20,  end: 35  },
    { name: 'C', start: 36,  end: 42  },
    { name: 'D', start: 51,  end: 57  },
    { name: 'E', start: 58,  end: 77  },
    { name: 'F', start: 86,  end: 94  },
    { name: 'G', start: 100, end: 118 },
    { name: 'H', start: 124, end: 148 }
  ];

  log.textContent = 'Myoglobin 1MBN (spiral start): ' + atoms.length + ' atoms, ' + nRes + ' residues';
  log.textContent += '\n8 helices: ' + helices.map(function(h) { return h.name + '(' + h.start + '-' + h.end + ')'; }).join(' ');
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr.toFixed(1) + ' au';

  window.USER_FOLD_ATOMS = [caIndices[0], caIndices[76], caIndices[152]];

  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  resGroups.push([nProtein - 2, nProtein - 1]);

  // Display bond pairs — sample from each helix + key contacts
  var bondPairs = [];
  for (var hi = 0; hi < helices.length; hi++) {
    var hx = helices[hi];
    var mid = Math.floor((hx.start + hx.end) / 2);
    if (mid + 4 <= hx.end && amideHIdx[mid+4] >= 0) {
      bondPairs.push([carbonylOIdx[mid], amideHIdx[mid+4], hx.name + ":O" + mid + "···H" + (mid+4) + ":"]);
    }
  }
  // Heme pocket contacts (His64 distal, His93 proximal — pack near each other)
  bondPairs.push([caIndices[63], caIndices[92], "H64-H93(heme):"]);
  // Inter-helix core
  bondPairs.push([caIndices[10], caIndices[110], "L11-L111(A-G):"]);
  bondPairs.push([caIndices[32], caIndices[68], "F33-I69(B-E):"]);
  bondPairs.push([caIndices[6], caIndices[137], "W7-F138(A-H):"]);
  // End-to-end
  bondPairs.push([caIndices[0], caIndices[152], "Ca0-Ca152:"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "H64-H93": "~10",
      "L11-L111": "~10",
      "F33-I69": "~9",
      "W7-F138": "~12",
      "Ca0-Ca152": "~15"
    },
    energy: "Myoglobin 1MBN: 8-helix globin fold",
    binding: "Native: 8 α-helices packed around heme pocket"
  };

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A,
    contactBias: {
      // All 8 helix H-bonds (i→i+4)
      hbonds: (function() {
        var hb = [];
        for (var hi = 0; hi < helices.length; hi++) {
          var hx = helices[hi];
          for (var i = hx.start; i + 4 <= hx.end; i++) {
            if (amideHIdx[i+4] >= 0) {
              hb.push({ a: carbonylOIdx[i], b: amideHIdx[i+4], target: 2.0 * A, label: hx.name + ":O" + i + "···H" + (i+4) });
            }
          }
        }
        return hb;
      })(),
      contacts: [
        // Heme pocket: His64 (distal) ↔ His93 (proximal)
        { a: caIndices[63], b: caIndices[92], target: 10.0 * A, label: "H64-H93(heme)" },

        // Inter-helix packing (globin fold core)
        // A-B contact
        { a: caIndices[10], b: caIndices[28], target: 9.0 * A, label: "A-B:L11-I29" },
        // A-E contact
        { a: caIndices[14], b: caIndices[68], target: 10.0 * A, label: "A-E:A15-I69" },
        // A-G contact
        { a: caIndices[10], b: caIndices[110], target: 10.0 * A, label: "A-G:L11-L111" },
        // A-H contact
        { a: caIndices[6], b: caIndices[137], target: 12.0 * A, label: "A-H:W7-F138" },
        // B-E contact
        { a: caIndices[32], b: caIndices[68], target: 9.0 * A, label: "B-E:F33-I69" },
        // B-G contact
        { a: caIndices[28], b: caIndices[104], target: 10.0 * A, label: "B-G:I29-Y103" },
        // E-F contact
        { a: caIndices[72], b: caIndices[90], target: 9.0 * A, label: "E-F:I73-L91" },
        // E-H contact
        { a: caIndices[68], b: caIndices[132], target: 10.0 * A, label: "E-H:I69-A133" },
        // F-G contact
        { a: caIndices[90], b: caIndices[108], target: 9.0 * A, label: "F-G:L91-F109" },
        // G-H contact
        { a: caIndices[110], b: caIndices[140], target: 9.0 * A, label: "G-H:L111-K141" },

        // Turn/loop contacts between consecutive helices
        { a: caIndices[18], b: caIndices[20], target: 6.0 * A, label: "AB-turn" },
        { a: caIndices[42], b: caIndices[51], target: 8.0 * A, label: "CD-loop" },
        { a: caIndices[77], b: caIndices[86], target: 8.0 * A, label: "EF-loop" },
        { a: caIndices[94], b: caIndices[100], target: 7.0 * A, label: "FG-loop" },
        { a: caIndices[118], b: caIndices[124], target: 7.0 * A, label: "GH-loop" },

        // End-to-end
        { a: caIndices[0], b: caIndices[152], target: 15.0 * A, label: "Ca0-Ca152" }
      ],
      hbondStrength: 0.8,
      contactStrength: 1.5
    }
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 15;
  window.USER_GRADP_FORCE = true;
  window.USER_DAMPING = 0.9;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    var recorder = null, chunks = [], recording = false;
    window._toggleRecording = function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      if (!recording) {
        chunks = [];
        var stream = canvas.captureStream(30);  // 30fps playback
        var track = stream.getVideoTracks()[0];
        window._recStreamTrack = track;
        var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9')
          ? 'video/webm; codecs=vp9' : 'video/webm';
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = function() {
          var blob = new Blob(chunks, { type: mimeType });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'myoglobin_fold.webm'; a.click();
          URL.revokeObjectURL(url);
        };
        recorder.start(1000);
        var frameCount = 0;
        var dot = document.createElement('div');
        dot.id = 'rec-indicator';
        dot.style.cssText = 'position:fixed;top:10px;right:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;animation:blink 1s infinite;';
        dot.textContent = '\u25CF REC 0';
        var style = document.createElement('style');
        style.textContent = '@keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0.4 } }';
        document.head.appendChild(style);
        var origDraw = window.draw;
        window._recOrigDraw = origDraw;
        window.draw = function() { if (origDraw) origDraw(); try { track.requestFrame(); frameCount++; } catch(e) {} if (dot) dot.textContent = '\u25CF REC ' + frameCount; };
        recording = true;
        document.body.appendChild(dot);
      } else {
        if (window._recOrigDraw) { window.draw = window._recOrigDraw; window._recOrigDraw = null; }
        recorder.stop(); recording = false;
        window._recStreamTrack = null;
        var ind = document.getElementById('rec-indicator');
        if (ind) ind.remove();
      }
    };
    setTimeout(function() { window._view3D = true; }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
