<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<div id="controls" style="position:fixed;top:10px;left:10px;z-index:100;background:rgba(0,0,0,0.85);padding:12px 16px;border-radius:8px;border:1px solid #333;max-width:380px">
  <div style="font-size:14px;color:#ffb74d;margin-bottom:8px">Solid Ar (FCC) &mdash; Pure-Dispersion Limit, Clean Negative Test</div>
  <input type="range" id="tempSlider" min="0" max="3000" step="50" value="0" style="width:250px">
  <span id="tempLabel" style="margin-left:10px;font-size:16px;color:#4fc3f7">0 K</span>
  <div id="status" style="font-size:11px;color:#888;margin-top:4px">Building Ar FCC lattice&hellip;</div>
  <div style="font-size:11px;color:#aaa;margin-top:6px;line-height:1.5">
    <span id="comReadout">Atom-MSD: 0.000 &Aring;&sup2;</span>
    <button id="resetMSD" style="margin-left:8px;font-size:10px;padding:2px 6px;background:#222;color:#4fc3f7;border:1px solid #444;cursor:pointer">reset MSD</button>
  </div>
  <div style="font-size:11px;color:#aaa;margin-top:6px;line-height:1.5">
    <span id="ccReadout">Ar&ndash;Ar nearest-pair: &mdash; &Aring;</span>
  </div>
</div>
<pre id="log" style="position:fixed;bottom:10px;left:10px;font-size:11px;color:#666;z-index:100;max-width:480px;white-space:pre-wrap"></pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

(function() {
  var qs = new URLSearchParams(window.location.search);
  var ncubes = parseInt(qs.get('ncubes')) || 2;
  var aLatA = parseFloat(qs.get('aLat')) || 5.31;     // experimental Ar FCC lattice constant
  var aLat_au = aLatA * 1.8897;
  var defaultScr = ncubes === 1 ? 22 : Math.max(28, ncubes * aLat_au + 6);
  var defaultGrid = ncubes === 1 ? 150 : 200;
  var gridN = parseInt(qs.get('gridN')) || defaultGrid;
  var scr = parseFloat(qs.get('scr')) || defaultScr;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var Zker = parseInt(qs.get('Z')) || 8;              // valence electrons (3s²3p⁶ = 8)
  var rcAr = parseFloat(qs.get('rc')) || 0.7;         // Ar kernel softening (Ne-like inner core)

  // FCC basis: 4 atoms per conventional cell
  var fccBasis = [[0,0,0],[0.5,0.5,0],[0.5,0,0.5],[0,0.5,0.5]];
  var atomCenters = [];
  if (ncubes === 1) {
    for (var b = 0; b < fccBasis.length; b++) {
      atomCenters.push([
        (fccBasis[b][0] - 0.25) * aLat_au,
        (fccBasis[b][1] - 0.25) * aLat_au,
        (fccBasis[b][2] - 0.25) * aLat_au,
      ]);
    }
  } else {
    var off = (ncubes - 1) / 2;
    for (var nx = 0; nx < ncubes; nx++) for (var ny = 0; ny < ncubes; ny++) for (var nz = 0; nz < ncubes; nz++) {
      for (var bb = 0; bb < fccBasis.length; bb++) {
        atomCenters.push([
          (nx + fccBasis[bb][0] - off - 0.25) * aLat_au,
          (ny + fccBasis[bb][1] - off - 0.25) * aLat_au,
          (nz + fccBasis[bb][2] - off - 0.25) * aLat_au,
        ]);
      }
    }
  }

  // Build atoms — single atom per "molecule" since Ar is monatomic
  // No bond constraints, no inner structure to break
  var atoms = [];
  var zArr = [];
  var rcArr = [];
  for (var m = 0; m < atomCenters.length; m++) {
    var cx = atomCenters[m][0], cy = atomCenters[m][1], cz = atomCenters[m][2];
    atoms.push({i: Math.round(N2 + cx/h), j: Math.round(N2 + cy/h), k: Math.round(N2 + cz/h), Z: Zker, el: 'Ar'});
    zArr.push(Zker); rcArr.push(rcAr);
  }

  // For ncubes>1: freeze outer-shell atoms
  var frozen = [];
  if (ncubes > 1) {
    var freezeR = aLat_au * (ncubes/2 - 0.4);
    for (var m3 = 0; m3 < atomCenters.length; m3++) {
      var d2 = atomCenters[m3][0]*atomCenters[m3][0] + atomCenters[m3][1]*atomCenters[m3][1] + atomCenters[m3][2]*atomCenters[m3][2];
      if (d2 > freezeR*freezeR) frozen.push(m3);
    }
  }

  var nAtoms = atomCenters.length;
  var nFreeAtoms = nAtoms - frozen.length;
  log.textContent  = 'Solid Ar (' + ncubes + '×' + ncubes + '×' + ncubes + ' FCC): ' + nAtoms + ' atoms';
  log.textContent += '\nLattice a = ' + aLatA.toFixed(2) + ' Å (exp 5.31 Å), monatomic';
  log.textContent += '\nArchitecture: each Ar at Z=+' + Zker + ' kernel, rc=' + rcAr.toFixed(2);
  log.textContent += '\nTotal explicit electrons: ' + (nAtoms * Zker);
  log.textContent += '\nFrozen outer shell: ' + frozen.length + ' atoms; free inner: ' + nFreeAtoms;
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr.toFixed(1) + ' au';
  log.textContent += '\n\nPREDICTION (clean negative):';
  log.textContent += '\n  Ar is monatomic, closed-shell, spherical kernel + spherical orbital.';
  log.textContent += '\n  No asymmetric Bernoulli (single-kernel atom — no bond).';
  log.textContent += '\n  No multi-orbital residual quadrupole (single multi-occupancy orbital).';
  log.textContent += '\n  No dispersion in RealQM Level 3.';
  log.textContent += '\n  Cluster expected to fall apart at any T > 0.';
  log.textContent += '\n  This anchors the calibration at the 100%-missing-dispersion endpoint.';

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = zArr;
  window.USER_RC = rcArr;
  window.USER_FROZEN_ATOMS = frozen;
  window.USER_DYNAMICS = true;
  window.USER_N_MOVE = 100;
  window.USER_DT_NUC = 1.0;
  window.USER_NUC_SUBSTEPS = 30;
  window.USER_TEMPERATURE_K = 0;
  window.USER_LANGEVIN_GAMMA = 0.5;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 20.0;
  window.USER_ROT_SPEED = 0.005;
  window.NO_AUTO_DYNAMICS = true;
  window.USER_GRADP_FORCE = true;

  window.__ar_aLat_A = aLatA;
})();

var slider = document.getElementById('tempSlider');
var label = document.getElementById('tempLabel');
var statusEl = document.getElementById('status');

slider.addEventListener('input', function() {
  var T = parseInt(this.value);
  label.textContent = T + ' K';
  window.USER_TEMPERATURE_K = T;
  if (typeof window.langevinKT !== 'undefined') {
    window.langevinKT = T / 315775.0;
  }
  window.USER_THERMAL_KICK = T > 50 ? 0.3 * T / 1000 : 0;
  if (T < 40) label.style.color = '#4fc3f7';
  else if (T < 84) label.style.color = '#ff0';
  else label.style.color = '#ff7043';
  var note = '';
  if (T > 84) note = ' (above Ar melting 84 K)';
  statusEl.textContent = 'T=' + T + ' K' + note;
});

(function(){
  var initPos = null;
  var auToA = 0.529177;

  function getH() { return (window.USER_SCREEN || 28) / (window.USER_NN || 200); }

  function isFreeAtom(a) {
    var fs = window.USER_FROZEN_ATOMS || [];
    for (var i = 0; i < fs.length; i++) if (fs[i] === a) return false;
    return true;
  }

  function snapshotInit() {
    if (typeof nucPos === 'undefined') return;
    initPos = [];
    var nReal = (window.USER_ATOMS || []).length;
    for (var a = 0; a < nReal; a++) {
      if (!nucPos[a]) { initPos.push(null); continue; }
      initPos.push([nucPos[a][0], nucPos[a][1], nucPos[a][2]]);
    }
  }

  document.getElementById('resetMSD').addEventListener('click', function() {
    snapshotInit();
    document.getElementById('comReadout').textContent = 'Atom-MSD: 0.000 Å²  RMSD: 0.000 Å  Lindemann: 0.000  (reset)';
  });

  setInterval(function() {
    if (typeof nucPos === 'undefined') return;
    if (!initPos) snapshotInit();
    if (!initPos) return;
    var hLocal = getH();

    var sumSq = 0, n = 0;
    for (var a = 0; a < initPos.length; a++) {
      if (!initPos[a]) continue;
      if (!isFreeAtom(a)) continue;
      if (!nucPos[a]) continue;
      var dx = (nucPos[a][0] - initPos[a][0]) * hLocal * auToA;
      var dy = (nucPos[a][1] - initPos[a][1]) * hLocal * auToA;
      var dz = (nucPos[a][2] - initPos[a][2]) * hLocal * auToA;
      sumSq += dx*dx + dy*dy + dz*dz;
      n++;
    }
    if (n > 0) {
      var msd = sumSq / n;
      var rmsd = Math.sqrt(msd);
      var aLat = window.__ar_aLat_A;
      var dNN = aLat * 0.7071;
      var lind = rmsd / dNN;
      var color = lind < 0.08 ? '#4fc3f7' : (lind < 0.15 ? '#ff0' : '#ff7043');
      document.getElementById('comReadout').innerHTML =
        'Atom-MSD: ' + msd.toFixed(3) + ' Å²' +
        ' &nbsp; RMSD: ' + rmsd.toFixed(3) + ' Å' +
        ' &nbsp; Lindemann: <span style="color:' + color + '">' + lind.toFixed(3) + '</span>' +
        ' &nbsp; (d_NN=' + dNN.toFixed(2) + ' Å, n=' + n + ')';
    }

    var minD = Infinity;
    for (var a1 = 0; a1 < initPos.length; a1++) {
      if (!isFreeAtom(a1) || !nucPos[a1]) continue;
      for (var a2 = a1+1; a2 < initPos.length; a2++) {
        if (!isFreeAtom(a2) || !nucPos[a2]) continue;
        var dx2 = (nucPos[a1][0]-nucPos[a2][0]) * hLocal * auToA;
        var dy2 = (nucPos[a1][1]-nucPos[a2][1]) * hLocal * auToA;
        var dz2 = (nucPos[a1][2]-nucPos[a2][2]) * hLocal * auToA;
        var d = Math.sqrt(dx2*dx2 + dy2*dy2 + dz2*dz2);
        if (d < minD) minD = d;
      }
    }
    if (isFinite(minD)) {
      var expected = window.__ar_aLat_A * 0.707;
      document.getElementById('ccReadout').textContent =
        'Ar–Ar nearest-pair: ' + minD.toFixed(2) + ' Å  (FCC nn ≈ ' + expected.toFixed(2) + ' Å)';
    }
  }, 1500);
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { log.textContent += '\nFailed to load molecule.js!'; };
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
