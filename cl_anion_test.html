<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>Cl⁻ anion test — mol_fast.js with target=2</title>
  <style>body { margin: 0; background: #000; }</style>
</head><body>
<div id="loadStatus" style="color:#ff0;font-family:monospace;padding:20px;font-size:14px">Loading…</div>
<script>
  window.onerror = function(msg, url, line, col, err) {
    var pre = document.createElement('pre');
    pre.style.cssText = 'color:#f66;background:#200;padding:12px;font-size:13px;white-space:pre-wrap';
    pre.textContent = 'ERROR: ' + msg + '\n  at ' + url + ':' + line + ':' + col;
    document.body.insertBefore(pre, document.body.firstChild);
  };
  (function() {
    var N = 150;
    var scr = 14;
    var N2 = Math.round(N / 2);

    // Cl- anion model: Z=1 kernel (reduced from real Z=17) + 1 orbital with target=2.
    // This represents 2 "valence-like" electrons on Cl, net charge = Z - target = 1 - 2 = -1.
    // rc=0.5 keeps electrons outside a small core region.
    window.USER_NN = N;
    window.USER_SCREEN = scr;
    window.USER_STEPS = 50000;
    window.USER_SHELL_MODE = true;
    window.USER_NUCLEI = [
      { i: N2, j: N2, k: N2, Z: 1, rc: 0.5, z_init: 1.5, split: 'sphere' }
    ];
    window.USER_NORM_TARGETS = [2];  // target = 2 electrons on this one orbital
    window.USER_DYNAMICS = false;
    console.log('Cl- anion test: Z=1 kernel, target=2 electrons (net -1). Watch if bound.');
  })();

  var status = document.getElementById('loadStatus');
  var s = document.createElement('script');
  s.src = 'mol_fast.js?t=' + Date.now();
  s.onload = function() {
    status.textContent += '\nmol_fast.js loaded';
    var p = document.createElement('script');
    p.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
    p.onload = function() { status.remove(); };
    document.body.appendChild(p);
  };
  document.body.appendChild(s);
</script>
</body></html>
