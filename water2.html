<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Two water molecules — do they form an H-bond?
// H2O ... H2O on 100^3
(function() {
  var gridN = 200, scr = 20, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897;
  var atoms = [];

  function addAtom(x, y, z, Z, el) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
  }

  // Water 1 (donor): O1 with H1a pointing right toward O2
  var sep = 3.0 * A;  // O-O separation
  var bOH = 0.96 * A;
  var ang = 104.5 * Math.PI / 180;
  addAtom(-sep/2, 0, 0, 2, 'O');                                    // 0: O1
  addAtom(-sep/2 + bOH, 0, 0, 1, 'H');                             // 1: H1a (along axis → O2)
  addAtom(-sep/2 - bOH*Math.cos(ang), bOH*Math.sin(ang), 0, 1, 'H'); // 2: H1b (angled away)

  // Water 2 (acceptor): O2 with both H pointing away
  addAtom(sep/2, 0, 0, 2, 'O');                                    // 3: O2
  addAtom(sep/2 + bOH*Math.sin(ang/2), bOH*Math.cos(ang/2), 0, 1, 'H');  // 4: H2a
  addAtom(sep/2 + bOH*Math.sin(ang/2), -bOH*Math.cos(ang/2), 0, 1, 'H'); // 5: H2b

  console.log('2 water molecules, O-O separation: ' + (sep*0.529177).toFixed(2) + ' Å');

  window.USER_BOND_PAIRS = [
    [0, 3, "O1-O2:"],
    [1, 3, "H1a-O2:"],   // H-bond
    [5, 0, "H2b-O1:"],   // H-bond
    [0, 1, "O1-H1a:"],   // intramolecular
  ];

  window.USER_REFERENCE = {
    bonds: {
      "O1-O2": "2.8 (H-bonded dimer)",
      "H1a-O2": "1.9 (H-bond)",
      "O1-H1a": "0.96 (covalent)"
    },
    energy: "Water dimer binding: ~5 kcal/mol",
    binding: "Do the two waters form an O-H···O hydrogen bond?"
  };

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;  // converge first, press D
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'O') return 0.8;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();  // has bond distance display
s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load</pre>'; };
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
