<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// RealNucleus: He-4 (alpha) = 4 protons + 2 electrons, as nested "2+2" (doubling the deuteron).
// Central -2 electron core, then the four protons as TWO CONCENTRIC shells of two:
//   inner proton shell = 2 protons (mid zone)  +  outer proton shell = 2 protons (outer zone).
// The two inner protons sit on +-x, the two outer on +-y (rotated 90 deg). 3-zone radial split.
// Frozen, proton subdivision locked. Solver: molecule_nucleus.js. Scale 9.5 <-> 2.22 MeV.
(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var rIn = 0.65, rOut = 1.2;          // seed radii of inner / outer proton shells (au)
  var atoms = [];

  atoms.push({ i: N2, j: N2, k: N2, Z: 2, el: 'e' });                              // 0: -2 electron core

  // inner proton shell: 2 protons on +-x  (mid zone)
  atoms.push({ i: Math.round(N2 + rIn/h), j: N2, k: N2, Z: 1, el: 'P' });          // 1
  atoms.push({ i: Math.round(N2 - rIn/h), j: N2, k: N2, Z: 1, el: 'P' });          // 2
  // outer proton shell: 2 protons on +-y  (outer zone, rotated 90 deg)
  atoms.push({ i: N2, j: Math.round(N2 + rOut/h), k: N2, Z: 1, el: 'P' });         // 3
  atoms.push({ i: N2, j: Math.round(N2 - rOut/h), k: N2, Z: 1, el: 'P' });         // 4

  console.log('RealNucleus He-4 (nested 2+2): -2 core + inner proton pair + outer proton pair');

  window.USER_BOND_PAIRS = [ [1,2,"inP-P:"], [3,4,"outP-P:"], [1,3,"in-out:"] ];
  window.USER_REFERENCE = { energy: "He-4 nested 2+2: -2 core + inner/outer proton pairs; exp binding 28.3 MeV (~9.5*12.7)" };

  window.USER_NUCLEUS_MODE = true;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [2, 1, 1, 1, 1];
  window.USER_Z_NUC = [0, 0, 0, 0, 0];
  window.USER_RC = [0, 0, 0, 0, 0];
  window.USER_MASS = [1, 1, 1, 1, 1];  // equal masses: protons are charge CLOUDS, like electrons
  window.USER_CHARGE = [-2, 1, 1, 1, 1];
  // 3-zone nested shell: r<0.45 -> -2 core, 0.45<=r<0.9 -> inner protons, r>=0.9 -> outer protons
  window.USER_SHELL_RADIUS = 0.45;     // core / inner boundary
  window.USER_SHELL_RADIUS2 = 0.9;     // inner / outer boundary
  window.USER_SHELL_INNER = [0];       // -2 electron core
  window.USER_SHELL_MID = [1, 2];      // inner proton pair
  window.USER_SHELL_OUTER = [3, 4];    // outer proton pair
  window.USER_CURV_REG = 0.5;
  window.USER_DIRICHLET_EP = 'electron';
  window.USER_LOCKED_GROUPS = [[1,2],[1,3],[1,4],[2,3],[2,4],[3,4]];  // hold proton subdivision
  window.INIT_ZEFF = 1;
})();

var s = document.createElement('script');
s.src = 'molecule_nucleus.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
