<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Preprint draft</title>
<style>
body { max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: Georgia, serif; line-height: 1.7; color: #222; }
h1 { font-size: 1.8em; }
h2 { font-size: 1.4em; border-bottom: 1px solid #ccc; padding-bottom: 6px; margin-top: 2em; }
h3 { font-size: 1.15em; }
table { border-collapse: collapse; margin: 1em 0; }
td, th { border: 1px solid #999; padding: 6px 12px; }
th { background: #f0f0f0; }
code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; }
hr { margin: 2em 0; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div id="content">Loading…</div>
<script>
fetch('preprint_draft.md').then(r => r.text()).then(md => {
  document.getElementById('content').innerHTML = marked.parse(md);
});
</script>
</body></html>
