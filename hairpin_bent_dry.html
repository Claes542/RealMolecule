<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Beta hairpin 12-residue polyglycine — U-shaped, NO water
(function() {
  var gridN = 200, scr = 80, N2 = 100;
  var h = scr / gridN;
  var A = 1.8897; // angstrom to au
  var atoms = [];

  function addAtom(au_x, au_y, Z, el) {
    atoms.push({
      i: Math.round(N2 + au_x / h),
      j: Math.round(N2 + au_y / h),
      Z: Z, el: el, x: au_x, y: au_y
    });
  }

  var nRes = 12;
  var resAdv = 3.4 * A;   // ~6.4 au per residue
  var zig = 0.5 * A;

  var openingAngle = 150 * Math.PI / 180; // same starting angle as solvated

  var bb = [];
  var hingeIdx = 5.5;
  var turnWidth = 2.5;

  var angle1 = Math.PI / 2 + openingAngle / 2;
  var angle2 = Math.PI / 2 - openingAngle / 2;
  var startAngle = -(Math.PI - angle1);
  var endAngle = angle2;

  var angles = [];
  for (var r = 0; r < nRes; r++) {
    var blend = 0.5 * (1 + Math.tanh((r - hingeIdx) / turnWidth));
    angles.push(startAngle * (1 - blend) + endAngle * blend);
  }

  var positions = [{x: 0, y: 0}];
  for (var r = 1; r < nRes; r++) {
    var avgAngle = (angles[r - 1] + angles[r]) / 2;
    positions.push({
      x: positions[r - 1].x + resAdv * Math.cos(avgAngle),
      y: positions[r - 1].y + resAdv * Math.sin(avgAngle)
    });
  }

  var sumX = 0, sumY = 0;
  for (var r = 0; r < nRes; r++) { sumX += positions[r].x; sumY += positions[r].y; }
  var cenX = sumX / nRes, cenY = sumY / nRes;

  for (var r = 0; r < nRes; r++) {
    var cx = positions[r].x - cenX;
    var cy = positions[r].y - cenY;
    var tlx = Math.cos(angles[r]);
    var tly = Math.sin(angles[r]);
    var nx = -tly;
    var ny = tlx;
    var zigSign = (r % 2 === 0) ? 1 : -1;

    bb.push({
      N:  [cx - 0.35 * resAdv * tlx + zigSign * zig * 0.6 * nx,
           cy - 0.35 * resAdv * tly + zigSign * zig * 0.6 * ny],
      Ca: [cx,
           cy - zigSign * zig * 0.4 * ny],
      C:  [cx + 0.35 * resAdv * tlx + zigSign * zig * 0.3 * nx,
           cy + 0.35 * resAdv * tly + zigSign * zig * 0.3 * ny]
    });
  }

  for (var r = 0; r < nRes; r++) {
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var nca_x = Cap[0] - Np[0], nca_y = Cap[1] - Np[1];
    var nca_l = Math.sqrt(nca_x * nca_x + nca_y * nca_y);
    var nca_px = -nca_y / nca_l, nca_py = nca_x / nca_l;
    var cac_x = Cp[0] - Cap[0], cac_y = Cp[1] - Cap[1];
    var cac_l = Math.sqrt(cac_x * cac_x + cac_y * cac_y);
    var cac_px = -cac_y / cac_l, cac_py = cac_x / cac_l;

    addAtom(Np[0], Np[1], 3, 'N');
    var nhSide = (r < 6) ? -1 : 1;
    addAtom(Np[0] + nhSide * nca_px * 1.01 * A, Np[1] + nhSide * nca_py * 1.01 * A, 1, 'H');
    if (r === 0) {
      addAtom(Np[0] - nhSide * nca_px * 1.01 * A, Np[1] - nhSide * nca_py * 1.01 * A, 1, 'H');
    }
    addAtom(Cap[0], Cap[1], 4, 'C');
    addAtom(Cap[0] + cac_px * 1.09 * A, Cap[1] + cac_py * 1.09 * A, 1, 'H');
    addAtom(Cap[0] - cac_px * 1.09 * A, Cap[1] - cac_py * 1.09 * A, 1, 'H');
    addAtom(Cp[0], Cp[1], 4, 'C');
    var oSide = (r < 6) ? ((r % 2 === 0) ? 1 : -1) : ((r % 2 === 0) ? -1 : 1);
    addAtom(Cp[0] + oSide * cac_px * 1.24 * A, Cp[1] + oSide * cac_py * 1.24 * A, 2, 'O');
  }

  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc_x = lastC[0] - lastCa[0], lc_y = lastC[1] - lastCa[1];
  var lc_l = Math.sqrt(lc_x * lc_x + lc_y * lc_y);
  var oh_x = lastC[0] + lc_x / lc_l * 1.34 * A;
  var oh_y = lastC[1] + lc_y / lc_l * 1.34 * A;
  addAtom(oh_x, oh_y, 2, 'O');
  addAtom(oh_x + lc_x / lc_l * 0.97 * A, oh_y + lc_y / lc_l * 0.97 * A, 1, 'H');

  console.log('Bent dry hairpin: ' + atoms.length + ' atoms (no water)');

  window.USER_FOLD_ATOMS = [0, 45, 83];

  // Ca indices and residue groups for rigid-strand pivot
  var caIndices = [3];
  for (var r = 1; r < 12; r++) caIndices.push(7*r + 3);

  var mdGroups = [];
  mdGroups.push([0,1,2,3,4,5,6,7]);
  for (var r = 1; r < 12; r++) {
    var g = [];
    for (var a = 7*r+1; a <= 7*r+7; a++) g.push(a);
    mdGroups.push(g);
  }
  mdGroups.push([85, 86]);

  // Rigid-strand pivot dynamics — match solvated parameters exactly
  window.USER_CLASSICAL_MD = {
    hingeRes: 6,
    caIndices: caIndices,
    groups: mdGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01
  };

  window.USER_VIEW_YROT = 0;
  window.USER_VIEW_TILT = 0.3;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 50.0;   // match solvated
  window.USER_N_MOVE = 15;          // match solvated
  window.USER_ARROW_SCALE = 0.2;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    // Video recording: press R to start/stop, auto-downloads webm
    var recorder = null, chunks = [], recording = false;
    window._toggleRecording = function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      if (!recording) {
        chunks = [];
        var stream = canvas.captureStream(30);  // 30fps playback
        var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9')
          ? 'video/webm; codecs=vp9'
          : MediaRecorder.isTypeSupported('video/webm; codecs=vp8')
          ? 'video/webm; codecs=vp8'
          : MediaRecorder.isTypeSupported('video/webm')
          ? 'video/webm'
          : 'video/mp4';
        console.log('Recording with: ' + mimeType);
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = function() {
          var blob = new Blob(chunks, { type: mimeType });
          var ext = mimeType.indexOf('mp4') >= 0 ? 'mp4' : 'webm';
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'hairpin_bent_dry.' + ext; a.click();
          URL.revokeObjectURL(url);
          console.log('Recording saved: hairpin_bent_dry.webm');
        };
        window._recStreamTrack = stream.getVideoTracks()[0];
        recorder.start();
        recording = true;
        var dot = document.createElement('div');
        dot.id = 'rec-indicator';
        dot.style.cssText = 'position:fixed;top:10px;right:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;';
        dot.textContent = '\u25CF REC';
        document.body.appendChild(dot);
        console.log('Recording started (press R to stop)');
      } else {
        recorder.stop();
        recording = false;
        window._recStreamTrack = null;
        var ind = document.getElementById('rec-indicator');
        if (ind) ind.remove();
        console.log('Recording stopped, saving...');
      }
    };
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
