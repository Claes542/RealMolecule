<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>H2 — bond 1.4 au</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; flex-direction: column; }
    canvas { border: none; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line) {
      document.body.style.color = 'red';
      document.body.innerHTML = '<pre>ERROR: ' + msg + '\nLine: ' + line + '\nFile: ' + url + '</pre>';
    };

    (function() {
      var N = 200, scr = 10;
      var hg = scr / N;
      var bond = 1.4;  // au — equilibrium
      var halfCells = Math.round(0.5 * bond / hg);
      var ci = Math.round(5.0 / hg);
      var cj = Math.round(5.0 / hg);

      window.USER_NN = N;
      window.USER_ATOMS = [
        { i: ci - halfCells, j: cj, Z: 1, el: 'H' },
        { i: ci + halfCells, j: cj, Z: 1, el: 'H' }
      ];
      window.USER_SCREEN = scr;
      window.USER_STEPS = 20000;
      window.USER_Z = [1, 1];
      window.USER_RC = [0.1, 0.1];
      window.CONVERGENCE_THRESHOLD = 0.001;
      console.log('H2: bond=' + bond + ' au, halfCells=' + halfCells + ', grid ' + N + '^3');
    })();

    var s = document.createElement('script');
    s.src = 'molecule.js?t=' + Date.now();
    s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load molecule.js</pre>'; };
    s.onload = function() {
      var p5s = document.createElement('script');
      p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
      document.body.appendChild(p5s);
    };
    document.body.appendChild(s);
  </script>
</body>
</html>
