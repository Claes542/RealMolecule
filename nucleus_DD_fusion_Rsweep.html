<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<div id="results" style="position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.92);border:1px solid #444;padding:12px;z-index:100;font-size:13px;min-width:430px"></div>
<script>
// ===========================================================================
//  RealNucleus  D + D  ->  He-4   FUSION  E(R) SWEEP  (real field solve)
// ---------------------------------------------------------------------------
//  Two deuterons (each 2 protons + 1 electron, net charge +1) are clamped with
//  their CENTERS at separation R along x, and the charge clouds are relaxed to
//  convergence at each R (USER_DYNAMICS = false: nuclei frozen, fields + free
//  boundaries relax -- a Born-Oppenheimer E(R) curve). Sweeping R from far
//  apart down to a merged 4p+2e cluster traces:
//     * large R : E -> 2 E_D   (two free deuterons, +1/R Coulomb repulsion)
//     * the Coulomb BARRIER as the two net-+1 clusters are pushed together
//     * the deep WELL at merge, the dual-confined alpha  (E_He4 < 2 E_D)
//  The drop 2 E_D - E_He4 is the fusion energy released.
//
//  Uses the SAME solver interface as nucleus_he4_Rsweep.html.
//  NOTE: needs a WebGPU browser (Chrome). Each R reloads the page; the sweep
//  resumes via sessionStorage. Watch the console + the panel.
//
//  Geometry (au), deuteron half-spacing dp; A protons along y, B protons along
//  z so that at R=0 the four protons form a non-degenerate square (planar 4p).
// ===========================================================================
var Rlist = [3.0, 2.5, 2.0, 1.6, 1.2, 0.9, 0.6, 0.3, 0.0];   // far -> merged
var dp   = 0.45;          // intra-deuteron proton half-spacing (au)
var E_D_REF = -9.5;       // single-deuteron energy at THIS grid (scr=10,N=200);
                          // recalibrate by running nucleus_deuterium at same grid.

var gridN = 200, scr = 10, N2 = 100, h = scr / gridN;

var idx = 0, results = {};
(function(){ var s = sessionStorage.getItem('ddR');
  if (s) { var st = JSON.parse(s); idx = st.idx; results = st.results; sessionStorage.removeItem('ddR'); } })();

function ix(x){ return Math.round(N2 + x / h); }

if (idx < Rlist.length) {
  var R = Rlist[idx];
  var cAx = -R/2, cBx = R/2;
  var atoms = [];
  // Deuteron A: 2 protons along +/- y about (cAx,0,0)
  atoms.push({ i: ix(cAx), j: ix( dp), k: ix(0), Z: 1, el: 'P' });   // 0
  atoms.push({ i: ix(cAx), j: ix(-dp), k: ix(0), Z: 1, el: 'P' });   // 1
  // Deuteron B: 2 protons along +/- z about (cBx,0,0)
  atoms.push({ i: ix(cBx), j: ix(0), k: ix( dp), Z: 1, el: 'P' });   // 2
  atoms.push({ i: ix(cBx), j: ix(0), k: ix(-dp), Z: 1, el: 'P' });   // 3
  // One electron at each deuteron center
  atoms.push({ i: ix(cAx), j: ix(0), k: ix(0), Z: 1, el: 'e' });     // 4
  atoms.push({ i: ix(cBx), j: ix(0), k: ix(0), Z: 1, el: 'e' });     // 5

  window.USER_NUCLEUS_MODE = true;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 80000;
  window.USER_DYNAMICS = false;                 // frozen nuclei -> Born-Oppenheimer E(R)
  window.USER_Z = [1, 1, 1, 1, 1, 1];
  window.USER_Z_NUC = [0, 0, 0, 0, 0, 0];
  window.USER_RC = [0, 0, 0, 0, 0, 0];
  window.USER_MASS = [1836, 1836, 1836, 1836, 1, 1];   // protons heavy, electrons light
  window.USER_CHARGE = [1, 1, 1, 1, -1, -1];           // signed-charge Poisson
  window.USER_SHELL_RADIUS = 0.5;
  window.USER_SHELL_INNER = [4, 5];                    // electron domains seed inner
  window.USER_SHELL_OUTER = [0, 1, 2, 3];              // proton domains seed outer
  window.USER_CURV_REG = 0.5;
  window.USER_DIRICHLET_EP = 'electron';
  window.INIT_ZEFF = 1;
  window.CONVERGENCE_THRESHOLD = 0.01;                 // adaptive stop -> onSweepDone(E)
  console.log('D+D fusion sweep: R=' + R + '  (' + (idx+1) + '/' + Rlist.length + ')');
}

function render() {
  var div = document.getElementById('results');
  var twoED = 2 * E_D_REF;
  var html = '<b style="color:#0cf">D+D &rarr; He-4 fusion: E vs cluster separation R</b><br>'
           + '<span style="color:#888;font-size:11px">E_D=' + E_D_REF.toFixed(2)
           + ' &rarr; 2E_D=' + twoED.toFixed(2) + ' (free pair ref). Frozen-nuclei E(R).</span><br><br>'
           + '<table><tr style="color:#0cf"><th style="padding:2px 10px">R (au)</th><th>E (model)</th>'
           + '<th>E&minus;2E_D</th></tr>';
  var minE = Infinity, minR = null, maxRel = -Infinity, barR = null;
  for (var i = 0; i < Rlist.length; i++) {
    var R = Rlist[i], e = results[R], cur = (Rlist[idx] === R);
    var rel = (e !== undefined) ? e - twoED : undefined;
    if (e !== undefined && e < minE) { minE = e; minR = R; }
    if (rel !== undefined && R > 0 && rel > maxRel) { maxRel = rel; barR = R; }   // barrier = highest E above 2E_D
    var cls = cur && e === undefined ? ' style="color:#ff0"' : (e === undefined ? ' style="color:#555"' : '');
    html += '<tr' + cls + '><td style="padding:2px 10px">' + R.toFixed(2) + '</td><td>'
         + (e !== undefined ? e.toFixed(2) : (cur ? 'running…' : '—')) + '</td><td>'
         + (rel !== undefined ? (rel >= 0 ? '+' : '') + rel.toFixed(2) : '') + '</td></tr>';
  }
  html += '</table>';
  if (minR !== null) {
    html += '<br>merged min: <b style="color:#0f0">E=' + minE.toFixed(2) + '</b> at R=' + minR.toFixed(2)
          + '<br>&Delta;E<sub>fusion</sub> released (2E_D &minus; E_min): <b style="color:#0f0">'
          + (twoED - minE).toFixed(2) + '</b> model units';
    if (barR !== null && maxRel > 0)
      html += '<br>Coulomb barrier: <b style="color:#fb0">+' + maxRel.toFixed(2)
            + '</b> above 2E_D, at R=' + barR.toFixed(2);
  }
  if (idx >= Rlist.length) html += '<br><span style="color:#0f0">Done — sweep complete (see console).</span>';
  div.innerHTML = html;
}
render();

window.onSweepDone = function (E) {
  results[Rlist[idx]] = E;
  console.log('R=' + Rlist[idx] + '  E=' + E.toFixed(4));
  render();
  idx++;
  if (idx < Rlist.length) {
    sessionStorage.setItem('ddR', JSON.stringify({ idx: idx, results: results }));
    setTimeout(function () { location.reload(); }, 700);
  } else {
    console.log('=== D+D fusion sweep done ===', JSON.stringify(results));
  }
};

var s = document.createElement('script');
s.src = 'molecule_nucleus.js?t=' + Date.now();
s.onload = function () {
  var p = document.createElement('script');
  p.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p);
};
document.body.appendChild(s);
</script>
</body></html>
