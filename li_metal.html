<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building Li metal lattice...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Li metal: BCC lattice, 100 atoms, 1 valence electron each
// Li lattice constant: 3.51 Å = 6.63 au
// BCC: 2 atoms per unit cell (corner + center)
// 5x5x4 unit cells = 100 atoms (50 corners + 50 centers... actually need to count)
// Simpler: 5x5x4 = 100 atoms in simple cubic, then let it relax
(function() {
  var gridN = 150, scr = 40;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;

  // Li lattice spacing: 3.51 Å in BCC, nearest neighbor = 3.04 Å
  var aLat = 2.0 * A;  // compressed lattice — tighter packing

  var atoms = [];
  // Simple cubic 5x5x4 = 100 atoms
  var nx = 5, ny = 5, nz = 4;
  var x0 = -(nx - 1) * aLat / 2;
  var y0 = -(ny - 1) * aLat / 2;
  var z0 = -(nz - 1) * aLat / 2;

  // All atoms kicked 10% randomly — does lattice restore?
  var seed = 42;
  function rand() { seed = (seed * 16807 + 7) % 2147483647; return seed / 2147483647; }
  var kickDist = 0.1 * aLat;

  for (var iz = 0; iz < nz; iz++) {
    for (var iy = 0; iy < ny; iy++) {
      for (var ix = 0; ix < nx; ix++) {
        // Only kick inner atoms (not on boundary)
        var inner = (ix > 0 && ix < nx-1 && iy > 0 && iy < ny-1 && iz > 0 && iz < nz-1);
        var x = x0 + ix * aLat + (inner ? (rand() - 0.5) * kickDist : 0);
        var y = y0 + iy * aLat + (inner ? (rand() - 0.5) * kickDist : 0);
        var z = z0 + iz * aLat + (inner ? (rand() - 0.5) * kickDist : 0);
        var gi = Math.round(N2 + x / h);
        var gj = Math.round(N2 + y / h);
        var gk = Math.round(N2 + z / h);
        gi = Math.max(3, Math.min(gridN - 3, gi));
        gj = Math.max(3, Math.min(gridN - 3, gj));
        gk = Math.max(3, Math.min(gridN - 3, gk));
        atoms.push({ i: gi, j: gj, k: gk, Z: 1, el: 'Li' });
      }
    }
  }

  log.textContent = 'Li metal PERTURBED: ' + atoms.length + ' atoms (' + nx + 'x' + ny + 'x' + nz + ')';
  log.textContent += '\nNearest-neighbor: ' + (aLat * 0.529177).toFixed(2) + ' Å (' + aLat.toFixed(1) + ' au)';
  log.textContent += '\nAll atoms kicked 10% randomly — watch lattice restore';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr + ' au';

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = atoms.map(function() { return 1; });
  window.USER_RC = atoms.map(function() { return 0.5; });  // Li core: sharper potential
  // Fix outer atoms — only inner atoms move
  var fixed = {};
  var idx = 0;
  for (var iz2 = 0; iz2 < nz; iz2++) {
    for (var iy2 = 0; iy2 < ny; iy2++) {
      for (var ix2 = 0; ix2 < nx; ix2++) {
        if (ix2 === 0 || ix2 === nx-1 || iy2 === 0 || iy2 === ny-1 || iz2 === 0 || iz2 === nz-1) {
          fixed[idx] = true;
        }
        idx++;
      }
    }
  }
  window.USER_FIXED_ATOMS = fixed;
  window.USER_DYNAMICS = true;
  window.USER_DAMPING = 0.95;  // light damping to settle
  window.USER_N_MOVE = 100;    // enough ITP steps for good forces
  window.USER_NO_RESTART = true;  // keep converged density, don't restart after moves
})();

var s = document.createElement('script');
s.src = 'molecule_old.js?t=' + Date.now();
s.onerror = function() { log.textContent += '\nFailed to load molecule.js!'; };
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    setTimeout(function() { window._view3D = true; }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
