<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Molecule Builder — Quantum Simulation</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; flex-direction: column; }
    canvas { border: none; }
    #config { color: #fff; font-family: monospace; font-size: 14px; text-align: center; }
    .atom-btn { padding: 8px 16px; margin: 4px; font-size: 16px; cursor: pointer; border: 2px solid #555; background: #222; color: #fff; border-radius: 4px; }
    .atom-btn.selected { border-color: #0f0; background: #040; }
    .atom-btn:hover { background: #333; }
    #placement { border: 1px solid #555; cursor: crosshair; display: block; margin: 8px auto; }
    #info { color: #aaa; margin: 4px; }
    #atomList { color: #ff0; min-height: 20px; }
    .action-btn { background: #060; color: #fff; border: 2px solid #0a0; padding: 12px 36px; font-size: 20px; font-weight: bold; cursor: pointer; margin: 8px; border-radius: 6px; }
    .action-btn:hover { background: #080; border-color: #0f0; }
    .action-btn:disabled { background: #222; color: #555; border-color: #333; cursor: default; }
    .cfg-input { width: 50px; background: #222; color: #fff; border: 1px solid #555; padding: 4px; font-size: 14px; }
    #stepsInput { width: 60px; }
    select.cfg-input { width: auto; }
  </style>
</head>
<body>
  <div id="config">
    <div style="margin-bottom:12px;padding:12px;border:1px solid #333;border-radius:6px;max-width:420px;text-align:left">
      <div style="display:flex;align-items:center;gap:16px">
        <canvas id="atomDiagram" width="100" height="100" style="flex-shrink:0"></canvas>
        <div style="font-size:12px;line-height:1.5">
          <b style="color:#4fc3f7">Hydrogen atom</b><br>
          <span style="color:#f44">+1 proton</span> (nucleus/kernel)<br>
          <span style="color:#48f">&minus;1 electron</span> (cloud/orbital)<br>
          Heavier atoms: Z protons + Z electrons
        </div>
      </div>
    </div>
    <p id="header">Select particle or atom, then click to place:</p>
    <div>
      <button class="atom-btn" data-z="1" data-el="p+" style="border-color:#f44;color:#f88">proton +1</button>
      <button class="atom-btn" data-z="1" data-el="e-" style="border-color:#48f;color:#8af">electron &minus;1</button>
      <span style="color:#555;margin:0 8px">|</span>
      <button class="atom-btn" data-z="1" data-el="H">H (1p + 1e)</button>
      <button class="atom-btn" data-z="2" data-el="He">He (2p + 2e)</button>
      <button class="atom-btn" data-z="2" data-el="O">O (2p + 2e)</button>
      <button class="atom-btn" data-z="3" data-el="N">N (3p + 3e)</button>
      <button class="atom-btn" data-z="4" data-el="C">C (4p + 4e)</button>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;justify-content:center">
      <canvas id="placement" width="400" height="400"></canvas>
      <div style="display:flex;flex-direction:column;gap:8px;min-width:140px">
        <button class="action-btn" id="launch" disabled>Launch</button>
        <button class="action-btn" id="clearBtn" style="background:#600;border-color:#a00">Clear</button>
        <div id="info" style="font-size:11px">Right-click to remove last atom</div>
        <div style="font-size:12px">
          Grid:
          <select id="gridSelect" class="cfg-input">
            <option value="100" data-max="10" data-screen="10" selected>100&sup3; (fast)</option>
            <option value="200" data-max="10" data-screen="10">200&sup3;</option>
            <option value="300" data-max="10" data-screen="10">300&sup3;</option>
          </select><br>
          Screen: <input id="screenInput" class="cfg-input" type="number" value="10" min="2" max="40" step="1"> au<br>
          Steps: <input id="stepsInput" class="cfg-input" type="number" value="100000" min="1000" max="1000000" step="1000">
        </div>
        <div id="atomList" style="font-size:11px">No atoms placed</div>
      </div>
    </div>
  </div>
  <script>
    window.onerror = function(msg, url, line) {
      document.body.style.color = 'red';
      document.body.innerHTML = '<pre>ERROR: ' + msg + '\nLine: ' + line + '\nFile: ' + url + '</pre>';
    };

    var selectedEl = null;
    var placedAtoms = [];
    var GRID_N = 100;
    var MAX_PLACE = 10;
    var cvs = document.getElementById('placement');
    var ctx = cvs.getContext('2d');
    var zColors = {'-1': '#48f', 1: '#fff', 2: '#f44', 3: '#48f', 4: '#4f4'};
    var elColors = {'p+': '#f44', 'e-': '#48f', 'H': '#fff', 'He': '#ff0', 'O': '#f44', 'N': '#48f', 'C': '#4f4'};

    function rcForEl(el, z) {
      if (el === 'H' || el === 'p+' || el === 'e-') return 0;
      if (el === 'He') return 0;
      if (el === 'O') return 0.4;
      if (el === 'N') return 0.3;
      if (el === 'C') return 0.3;
      if (z <= 1) return 0;
      return 0.3;
    }

    function updateHeader() {
      document.getElementById('header').textContent =
        GRID_N + '^3 grid — place up to ' + MAX_PLACE + ' atoms:';
    }

    // Grid selector changes max atoms and default screen
    document.getElementById('gridSelect').addEventListener('change', function() {
      var opt = this.options[this.selectedIndex];
      GRID_N = parseInt(this.value);
      MAX_PLACE = parseInt(opt.dataset.max);
      document.getElementById('screenInput').value = opt.dataset.screen;
      // Trim atoms if over new limit
      while (placedAtoms.length > MAX_PLACE) placedAtoms.pop();
      updateHeader();
      drawPlacement();
      updateList();
    });

    function drawPlacement() {
      var screenAu = parseFloat(document.getElementById('screenInput').value) || 10;
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, 400, 400);
      ctx.strokeStyle = '#222';
      var pxPerAu = 400 / screenAu;
      for (var a = 0; a <= screenAu; a++) {
        var p = Math.round(a * pxPerAu);
        ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, 400); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(400, p); ctx.stroke();
      }
      ctx.strokeStyle = '#555';
      ctx.strokeRect(0, 0, 400, 400);
      for (var i = 0; i < placedAtoms.length; i++) {
        var at = placedAtoms[i];
        if (at.el === 'p+') {
          // Proton: small red dot with + label
          ctx.fillStyle = '#f44';
          ctx.beginPath();
          ctx.arc(at.px, at.py, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 12px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('+1', at.px, at.py + 20);
        } else if (at.el === 'e-') {
          // Electron: blue cloud
          for (var r = 25; r > 0; r--) {
            var alpha = 0.12 * Math.exp(-r / 10);
            ctx.fillStyle = 'rgba(80,130,255,' + alpha + ')';
            ctx.beginPath();
            ctx.arc(at.px, at.py, r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = '#8af';
          ctx.font = 'bold 12px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('\u22121', at.px, at.py + 30);
        } else {
          // Atom: solid dot with element label
          ctx.fillStyle = elColors[at.el] || '#888';
          ctx.beginPath();
          ctx.arc(at.px, at.py, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 14px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(at.el, at.px, at.py - 14);
          ctx.font = '10px monospace';
          ctx.fillStyle = '#f88';
          ctx.fillText('+' + at.Z, at.px - 8, at.py + 4);
          ctx.fillStyle = '#88f';
          ctx.fillText('\u2212' + at.Z, at.px + 10, at.py + 4);
        }
      }
      if (placedAtoms.length >= 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        for (var a = 0; a < placedAtoms.length; a++) {
          for (var b = a + 1; b < placedAtoms.length; b++) {
            ctx.beginPath();
            ctx.moveTo(placedAtoms[a].px, placedAtoms[a].py);
            ctx.lineTo(placedAtoms[b].px, placedAtoms[b].py);
            ctx.stroke();
          }
        }
      }
    }

    function updateList() {
      if (placedAtoms.length === 0) {
        document.getElementById('atomList').textContent = 'No atoms placed';
      } else {
        var parts = placedAtoms.map(function(a) {
          var screenAu = parseFloat(document.getElementById('screenInput').value) || 10;
          var au_x = (a.px * screenAu / 400).toFixed(1);
          var au_y = (a.py * screenAu / 400).toFixed(1);
          return a.el + '(Z=' + a.Z + ') at (' + au_x + ',' + au_y + ')';
        });
        document.getElementById('atomList').textContent = placedAtoms.length + '/' + MAX_PLACE + ': ' + parts.join(' | ');
      }
      document.getElementById('launch').disabled = placedAtoms.length < 1;
    }

    document.querySelectorAll('.atom-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.atom-btn').forEach(function(b) { b.classList.remove('selected'); });
        this.classList.add('selected');
        selectedEl = { Z: parseInt(this.dataset.z), el: this.dataset.el };
      });
    });

    cvs.addEventListener('click', function(e) {
      if (!selectedEl || placedAtoms.length >= MAX_PLACE) return;
      var rect = cvs.getBoundingClientRect();
      placedAtoms.push({ px: e.clientX - rect.left, py: e.clientY - rect.top, Z: selectedEl.Z, el: selectedEl.el });
      drawPlacement();
      updateList();
    });

    cvs.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      if (placedAtoms.length > 0) { placedAtoms.pop(); drawPlacement(); updateList(); }
    });

    document.getElementById('screenInput').addEventListener('change', function() { drawPlacement(); updateList(); });
    document.getElementById('clearBtn').addEventListener('click', function() { placedAtoms = []; drawPlacement(); updateList(); });

    document.getElementById('launch').addEventListener('click', function() {
      var screenAu = parseFloat(document.getElementById('screenInput').value) || 10;
      var steps = parseInt(document.getElementById('stepsInput').value) || 20000;
      // Pair protons and electrons: each proton needs an electron to form an H-like atom
      // Protons become Z=1 nuclei at their position
      // Electrons are placed near their closest unpaired proton (solver handles the wavefunction)
      var protons = [], electrons = [], regularAtoms = [];
      for (var i = 0; i < placedAtoms.length; i++) {
        var a = placedAtoms[i];
        if (a.el === 'p+') protons.push(a);
        else if (a.el === 'e-') electrons.push(a);
        else regularAtoms.push(a);
      }
      // Pair protons with electrons: nucleus at proton position, wavefunction starts at electron position
      var atoms = [];
      var initPos = []; // where to initialize each wavefunction (electron position)

      // Match each electron to nearest proton
      var usedElectrons = [];
      for (var i = 0; i < protons.length; i++) {
        var pi = Math.round(protons[i].px * GRID_N / 400);
        var pj = Math.round(protons[i].py * GRID_N / 400);
        atoms.push({ i: pi, j: pj, Z: 1, el: 'H' });

        // Find closest unmatched electron for this proton
        var bestE = -1, bestD = Infinity;
        for (var e = 0; e < electrons.length; e++) {
          if (usedElectrons[e]) continue;
          var dx = protons[i].px - electrons[e].px;
          var dy = protons[i].py - electrons[e].py;
          var d = dx*dx + dy*dy;
          if (d < bestD) { bestD = d; bestE = e; }
        }
        if (bestE >= 0) {
          usedElectrons[bestE] = true;
          // Electron position as wavefunction init (grid coords)
          initPos.push([Math.round(electrons[bestE].px * GRID_N / 400), Math.round(electrons[bestE].py * GRID_N / 400)]);
        } else {
          initPos.push(null); // no electron paired — init at nucleus
        }
      }

      for (var i = 0; i < regularAtoms.length; i++) {
        var a = regularAtoms[i];
        var gi = Math.round(a.px * GRID_N / 400);
        var gj = Math.round(a.py * GRID_N / 400);
        if (a.el === 'He') {
          // He: 2 electrons at same nucleus, initialized in separate half-spaces
          var offset = Math.round(GRID_N * 0.15); // ~15% of grid apart
          atoms.push({ i: gi, j: gj, Z: 2, el: 'He' });
          initPos.push([gi - offset, gj]); // electron 1: left half-space
          atoms.push({ i: gi, j: gj, Z: 2, el: 'He' });
          initPos.push([gi + offset, gj]); // electron 2: right half-space
        } else {
          atoms.push({ i: gi, j: gj, Z: a.Z, el: a.el });
          initPos.push(null); // regular atoms init at nucleus
        }
      }
      while (atoms.length < MAX_PLACE) {
        atoms.push({ i: Math.round(GRID_N / 2), j: Math.round(GRID_N / 2), Z: 0, el: '' });
        initPos.push(null);
      }

      // Tell solver to init wavefunctions at electron positions, not nucleus positions
      // Strategy: temporarily set atom positions to electron positions for init, then move back
      window.USER_INIT_POS = initPos; // [i, j] or null per atom
      window.USER_NN = GRID_N;
      window.USER_ATOMS = atoms;
      window.USER_SCREEN = screenAu;
      window.USER_STEPS = steps;
      window.USER_Z = atoms.map(function(a) { return a.Z; });
      window.USER_RC = atoms.map(function(a) { return rcForEl(a.el, a.Z); });

      document.getElementById('config').style.display = 'none';
      var status = document.createElement('pre');
      status.style.color = '#0f0';
      status.id = 'loadStatus';
      status.textContent = 'Loading molecule.js...';
      document.body.appendChild(status);
      var s = document.createElement('script');
      s.src = 'molecule.js?t=' + Date.now();
      s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load molecule.js</pre>'; };
      s.onload = function() {
        status.textContent = 'molecule.js loaded (NN=' + window.USER_NN + ', NELEC=' + window.USER_Z.filter(function(z){return z>0}).length + '). Loading p5.js...';
        var p5s = document.createElement('script');
        p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
        p5s.onerror = function() { status.textContent = 'Failed to load p5.js from CDN!'; status.style.color = 'red'; };
        p5s.onload = function() { status.remove(); };
        document.body.appendChild(p5s);
      };
      document.body.appendChild(s);
    });

    // Draw atom diagram: proton + electron cloud
    (function() {
      var dc = document.getElementById('atomDiagram');
      var dx = dc.getContext('2d');
      var cx = 50, cy = 50;
      // Electron cloud (radial gradient, blue)
      for (var r = 40; r > 0; r--) {
        var alpha = 0.08 * Math.exp(-r / 15);
        dx.fillStyle = 'rgba(80,130,255,' + alpha + ')';
        dx.beginPath();
        dx.arc(cx, cy, r, 0, Math.PI * 2);
        dx.fill();
      }
      // Cloud label
      dx.fillStyle = 'rgba(80,130,255,0.6)';
      dx.font = '9px monospace';
      dx.textAlign = 'center';
      dx.fillText('\u22121 electron', cx, cy - 28);
      // Proton (red dot at center)
      dx.fillStyle = '#f44';
      dx.beginPath();
      dx.arc(cx, cy, 5, 0, Math.PI * 2);
      dx.fill();
      // Proton label
      dx.fillStyle = '#f44';
      dx.fillText('+1 proton', cx, cy + 18);
    })();

    updateHeader();
    drawPlacement();
  </script>
</body>
</html>
