<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// RealNucleus: Helium-3 (3He) = 2 protons + 1 neutron = 3 protons + 1 electron.
// Proton-electron picture: 3He has Z=2, N=1 -> (Z+N)=3 protons + N=1 electron, net charge +2.
// ONE electron must glue THREE protons -- the borderline case between the deuteron (1e+2p,
// bound, E=-2.12) and 1e+4p (unbound: one -1 charge too weak for four protons).
// Built as the direct extension of the bound deuteron's NESTED shells (the binding mechanism):
//   -1 electron core  +  inner proton (1)  +  outer proton PAIR (2) .   (1 core, protons 1+2)
// cf. deuteron 1+1 (nucleus_deuterium_2shell) and He-4 2+2 (nucleus_he4_2plus2).
// If it binds (E<0, weakly) -> consistent with real 3He being stable but loosely bound
// (exp 7.72 MeV, 2.57 MeV/nucleon; deuteron-scale expectation E ~ -7.4 if it tracked -2.12<->2.22).
// Solver: molecule_nucleus.js (signed Poisson, equal-mass charge clouds).
(function() {
  var gridN = 200, scr = 10, N2 = 100;
  var h = scr / gridN;
  var rIn = 0.65, rOut = 1.2;          // inner-proton / outer-pair seed radii (au), as the deuteron
  var atoms = [];

  atoms.push({ i: N2, j: N2, k: N2, Z: 1, el: 'e' });                              // 0: electron core -1
  atoms.push({ i: N2, j: N2, k: Math.round(N2 + rIn/h),  Z: 1, el: 'P' });         // 1: inner proton +1 (on +z)
  atoms.push({ i: Math.round(N2 + rOut/h), j: N2, k: N2,  Z: 1, el: 'P' });        // 2: outer proton +1 (+x)
  atoms.push({ i: Math.round(N2 - rOut/h), j: N2, k: N2,  Z: 1, el: 'P' });        // 3: outer proton +1 (-x)

  console.log('RealNucleus 3He (1e + 3p, nested 1+2): -1 core + inner proton + outer proton pair');

  window.USER_BOND_PAIRS = [ [1,2,"in-out P:"], [2,3,"out-out P:"], [0,1,"e-Pin:"] ];
  window.USER_REFERENCE = { energy: "3He = 3p + 1e (2p+n); exp binding 7.72 MeV (2.57/nucleon); deuteron-scale E~-7.4 if bound" };

  window.USER_NUCLEUS_MODE = true;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = false;        // frozen geometry, shells held -> read E
  window.USER_FORCE_SCALE = 1.0;
  window.USER_ARROW_SCALE = 200.0;
  window.USER_DAMPING = 0.9;
  window.USER_N_MOVE = 50;
  window.USER_Z = [1, 1, 1, 1];
  window.USER_Z_NUC = [0, 0, 0, 0];
  window.USER_RC = [0, 0, 0, 0];
  window.USER_MASS = [1, 1, 1, 1];     // equal masses: protons are charge clouds, like electrons
  window.USER_CHARGE = [-1, 1, 1, 1];  // electron -1, three protons +1
  // 3-zone nested shell:  r<0.45 -> electron core,  0.45<=r<0.9 -> inner proton,  r>=0.9 -> outer pair
  window.USER_SHELL_RADIUS = 0.45;     // core / inner boundary
  window.USER_SHELL_RADIUS2 = 0.9;     // inner / outer boundary
  window.USER_SHELL_INNER = [0];       // electron core
  window.USER_SHELL_MID = [1];         // inner proton
  window.USER_SHELL_OUTER = [2, 3];    // outer proton pair
  window.USER_CURV_REG = 0.5;
  window.USER_DIRICHLET_EP = 'electron';
  window.USER_LOCKED_GROUPS = [[1, 2, 3]];   // hold the proton subdivision
  window.INIT_ZEFF = 1;
})();

var s = document.createElement('script');
s.src = 'molecule_nucleus.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
