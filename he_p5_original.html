<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>He RealQM p5 original (E=-2.91)</title>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
let u = [];
let f = [];
let K = [];
let P = [];
let w = [];
let charge = [];
let r = 0;
let E =0;
let Ek=0;
let Ep=0;
let c=[];
let norm = [];
let N=100;
let N2=50;
let D=10;
let C=1;
let dt;
let h;
let t=1;
let d=0.1;
let M=3;

function setup() {
  createCanvas(400, 400);
  h=8/N;
  dt=d*pow(h,2);
  for (var m=1;m<M;m++){
  w[m]=[];
  u[m]=[];
  c[m]=1;
  charge[m]=1;
  P[m]=[];
  norm[m]=0;
  }
  for (var m=1;m<M;m++){
  for (var i=0;i<N+1;i++){
    w[m][i]=[];
    u[m][i]=[];
    K[i]=[];
    P[m][i]=[];
  for (var j=0;j<N+1;j++){
    w[m][i][j]=[];
    u[m][i][j]=[];
    K[i][j]=[];
    P[m][i][j]=[];
  for (var k=0;k<N+1;k++){
    w[m][i][j][k]=0;
    u[m][i][j][k]=0;
    K[i][j][k]=0;
    P[m][i][j][k]=0;
    }
    }
    }
}

for (var i=0;i<N+1;i++){
  for (var j=0;j<N+1;j++){
  for (var k=0;k<N+1;k++){
  r=pow((i-N2)*h,2)+pow((j-N2)*h,2)+pow((k-N2)*h,2)+h*h;
   r=sqrt(r);
   u[1][i][j][k]=exp(-2*r);
   P[1][i][j][k]=0.5/r;
   u[2][i][j][k]=exp(-2*r);
   P[2][i][j][k]=0.5/r;
   if (r>h){
   K[i][j][k]=2/r;
   }
   else{
   K[i][j][k]=2/h;
   }
   }
  }
  }

  for (var i=0;i<N+1;i++){
  for (var j=0;j<N+1;j++){
  for (var k=0;k<N+1;k++){
  if (i<N2-1){
  w[1][i][j][k]=1;
  }
  if (i<N2+2){
  u[2][i][j][k]=0;
  }
  if (i>N2+1){
  w[2][i][j][k]=1;
  }
  if (i>N2-2){
  u[1][i][j][k]=0;
  }
  r=pow((i-N2)*h,2)+pow((j-N2)*h,2)+pow((k-N2)*h,2);
  r=sqrt(r);
  if (r>3){
  w[2][i][j][k]=0;
  w[1][i][j][k]=0;
  }
  }
  }
  }
}

function draw() {

  background(220);
  noStroke();

  if (t<30000){
  t=t+1;
  E=0;
  Ek=0;
  Ep=0;
  for (var i=1;i<N;i++){
  for (var j=1;j<N;j++){
  for (var k=1;k<N;k++){
  c[1]=0.1*(u[1][i][j][k]-u[2][i][j][k]);
  c[2]=0.1*(u[2][i][j][k]-u[1][i][j][k]);

for (var m=1;m<M;m++){

w[m][i][j][k]=w[m][i][j][k]+2*dt*abs(c[m])*(w[m][i+1][j][k]+w[m][i-1][j][k]-6*w[m][i][j][k]+w[m][i][j+1][k]+w[m][i][j-1][k]+w[m][i][j][k+1]+w[m][i][j][k-1])/pow(h,2)+ 10*dt*c[m]*sqrt(pow((w[m][i+1][j][k]-w[m][i-1][j][k])/h,2)+pow((w[m][i][j+1][k]-w[m][i][j-1][k])/h,2)+pow((w[m][i][j][k+1]-w[m][i][j][k-1])/h,2));

u[m][i][j][k]=u[m][i][j][k]+0.5*d*((u[m][i+1][j][k]-u[m][i][j][k])*(w[m][i+1][j][k]+w[m][i][j][k])/2-(u[m][i][j][k]-u[m][i-1][j][k])*(w[m][i][j][k]+w[m][i-1][j][k])/2)+0.5*d*((u[m][i][j+1][k]-u[m][i][j][k])*(w[m][i][j+1][k]+w[m][i][j][k])/2-(u[m][i][j][k]-u[m][i][j-1][k])*(w[m][i][j][k]+w[m][i][j-1][k])/2)+0.5*d*((u[m][i][j][k+1]-u[m][i][j][k])*(w[m][i][j][k+1]+w[m][i][j][k])/2-(u[m][i][j][k]-u[m][i][j][k-1])*(w[m][i][j][k]+w[m][i][j][k-1])/2)+dt*(K[i][j][k]-2*P[m][i][j][k])*u[m][i][j][k]*w[m][i][j][k];

P[1][i][j][k]=P[1][i][j][k]+dt*(P[1][i+1][j][k]-6*P[1][i][j][k]+P[1][i-1][j][k]+P[1][i][j+1][k]+P[1][i][j-1][k]+P[1][i][j][k+1]+P[1][i][j][k-1])/pow(h,2)+2*PI*dt*pow(u[2][i][j][k],2);

P[2][i][j][k]=P[2][i][j][k]+dt*(P[2][i+1][j][k]-6*P[2][i][j][k]+P[2][i-1][j][k]+P[2][i][j+1][k]+P[2][i][j-1][k]+P[2][i][j][k+1]+P[2][i][j][k-1])/pow(h,2)+2*PI*dt*pow(u[1][i][j][k],2);

if (w[m][i][j][k]>0.5){
Ek = Ek+0.5*(pow(u[m][i+1][j][k]-u[m][i][j][k],2)+pow(u[m][i][j+1][k]-u[m][i][j][k],2)+pow(u[m][i][j][k+1]-u[m][i][j][k],2))*h;
}
Ep=Ep+(P[m][i][j][k]-K[i][j][k])*pow(u[m][i][j][k],2)*pow(h,3);
 }
 }
 }
}

E=Ep+Ek;

  for (var m=1;m<M;m++){
  norm[m] = 0;
  for (var i=1;i<N;i++){
  for (var j=1;j<N;j++){
  for (var k=1;k<N;k++){
  norm[m] = norm[m] + pow(u[m][i][j][k],2)*pow(h,3);
  }
  }
  }
  for (var i=1;i<N;i++){
  for (var j=1;j<N;j++){
  for (var k=1;k<N;k++){
   u[m][i][j][k]=u[m][i][j][k]/sqrt(norm[m]);
  }
  }
  }
  }
  }

  if (t/10 - floor(t/10)>0.8){
  for (var i=1;i<N;i++){
  for (var j=1;j<N;j++){
  fill(255,0,0,255*u[1][i][j][N2]);
  square(4*i,4*j,4);
  fill(255,0,0,255*u[2][i][j][N2]);
  square(4*i,4*j,4);
  }
  }
  }
  fill(255,255,255,255);
  fill(0);
  circle(200,200,10);

  for (var i=0;i<N;i++){
  fill(0);
  ellipse(4*i,300,3);
  ellipse(4*i,200-100*w[1][i][N2][N2],4);
  ellipse(4*i,200-100*w[2][i][N2][N2],4);
  fill(255,255,0,255);
  ellipse(4*i,200-100*u[1][i][N2][N2],4);
  ellipse(4*i,200-100*u[2][i][N2][N2],4);
  fill(0,255,255,255);
  ellipse(4*i,300-100*(P[1][i][N2][N2]+P[2][i][N2][N2]),4);
  ellipse(4*i,300-100*P[2][i][N2][N2],4);
  fill(0,0,255,255);
  ellipse(4*i,300-50*K[i][N2][N2],6);
  }

  fill(0);
  text(t,100,220);

  text(E.toFixed(4),140,395);
  text(Ek.toFixed(4),140,380);
  text(Ep.toFixed(4),140,365);
  text("time step =",10,220);
  text("Ground State Energy =",10,395);
  text("Kinetic Energy =",10,380);
  text("Potential Energy =",10,365);
  text("(ref -2.903 Hartree)",270,395);
  text("Helium RealQM 3d 100^3",5,20);
}
</script>
</body>
</html>
