<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>CO2 — mol_fast (linear, C+4 / O+3 non-split)</title>
  <style>body { margin: 0; background: #000; }</style>
</head><body>
<div id="loadStatus" style="color:#ff0;font-family:monospace;padding:20px;font-size:14px">HTML loaded, fetching solver…</div>
<script>
  window.onerror = function(msg, url, line, col, err) {
    var pre = document.createElement('pre');
    pre.style.cssText = 'color:#f66;background:#200;padding:12px;font-size:13px;white-space:pre-wrap';
    pre.textContent = 'ERROR: ' + msg + '\n  at ' + url + ':' + line + ':' + col +
      (err && err.stack ? '\n\n' + err.stack : '');
    document.body.insertBefore(pre, document.body.firstChild);
  };
  (function() {
    var N = 200;
    var qs = new URLSearchParams(location.search);
    var scr   = parseFloat(qs.get('scr'))   || 14;
    var bond  = parseFloat(qs.get('bond'))  || 2.196;
    var arch  = parseInt(qs.get('arch'))    || 1;       // 1 = C+4/O+3 (10 e-), 2 = C+2/O+2/O+2 (6 e-)
    var rc_C  = parseFloat(qs.get('rc_C'))  || (arch === 2 ? 0.4 : 0.5);
    var rc_O  = parseFloat(qs.get('rc_O'))  || (arch === 2 ? 0.6 : 0.5);
    var h = scr / N;
    var N2 = Math.round(N / 2);
    var di = Math.round(bond / h);

    var Z_C, Z_O, target_C, target_O, archLabel;
    if (arch === 2) {
      Z_C = 2; Z_O = 2;
      target_C = 2; target_O = 2;
      archLabel = 'arch=2 (+2/+2/+2 minimum, 6 e-)';
    } else {
      Z_C = 4; Z_O = 3;
      target_C = 4; target_O = 3;
      archLabel = 'arch=1 (C+4/O+3, 10 e-)';
    }

    window.USER_NN = N;
    window.USER_SCREEN = scr;
    window.USER_STEPS = 100000;
    window.USER_NUCLEI = [
      { i: N2,       j: N2, k: N2, Z: Z_C, rc: rc_C },
      { i: N2 + di,  j: N2, k: N2, Z: Z_O, rc: rc_O },
      { i: N2 - di,  j: N2, k: N2, Z: Z_O, rc: rc_O },
    ];
    window.USER_NORM_TARGETS = [target_C, target_O, target_O];

    var status = document.getElementById('loadStatus');
    if (status) {
      status.textContent = archLabel +
        ', bond=' + bond.toFixed(3) + ' au (' + (bond*0.529177).toFixed(3) + ' Å)' +
        ', rc_C=' + rc_C.toFixed(2) + ', rc_O=' + rc_O.toFixed(2) +
        ', scr=' + scr + ', N=' + N;
    }
  })();

  var status = document.getElementById('loadStatus');
  var s = document.createElement('script');
  s.src = 'mol_fast.js?t=' + Date.now();
  s.onload = function() {
    status.textContent += '\nmol_fast.js loaded';
    var p = document.createElement('script');
    p.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
    p.onload = function() { status.textContent += '\np5.js loaded — simulation should start'; };
    p.onerror = function() { status.textContent += '\nFAILED to load p5.js'; status.style.color = '#f44'; };
    document.body.appendChild(p);
  };
  s.onerror = function() { status.textContent += '\nFAILED to load mol_fast.js'; status.style.color = '#f44'; };
  document.body.appendChild(s);
</script>
</body></html>
